<div class="container">
    <div class="header"><h1>💙 Ваканса</h1></div>
    <div class="page-title">Все вакансии</div>
    <div class="breadcrumbs">
        <a href="index.html">Главная</a> &rsaquo; Все вакансии
    </div>
    <div id="vacanciesContainer"></div>
    <div class="load-more" id="loadMoreWrapper" style="display:none;">
        <button id="loadMoreBtn" class="load-more-btn">Загрузить ещё</button>
    </div>
</div>

<script>
    const BASE_PATH = '/vacancy-aggregator';
    const API_URL = "https://functions.yandexcloud.net/d4enif5klq871kh78jdp";
    const PAGE_SIZE = 20;
    let allItems = [];
    let displayedCount = 0;

    async function fetchVacancies(page = 0) {
        const params = new URLSearchParams({
            area: '113',
            per_page: PAGE_SIZE,
            page: page,
            order_by: 'publication_time'
        });
        const url = `${API_URL}?${params.toString()}`;
        const resp = await fetch(url);
        const data = await resp.json();
        return data.items || [];
    }

    function renderVacancy(v) {
        const salary = formatSalary(v);
        const title = v.name || 'Без названия';
        const employer = v.employer || 'Не указана';
        const area = v.area || '';
        const link = `${BASE_PATH}/vacancy.html?id=${v.id}`;
        return `
            <div class="vacancy-card" onclick="window.open('${link}', '_blank')">
                <div class="job-title">${escapeHtml(title)}</div>
                <div class="salary">${salary}</div>
                <div class="company">${escapeHtml(employer)} — ${escapeHtml(area)}</div>
            </div>
        `;
    }

    function formatSalary(v) {
        if (!v.salary_from && !v.salary_to) return 'З/П не указана';
        let parts = [];
        if (v.salary_from) parts.push('от ' + v.salary_from.toLocaleString());
        if (v.salary_to) parts.push('до ' + v.salary_to.toLocaleString());
        let result = parts.join(' ');
        if (v.salary_currency) result += ' ' + (v.salary_currency === 'RUR' ? '₽' : v.salary_currency);
        return result;
    }

    function escapeHtml(text) {
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    let currentPage = 0;
    const container = document.getElementById('vacanciesContainer');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const loadMoreWrapper = document.getElementById('loadMoreWrapper');

    async function loadMore() {
        const items = await fetchVacancies(currentPage);
        if (items.length === 0) {
            loadMoreBtn.textContent = 'Больше нет вакансий';
            loadMoreBtn.disabled = true;
            return;
        }
        allItems.push(...items);
        container.innerHTML += items.map(renderVacancy).join('');
        displayedCount += items.length;
        currentPage++;
        loadMoreWrapper.style.display = 'block';
        if (items.length < PAGE_SIZE) {
            loadMoreBtn.textContent = 'Больше нет вакансий';
            loadMoreBtn.disabled = true;
        }
        updateItemListSchema();
    }

    loadMoreBtn.addEventListener('click', loadMore);

    (async () => {
        await loadMore();
        addBreadcrumbSchema();
    })();

    function updateItemListSchema() {
        const schema = {
            "@context": "https://schema.org",
            "@type": "ItemList",
            "itemListElement": allItems.map((v, i) => ({
                "@type": "ListItem",
                "position": i + 1,
                "url": `${window.location.origin}${BASE_PATH}/vacancy.html?id=${v.id}`
            }))
        };
        document.getElementById('itemListSchema').textContent = JSON.stringify(schema, null, 2);
    }

    function addBreadcrumbSchema() {
        const schema = {
            "@context": "https://schema.org",
            "@type": "BreadcrumbList",
            "itemListElement": [
                {
                    "@type": "ListItem",
                    "position": 1,
                    "name": "Главная",
                    "item": `${window.location.origin}${BASE_PATH}/index.html`
                },
                {
                    "@type": "ListItem",
                    "position": 2,
                    "name": "Все вакансии",
                    "item": window.location.href
                }
            ]
        };
        document.getElementById('breadcrumbSchema').textContent = JSON.stringify(schema, null, 2);
    }
</script>
