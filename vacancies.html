<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-brands-400.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <title>Вакансии во всех городах — поиск работы на ВКАНСЕ</title>
    <meta name="description" content="Полный список актуальных вакансий по всем городам России. Найдите работу по городу, зарплате и типу занятости на ВКАНСЕ.">
    
    <meta property="og:title" content="Все вакансии — ВКАНСА">
    <meta property="og:description" content="Полный список актуальных вакансий с возможностью фильтрации.">
    <meta property="og:url" content="https://alex803161.github.io/vacancy-aggregator/vacancies.html">
    <meta property="og:type" content="website">
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                const hour = new Date().getHours();
                if (hour >= 20 || hour < 6) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }
        })();
    </script>
</head>
<body class="light">
<button id="backToTopBtn" title="Наверх"><i class="fas fa-arrow-up"></i></button>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <span class="logo-heart"></span>
            <span class="logo-text">Ваканса</span>
        </div>
        <h1 class="page-title">Все вакансии</h1>
        <p>Работа найдётся — и не одна</p>
    </div>

    <div class="search-section">
        <div class="search-row">
            <input type="text" id="searchInput" class="search-input" placeholder="Должность или ключевое слово">
            <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i> Найти</button>
        </div>
    </div>

    <div class="results-header">
        <span id="counter" class="counter">Загрузка...</span>
    </div>

    <div id="vacanciesContainer" class="vacancies-list"></div>
    <div id="loadingIndicator" style="text-align:center; padding: 20px; display:none;">Загрузка...</div>
    <div style="text-align:center; margin-top: 20px;">
        <button id="loadMoreBtn" class="load-more-btn" style="display:none;">Загрузить ещё</button>
    </div>
</div>

<footer class="site-footer">
    <div class="footer-links">
        <a href="privacy.html">Политика конфиденциальности</a>
        <a href="terms.html">Пользовательское соглашение</a>
        <a href="contacts.html">Контакты</a>
    </div>
    <div class="footer-copy">© 2025 ВКАНСА</div>
</footer>

<button id="themeToggle" class="theme-switch">🌙</button>

<script src="common.js"></script>
<script>
    const API_URL = 'https://functions.yandexcloud.net/d4e1urrsv08ehb7k6uk8';

    let currentPage = 0;
    let totalPages = 1;
    let isLoading = false;

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const counter = document.getElementById('counter');
    const vacanciesContainer = document.getElementById('vacanciesContainer');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const loadingIndicator = document.getElementById('loadingIndicator');

    function createCard(v) {
        const emp = getEmployerName(v.employer);
        const empLogo = v.employer?.logo_urls?.original || v.employer?.logo_urls?.['90'];
        const salary = formatSalary(v.salary);
        const area = v.area?.name || '';
        const published = timeAgo(v.published_at);

        return `
            <div class="vacancy-card" onclick="window.location.href='vacancy.html?id=${v.id}'">
                <div class="job-title">
                    <span>${escapeHtml(v.name) || 'Без названия'}</span>
                    ${published ? `<span class="date-badge">${published}</span>` : ''}
                </div>
                ${salary ? `<div class="salary">${salary}</div>` : ''}
                <div class="company-block">
                    <div class="logo-placeholder">
                        ${empLogo ? `<img src="${empLogo}" alt="${escapeHtml(emp)}" loading="lazy">` : (emp || '?').charAt(0).toUpperCase()}
                    </div>
                    <span class="company-name">${escapeHtml(emp) || 'Компания не указана'}</span>
                </div>
                ${area ? `<div class="address">📍 ${escapeHtml(area)}</div>` : ''}
                <div class="card-actions" onclick="event.stopPropagation();">
                    <a href="vacancy.html?id=${v.id}" class="btn-respond">Подробнее</a>
                </div>
            </div>
        `;
    }

    async function loadVacancies(page = 0, append = false) {
        if (isLoading) return;
        isLoading = true;
        loadingIndicator.style.display = 'block';
        loadMoreBtn.style.display = 'none';

        const query = searchInput.value.trim();
        const params = new URLSearchParams({
            action: 'vacancies',
            text: query,
            per_page: 20,
            page: page,
            order_by: 'publication_time'
        });

        try {
            const res = await fetch(`${API_URL}?${params.toString()}`);
            const data = await res.json();
            const items = data.items || [];

            if (!append) {
                vacanciesContainer.innerHTML = '';
            }

            items.forEach(v => {
                vacanciesContainer.innerHTML += createCard(v);
            });

            totalPages = data.pages || 1;
            currentPage = page;
            counter.textContent = `Найдено: ${data.found || items.length}`;

            if (currentPage < totalPages - 1) {
                loadMoreBtn.style.display = 'inline-flex';
                loadMoreBtn.textContent = 'Загрузить ещё';
                loadMoreBtn.disabled = false;
            } else {
                loadMoreBtn.style.display = 'none';
            }

            if (items.length === 0 && !append) {
                vacanciesContainer.innerHTML = '<div style="text-align:center; padding:40px; color:#64748b;">Ничего не найдено</div>';
            }
        } catch (e) {
            console.error('Ошибка загрузки', e);
            if (!append) {
                vacanciesContainer.innerHTML = '<div style="text-align:center; padding:40px; color:#dc2626;">Ошибка загрузки</div>';
            }
        } finally {
            isLoading = false;
            loadingIndicator.style.display = 'none';
        }
    }

    searchBtn.addEventListener('click', () => loadVacancies(0, false));
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loadVacancies(0, false);
    });

    loadMoreBtn.addEventListener('click', () => {
        if (isLoading) return;
        loadMoreBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Загрузка...';
        loadVacancies(currentPage + 1, true).finally(() => {
            loadMoreBtn.innerHTML = 'Загрузить ещё';
        });
    });

    loadVacancies(0, false);

    setupThemeToggle('themeToggle');
    setupBackToTop('backToTopBtn');
    registerSW('/vacancy-aggregator/');
</script>
</body>
</html>
