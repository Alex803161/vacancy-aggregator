<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO -->
    <title>Все вакансии — ВКАНСА</title>
    <meta name="description" content="Полный список актуальных вакансий с удобным поиском и фильтрами. Найдите работу по городу, зарплате и типу занятости.">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Все вакансии — ВКАНСА">
    <meta property="og:description" content="Полный список актуальных вакансий с возможностью фильтрации.">
    <meta property="og:url" content="https://vkansa.ru/vacancies.html">
    <meta property="og:type" content="website">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                const hour = new Date().getHours();
                if (hour >= 20 || hour < 6) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }
        })();
    </script>
</head>
<body class="light">
<button id="backToTopBtn" title="Наверх"><i class="fas fa-arrow-up"></i></button>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <span class="logo-heart"></span>
            <span class="logo-text">Ваканса</span>
        </div>
        <h1 class="page-title">Все вакансии</h1>
        <p>Работа найдётся — и не одна</p>
    </div>

    <div class="search-section">
        <div class="search-row">
            <input type="text" id="searchInput" class="search-input" placeholder="Должность или ключевое слово">
            <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i> Найти</button>
        </div>
    </div>

    <div class="results-header">
        <span id="counter" class="counter">Загрузка...</span>
    </div>

    <div id="vacanciesContainer" class="vacancies-list"></div>
    <div id="loadingIndicator" style="text-align:center; padding: 20px; display:none;">Загрузка...</div>
    <div style="text-align:center; margin-top: 20px;">
        <button id="loadMoreBtn" class="load-more-btn" style="display:none;">Загрузить ещё</button>
    </div>
</div>

<footer class="site-footer">
    <div class="footer-links">
        <a href="privacy.html">Политика конфиденциальности</a>
        <a href="terms.html">Пользовательское соглашение</a>
        <a href="contacts.html">Контакты</a>
    </div>
    <div class="footer-copy">© 2025 ВКАНСА</div>
</footer>

<button id="themeToggle" class="theme-switch">🌙</button>

<script>
    const API_URL = 'https://functions.yandexcloud.net/d4e1urrsv08ehb7k6uk8';

    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
    });
    if (localStorage.getItem('theme') === 'dark') themeToggle.textContent = '☀️';

    const backToTopBtn = document.getElementById('backToTopBtn');
    window.addEventListener('scroll', () => {
        backToTopBtn.style.display = window.scrollY > 300 ? 'flex' : 'none';
    });
    backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    let currentPage = 0;
    let totalPages = 1;
    let isLoading = false;

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const counter = document.getElementById('counter');
    const vacanciesContainer = document.getElementById('vacanciesContainer');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const loadingIndicator = document.getElementById('loadingIndicator');

    function formatSalary(salary) {
        if (!salary) return '';
        let parts = [];
        if (salary.from) parts.push(`от ${salary.from.toLocaleString()}`);
        if (salary.to) parts.push(`до ${salary.to.toLocaleString()}`);
        if (salary.currency) parts.push(salary.currency === 'RUR' ? '₽' : salary.currency);
        return parts.join(' ');
    }

    function timeAgo(dateStr) {
        const now = new Date();
        const date = new Date(dateStr);
        const diff = Math.floor((now - date) / 1000);
        if (diff < 3600) return `${Math.floor(diff / 60)} мин. назад`;
        if (diff < 86400) return `${Math.floor(diff / 3600)} ч. назад`;
        if (diff < 604800) return `${Math.floor(diff / 86400)} дн. назад`;
        return date.toLocaleDateString('ru-RU');
    }

    function createCard(v) {
        const emp = typeof v.employer === 'object' ? v.employer?.name : v.employer;
        const empLogo = v.employer?.logo_urls?.original || v.employer?.logo_urls?.['90'];
        const salary = formatSalary(v.salary);
        const area = v.area?.name || '';
        const published = v.published_at ? timeAgo(v.published_at) : '';

        return `
            <div class="vacancy-card" onclick="window.location.href='vacancy.html?id=${v.id}'">
                <div class="job-title">
                    <span>${v.name || 'Без названия'}</span>
                    ${published ? `<span class="date-badge">${published}</span>` : ''}
                </div>
                ${salary ? `<div class="salary">${salary}</div>` : ''}
                <div class="company-block">
                    <div class="logo-placeholder">
                        ${empLogo ? `<img src="${empLogo}" alt="${emp || ''}" loading="lazy">` : (emp || '?').charAt(0).toUpperCase()}
                    </div>
                    <span class="company-name">${emp || 'Компания не указана'}</span>
                </div>
                ${area ? `<div class="address">📍 ${area}</div>` : ''}
                <div class="card-actions" onclick="event.stopPropagation();">
                    <a href="vacancy.html?id=${v.id}" class="btn-respond">Подробнее</a>
                </div>
            </div>
        `;
    }

    async function loadVacancies(page = 0, append = false) {
        if (isLoading) return;
        isLoading = true;
        loadingIndicator.style.display = 'block';
        loadMoreBtn.style.display = 'none';

        const query = searchInput.value.trim();
        const params = new URLSearchParams({
            action: 'vacancies',
            text: query,
            per_page: 20,
            page: page,
            order_by: 'publication_time'
        });

        try {
            const res = await fetch(`${API_URL}?${params.toString()}`);
            const data = await res.json();
            const items = data.items || [];

            if (!append) {
                vacanciesContainer.innerHTML = '';
            }

            items.forEach(v => {
                vacanciesContainer.innerHTML += createCard(v);
            });

            totalPages = data.pages || 1;
            currentPage = page;
            counter.textContent = `Найдено: ${data.found || items.length}`;

            if (currentPage < totalPages - 1) {
                loadMoreBtn.style.display = 'inline-flex';
                loadMoreBtn.textContent = 'Загрузить ещё';
                loadMoreBtn.disabled = false;
            } else {
                loadMoreBtn.style.display = 'none';
            }

            if (items.length === 0 && !append) {
                vacanciesContainer.innerHTML = '<div style="text-align:center; padding:40px; color:#64748b;">Ничего не найдено</div>';
            }
        } catch (e) {
            console.error('Ошибка загрузки', e);
            if (!append) {
                vacanciesContainer.innerHTML = '<div style="text-align:center; padding:40px; color:#dc2626;">Ошибка загрузки</div>';
            }
        } finally {
            isLoading = false;
            loadingIndicator.style.display = 'none';
        }
    }

    searchBtn.addEventListener('click', () => loadVacancies(0, false));
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loadVacancies(0, false);
    });

    loadMoreBtn.addEventListener('click', () => {
        loadVacancies(currentPage + 1, true);
    });

    loadVacancies(0, false);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/vacancy-aggregator/sw.js')
      .then(registration => {
        console.log('SW зарегистрирован:', registration.scope);
        registration.onupdatefound = () => {
          const installingWorker = registration.installing;
          installingWorker.onstatechange = () => {
            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
              const toast = document.createElement('div');
              toast.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#0047cc; color:white; padding:12px 24px; border-radius:40px; cursor:pointer; z-index:9999;';
              toast.textContent = 'Доступна новая версия. Обновите страницу.';
              toast.onclick = () => window.location.reload();
              document.body.appendChild(toast);
            }
          };
        };
      })
      .catch(err => console.log('Ошибка регистрации SW:', err));
  });
}
</script>
</body>
</html>
