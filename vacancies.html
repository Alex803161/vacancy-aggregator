<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все вакансии — ВКАНСА</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Мгновенное применение темы
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                const hour = new Date().getHours();
                if (hour >= 20 || hour < 6) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }
        })();
    </script>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/">ВКАНСА</a></h1>
            <nav>
                <a href="/vacancies.html">Вакансии</a>
                <a href="/favorites.html">Избранное</a>
            </nav>
            <button id="themeToggle" aria-label="Переключить тему">
                <span class="icon">🌓</span>
            </button>
        </div>
    </header>

    <main class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Поиск по названию вакансии...">
            <button id="searchBtn">Найти</button>
        </div>

        <div id="vacanciesList" class="cards">
            <!-- Карточки будут добавлены динамически -->
        </div>

        <div class="pagination" id="pagination">
            <!-- Кнопки пагинации -->
        </div>

        <div id="loading" style="display:none; text-align:center;">Загрузка...</div>
    </main>

    <footer>
        <p>&copy; 2025 ВКАНСА</p>
    </footer>

    <script>
        const API_URL = 'https://functions.yandexcloud.net/d4e1urrsv08ehb7k6uk8';
        const PER_PAGE = 10;

        let currentPage = 0;
        let totalPages = 0;
        let searchText = '';

        // Тёмная тема
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        });
        function updateThemeIcon(isDark) {
            themeToggle.querySelector('.icon').textContent = isDark ? '☀️' : '🌙';
        }
        updateThemeIcon(document.documentElement.classList.contains('dark'));

        const vacanciesList = document.getElementById('vacanciesList');
        const paginationContainer = document.getElementById('pagination');
        const loadingEl = document.getElementById('loading');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');

        function getEmployerName(employer) {
            if (!employer) return 'Компания не указана';
            return typeof employer === 'object' ? employer.name : employer;
        }

        function renderVacancyCard(vacancy) {
            const card = document.createElement('div');
            card.className = 'card';
            card.addEventListener('click', () => {
                window.location.href = `vacancy.html?id=${vacancy.id}`;
            });

            const title = document.createElement('h3');
            title.textContent = vacancy.name;
            card.appendChild(title);

            const company = document.createElement('p');
            company.className = 'company';
            company.textContent = getEmployerName(vacancy.employer);
            card.appendChild(company);

            if (vacancy.salary) {
                const salary = document.createElement('p');
                salary.className = 'salary';
                const from = vacancy.salary.from ? `от ${vacancy.salary.from}` : '';
                const to = vacancy.salary.to ? `до ${vacancy.salary.to}` : '';
                const currency = vacancy.salary.currency || '';
                salary.textContent = [from, to, currency].filter(Boolean).join(' ') || 'З/П не указана';
                card.appendChild(salary);
            }

            return card;
        }

        async function fetchVacancies(page = 0, text = '') {
            const params = new URLSearchParams();
            params.append('action', 'vacancies');
            if (text.trim()) params.append('text', text.trim());
            params.append('page', page);
            params.append('per_page', PER_PAGE);

            try {
                const res = await fetch(`${API_URL}?${params.toString()}`);
                if (!res.ok) throw new Error(`Ошибка ${res.status}`);
                return await res.json();
            } catch (e) {
                console.error('Ошибка загрузки вакансий:', e);
                return { items: [], pages: 0 };
            }
        }

        function displayVacancies(vacancies) {
            vacanciesList.innerHTML = '';
            if (vacancies.length === 0) {
                vacanciesList.innerHTML = '<p>Ничего не найдено.</p>';
                return;
            }
            vacancies.forEach(v => {
                vacanciesList.appendChild(renderVacancyCard(v));
            });
        }

        function renderPagination() {
            paginationContainer.innerHTML = '';
            if (totalPages <= 1) return;

            const maxButtons = 7;
            const start = Math.max(0, currentPage - Math.floor(maxButtons / 2));
            const end = Math.min(totalPages, start + maxButtons);

            // Кнопка "Предыдущая"
            if (currentPage > 0) {
                const prevBtn = document.createElement('button');
                prevBtn.textContent = '←';
                prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
                paginationContainer.appendChild(prevBtn);
            }

            // Номера страниц
            for (let i = start; i < end; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.textContent = i + 1;
                if (i === currentPage) pageBtn.classList.add('active');
                pageBtn.addEventListener('click', () => goToPage(i));
                paginationContainer.appendChild(pageBtn);
            }

            // Кнопка "Следующая"
            if (currentPage < totalPages - 1) {
                const nextBtn = document.createElement('button');
                nextBtn.textContent = '→';
                nextBtn.addEventListener('click', () => goToPage(currentPage + 1));
                paginationContainer.appendChild(nextBtn);
            }
        }

        async function goToPage(page) {
            loadingEl.style.display = 'block';
            currentPage = page;
            const data = await fetchVacancies(page, searchText);
            totalPages = data.pages || 0;
            displayVacancies(data.items || []);
            renderPagination();
            loadingEl.style.display = 'none';
            window.scrollTo(0, 0);
        }

        searchBtn.addEventListener('click', async () => {
            searchText = searchInput.value;
            currentPage = 0;
            loadingEl.style.display = 'block';
            const data = await fetchVacancies(0, searchText);
            totalPages = data.pages || 0;
            displayVacancies(data.items || []);
            renderPagination();
            loadingEl.style.display = 'none';
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });

        // Первоначальная загрузка
        (async () => {
            loadingEl.style.display = 'block';
            const data = await fetchVacancies(0);
            totalPages = data.pages || 0;
            displayVacancies(data.items || []);
            renderPagination();
            loadingEl.style.display = 'none';
        })();
    </script>
</body>
</html>
