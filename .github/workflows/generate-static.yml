name: Generate static pages

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios fs-extra

      - name: Generate static pages
        run: node ssr-generator.js || echo "::warning::Script failed, but continuing"

      - name: Show generated files (debug)
        run: |
          echo "=== Содержимое vacancies/ ==="
          ls -R vacancies/ || echo "Папка vacancies не найдена"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d vacancies ] && [ "$(ls -A vacancies)" ]; then
            git add vacancies/
          fi
          if [ -f sitemap.xml ]; then
            git add sitemap.xml
          fi
          if git diff --staged --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "Автообновление статических страниц" && git push
          fi
