<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-brands-400.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Сравнение вакансий — ВКАНСА</title>
    <meta name="description" content="Сравните выбранные вакансии по зарплате, навыкам, городу и другим параметрам.">
    <meta property="og:title" content="Сравнение вакансий — ВКАНСА">
    <meta property="og:description" content="Сравните выбранные вакансии.">
    <meta property="og:url" content="https://alex803161.github.io/vacancy-aggregator/compare.html">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>">
    <style>
        .compare-table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; } html.dark .compare-table { background: #1e293b; }
        .compare-table th, .compare-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; vertical-align: top; } html.dark .compare-table th, html.dark .compare-table td { border-color: #334155; color: #e2e8f0; }
        .compare-table th { background: #f8fafc; font-weight: 600; font-size: 0.85rem; color: #334155; white-space: nowrap; } html.dark .compare-table th { background: #0f172a; color: #94a3b8; }
        .compare-table td a { color: #1a73e8; text-decoration: none; font-weight: 600; }
        .compare-table td .salary { color: #059669; font-weight: 700; white-space: nowrap; } html.dark .compare-table td .salary { color: #34d399; }
        .remove-from-compare { background: none; border: 1px solid #cbd5e1; color: #dc2626; padding: 4px 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; } html.dark .remove-from-compare { border-color: #475569; color: #f87171; }
        .clear-all-btn { background: #dc2626; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 16px; display: inline-flex; align-items: center; gap: 6px; transition: background 0.2s; }
        .clear-all-btn:hover { background: #b91c1c; }
        .empty-message { text-align: center; padding: 60px 20px; color: #64748b; font-size: 1.1rem; }
        @media (max-width: 768px) { .compare-table { font-size: 0.8rem; } .compare-table th, .compare-table td { padding: 8px 6px; } }
    </style>
</head>
<body class="light">
<button id="backToTopBtn" title="Наверх"><i class="fas fa-arrow-up"></i></button>
<div class="container">
    <div class="header"><div class="logo-container"><span class="logo-heart"></span><span class="logo-text">Ваканса</span></div><h1 class="page-title">Сравнение вакансий</h1><p>Работа найдётся — и не одна</p></div>
    <div id="controls" style="text-align: right; margin-bottom: 12px;"><button id="clearAllBtn" class="clear-all-btn" style="display:none;"><i class="fas fa-trash-alt"></i> Очистить всё</button></div>
    <div id="compareContent"></div>
</div>
<footer class="site-footer">
    <div class="footer-links">
        <div class="footer-links-row">
            <a href="history.html"><i class="fas fa-history"></i> История</a>
            <a href="compare.html" class="highlight"><i class="fas fa-balance-scale"></i> Сравнение</a>
            <a href="dashboard.html" class="highlight"><i class="fas fa-chart-pie"></i> Дашборд</a>
        </div>
        <div class="footer-links-row">
            <a href="privacy.html">Политика</a>
            <a href="terms.html">Соглашение</a>
            <a href="contacts.html">Контакты</a>
        </div>
    </div>
    <div class="footer-copy">© 2026 Ваканса. Все права защищены.</div>
</footer>
<button id="themeToggle" class="theme-switch">🌙</button>
<script src="common.js"></script>
<script>
    const compareContent = document.getElementById('compareContent'), clearAllBtn = document.getElementById('clearAllBtn');
    function renderCompareList() { const list = getCompareList(); if (list.length === 0) { compareContent.innerHTML = '<p class="empty-message">Нет вакансий для сравнения. Добавьте их из поиска.</p>'; clearAllBtn.style.display = 'none'; return; } clearAllBtn.style.display = 'inline-flex'; let html = `<div style="overflow-x: auto;"><table class="compare-table"><thead><tr><th>Название</th><th>Компания</th><th>Зарплата</th><th>Город</th><th>Навыки</th><th>Опыт</th><th>Занятость</th><th>Опубликована</th><th></th></tr></thead><tbody>`; list.forEach(v => { const salary = formatSalary(v.salary); const skills = (v.key_skills || []).join(', ') || '—'; const date = v.published_at ? timeAgo(v.published_at) : '—'; html += `<tr><td><a href="vacancy.html?id=${v.id}">${escapeHtml(v.name) || 'Без названия'}</a></td><td>${escapeHtml(v.employer) || '—'}</td><td class="salary">${salary}</td><td>${escapeHtml(v.area) || '—'}</td><td>${escapeHtml(skills)}</td><td>${escapeHtml(v.experience) || '—'}</td><td>${escapeHtml(v.employment) || '—'}</td><td>${date}</td><td><button class="remove-from-compare" data-id="${v.id}"><i class="fas fa-times"></i> Удалить</button></td></tr>`; }); html += '</tbody></table></div>'; compareContent.innerHTML = html; document.querySelectorAll('.remove-from-compare').forEach(btn => { btn.addEventListener('click', (e) => { const id = e.target.closest('button').dataset.id; const list = getCompareList(); const item = list.find(v => v.id == id); if (item) { toggleCompare(item); renderCompareList(); } }); }); }
    clearAllBtn.addEventListener('click', () => { localStorage.removeItem('compareList'); renderCompareList(); });
    renderCompareList();
    setupThemeToggle('themeToggle'); setupBackToTop('backToTopBtn'); registerSW('/vacancy-aggregator/');
</script>
</body>
</html>
