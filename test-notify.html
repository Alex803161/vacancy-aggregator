<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест уведомлений (прямой)</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; background: #f3f4f6; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 12px; }
        button { background: #0047cc; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 600; width: 100%; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
        #result { margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
<h2>Тест прямой отправки в Telegram</h2>
<div class="card">
    <label>Текст уведомления</label>
    <input type="text" id="text" value="Тестовое уведомление напрямую">
    <button onclick="test()">Отправить</button>
    <div id="result"></div>
</div>
<script>
    const BOT_TOKEN = '8665726865:AAFldOqa1GrQ7Pj53iOKQAkrE2jXK16kFLs';
    const CHAT_ID = '949632651';

    async function test() {
        const result = document.getElementById('result');
        result.textContent = 'Отправка...';
        try {
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: document.getElementById('text').value
                })
            });
            const data = await res.json();
            result.textContent = 'Ответ: ' + JSON.stringify(data, null, 2);
        } catch (e) {
            result.textContent = 'Ошибка: ' + e.message;
        }
    }
</script>
</body>
</html>
