<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Избранное — ВКАНСА</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Мгновенное применение темы
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                const hour = new Date().getHours();
                if (hour >= 20 || hour < 6) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }
        })();
    </script>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/">ВКАНСА</a></h1>
            <nav>
                <a href="/vacancies.html">Вакансии</a>
                <a href="/favorites.html" class="active">Избранное</a>
            </nav>
            <button id="themeToggle" aria-label="Переключить тему">
                <span class="icon">🌓</span>
            </button>
        </div>
    </header>

    <main class="container">
        <h2>Избранные вакансии</h2>
        <div id="favoritesList" class="cards">
            <!-- Карточки избранных вакансий -->
        </div>
        <p id="emptyMessage" style="display:none;">В избранном пока ничего нет.</p>
    </main>

    <footer>
        <p>&copy; 2025 ВКАНСА</p>
    </footer>

    <script>
        // Тёмная тема
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        });
        function updateThemeIcon(isDark) {
            themeToggle.querySelector('.icon').textContent = isDark ? '☀️' : '🌙';
        }
        updateThemeIcon(document.documentElement.classList.contains('dark'));

        const favoritesList = document.getElementById('favoritesList');
        const emptyMessage = document.getElementById('emptyMessage');

        function getEmployerName(employer) {
            if (!employer) return 'Компания не указана';
            return typeof employer === 'object' ? employer.name : employer;
        }

        function getFavorites() {
            return JSON.parse(localStorage.getItem('favorites') || '[]');
        }

        function saveFavorites(favorites) {
            localStorage.setItem('favorites', JSON.stringify(favorites));
        }

        function removeFavorite(id) {
            let favorites = getFavorites();
            favorites = favorites.filter(v => v.id !== id);
            saveFavorites(favorites);
            renderFavorites();
        }

        function renderFavorites() {
            const favorites = getFavorites();
            favoritesList.innerHTML = '';

            if (favorites.length === 0) {
                emptyMessage.style.display = 'block';
                return;
            }
            emptyMessage.style.display = 'none';

            favorites.forEach(vacancy => {
                const card = document.createElement('div');
                card.className = 'card';

                const title = document.createElement('h3');
                title.textContent = vacancy.name || 'Без названия';
                card.appendChild(title);

                const company = document.createElement('p');
                company.className = 'company';
                company.textContent = getEmployerName(vacancy.employer);
                card.appendChild(company);

                if (vacancy.salary) {
                    const salary = document.createElement('p');
                    salary.className = 'salary';
                    const from = vacancy.salary.from ? `от ${vacancy.salary.from}` : '';
                    const to = vacancy.salary.to ? `до ${vacancy.salary.to}` : '';
                    const currency = vacancy.salary.currency || '';
                    salary.textContent = [from, to, currency].filter(Boolean).join(' ') || 'З/П не указана';
                    card.appendChild(salary);
                }

                const actions = document.createElement('div');
                actions.className = 'card-actions';

                const viewBtn = document.createElement('button');
                viewBtn.textContent = 'Подробнее';
                viewBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.location.href = `vacancy.html?id=${vacancy.id}`;
                });
                actions.appendChild(viewBtn);

                const removeBtn = document.createElement('button');
                removeBtn.textContent = 'Удалить';
                removeBtn.className = 'remove-btn';
                removeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeFavorite(vacancy.id);
                });
                actions.appendChild(removeBtn);

                card.appendChild(actions);

                // Переход по клику на карточку
                card.addEventListener('click', () => {
                    window.location.href = `vacancy.html?id=${vacancy.id}`;
                });

                favoritesList.appendChild(card);
            });
        }

        renderFavorites();
    </script>
</body>
</html>
