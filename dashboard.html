<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-brands-400.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Дашборд — ВКАНСА</title>
    <meta name="description" content="Ваша личная статистика поиска работы.">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>">
    <script>
        (function() { const theme = localStorage.getItem('theme'); if (theme === 'dark') { document.documentElement.classList.add('dark'); } else if (theme === 'light') { document.documentElement.classList.remove('dark'); } else { const hour = new Date().getHours(); if (hour >= 20 || hour < 6) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); } } })();
    </script>
    <style>
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card-stat { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #edf2f7; text-align: center; } html.dark .card-stat { background: #1e293b; border-color: #334155; }
        .card-stat .number { font-size: 3rem; font-weight: 800; color: #0047cc; line-height: 1; } html.dark .card-stat .number { color: #60a5fa; }
        .card-stat .label { color: #64748b; font-size: 0.9rem; margin-top: 8px; } html.dark .card-stat .label { color: #94a3b8; }
        .section-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 16px; color: #0f172a; } html.dark .section-title { color: #f1f5f9; }
        .recent-list { list-style: none; padding: 0; }
        .recent-list li { padding: 8px 0; border-bottom: 1px solid #e2e8f0; } html.dark .recent-list li { border-color: #334155; }
        .recent-list a { color: #1a73e8; text-decoration: none; }
        .skill-bar { display: flex; align-items: center; margin-bottom: 8px; }
        .skill-name { width: 120px; font-weight: 600; color: #334155; } html.dark .skill-name { color: #e2e8f0; }
        .skill-fill { height: 12px; background: #0047cc; border-radius: 6px; min-width: 4px; }
        .skill-count { margin-left: 8px; font-size: 0.85rem; color: #64748b; }
    </style>
</head>
<body class="light">
<button id="backToTopBtn" title="Наверх"><i class="fas fa-arrow-up"></i></button>
<div class="container">
    <div class="header"><div class="logo-container"><span class="logo-heart"></span><span class="logo-text">Ваканса</span></div><h1 class="page-title">Дашборд</h1><p>Ваша персональная статистика</p></div>
    <div class="dashboard-grid" id="counters"></div>
    <div class="section-title"><i class="fas fa-search"></i> Последние запросы</div>
    <div id="recentSearches"></div>
    <div class="section-title" style="margin-top: 30px;"><i class="fas fa-star"></i> Топ навыков в избранном</div>
    <div id="topSkills"></div>
</div>
<footer class="site-footer">
    <div class="footer-links">
        <div class="footer-links-row">
            <a href="history.html"><i class="fas fa-history"></i> История</a>
            <a href="compare.html" class="highlight"><i class="fas fa-balance-scale"></i> Сравнение</a>
            <a href="dashboard.html" class="highlight"><i class="fas fa-chart-pie"></i> Дашборд</a>
        </div>
        <div class="footer-links-row">
            <a href="privacy.html">Политика</a>
            <a href="terms.html">Соглашение</a>
            <a href="contacts.html">Контакты</a>
        </div>
    </div>
    <div class="footer-copy">© 2025 ВКАНСА</div>
</footer>
<button id="themeToggle" class="theme-switch">🌙</button>
<script src="common.js"></script>
<script>
    const recent = JSON.parse(localStorage.getItem('recentVacancies') || '[]'), favorites = getFavorites(), compare = getCompareList(), searches = JSON.parse(localStorage.getItem('searchHistory') || '[]');
    document.getElementById('counters').innerHTML = `<div class="card-stat"><div class="number">${recent.length}</div><div class="label">просмотрено</div></div><div class="card-stat"><div class="number">${favorites.length}</div><div class="label">в избранном</div></div><div class="card-stat"><div class="number">${compare.length}</div><div class="label">к сравнению</div></div><div class="card-stat"><div class="number">${searches.length}</div><div class="label">запросов</div></div>`;
    const searchesDiv = document.getElementById('recentSearches');
    if (searches.length === 0) { searchesDiv.innerHTML = '<p style="color:#64748b;">Пока нет истории поиска.</p>'; } else { searchesDiv.innerHTML = '<ul class="recent-list">' + searches.slice(0, 10).map(q => `<li><a href="index.html?search=${encodeURIComponent(q)}">${escapeHtml(q)}</a></li>`).join('') + '</ul>'; }
    const skillsDiv = document.getElementById('topSkills');
    if (favorites.length === 0) { skillsDiv.innerHTML = '<p style="color:#64748b;">Нет избранных вакансий для анализа навыков.</p>'; } else { const skillFreq = new Map(); favorites.forEach(v => { (v.key_skills || []).forEach(s => { const name = typeof s === 'object' ? s.name : s; if (name) skillFreq.set(name, (skillFreq.get(name) || 0) + 1); }); }); const sortedSkills = [...skillFreq.entries()].sort((a,b) => b[1] - a[1]).slice(0, 10); if (sortedSkills.length === 0) { skillsDiv.innerHTML = '<p style="color:#64748b;">Навыки не указаны.</p>'; } else { const maxCount = sortedSkills[0][1]; skillsDiv.innerHTML = sortedSkills.map(([name, count]) => `<div class="skill-bar"><span class="skill-name">${escapeHtml(name)}</span><div class="skill-fill" style="width: ${Math.round((count / maxCount) * 100)}%;"></div><span class="skill-count">${count}</span></div>`).join(''); } }
    setupThemeToggle('themeToggle'); setupBackToTop('backToTopBtn'); registerSW('/vacancy-aggregator/');
</script>
</body>
</html>
