<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-brands-400.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Панель администратора — ВКАНСА</title>
    <meta name="description" content="Управление прямыми вакансиями ВКАНСА.">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="Панель администратора — ВКАНСА">
    <meta property="og:description" content="Управление прямыми вакансиями.">
    <meta property="og:url" content="https://alex803161.github.io/vacancy-aggregator/admin.html">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                const hour = new Date().getHours();
                if (hour >= 20 || hour < 6) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }
        })();
    </script>
    <style>
        .cards { display: flex; flex-direction: column; gap: 12px; }
        .card h3 { color: #0f172a; margin-bottom: 4px; }
        html.dark .card h3 { color: #f1f5f9; }
        .card .company { color: #334155; font-weight: 600; }
        html.dark .card .company { color: #f1f5f9; }
        .card .salary { color: #059669; font-weight: 700; }
        html.dark .card .salary { color: #34d399; }
    </style>
</head>
<body class="light">
<button id="backToTopBtn" title="Наверх"><i class="fas fa-arrow-up"></i></button>
<div class="container">
    <div class="header">
        <div class="logo-container">
            <span class="logo-heart"></span>
            <span class="logo-text">Ваканса</span>
        </div>
        <h1 class="page-title">Панель администратора</h1>
        <p>Работа найдётся — и не одна</p>
    </div>

    <p style="color:#64748b; margin-bottom: 20px;">Вакансии, добавленные через форму, хранятся в localStorage.</p>

    <div id="jobsList" class="cards"></div>
    <p id="emptyMessage" style="display:none; text-align:center; padding:40px;">Нет добавленных вакансий.</p>
</div>

<footer class="site-footer">
    <div class="footer-links">
        <a href="privacy.html">Политика конфиденциальности</a>
        <a href="terms.html">Пользовательское соглашение</a>
        <a href="contacts.html">Контакты</a>
    </div>
    <div class="footer-copy">© 2025 ВКАНСА</div>
</footer>

<button id="themeToggle" class="theme-switch">🌙</button>

<script src="common.js"></script>
<script>
    const jobsList = document.getElementById('jobsList');
    const emptyMessage = document.getElementById('emptyMessage');

    function getDirectJobs() {
        return JSON.parse(localStorage.getItem('direct_jobs') || '[]');
    }

    function deleteJob(id) {
        let jobs = getDirectJobs();
        jobs = jobs.filter(j => j.id !== id);
        localStorage.setItem('direct_jobs', JSON.stringify(jobs));
        renderJobs();
    }

    function renderJobs() {
        const jobs = getDirectJobs();
        jobsList.innerHTML = '';
        if (jobs.length === 0) {
            emptyMessage.style.display = 'block';
            return;
        }
        emptyMessage.style.display = 'none';

        jobs.forEach(job => {
            const card = document.createElement('div');
            card.className = 'card';

            const title = document.createElement('h3');
            title.textContent = job.title || 'Без названия';
            card.appendChild(title);

            const company = document.createElement('p');
            company.className = 'company';
            company.textContent = job.company || 'Компания не указана';
            card.appendChild(company);

            if (job.salary) {
                const salary = document.createElement('p');
                salary.className = 'salary';
                salary.textContent = escapeHtml(job.salary);
                card.appendChild(salary);
            }

            const desc = document.createElement('p');
            desc.textContent = job.description || '';
            card.appendChild(desc);

            const actions = document.createElement('div');
            actions.className = 'card-actions';

            const delBtn = document.createElement('button');
            delBtn.textContent = 'Удалить';
            delBtn.className = 'remove-btn';
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteJob(job.id);
            });
            actions.appendChild(delBtn);

            card.appendChild(actions);
            jobsList.appendChild(card);
        });
    }

    renderJobs();

    // Вызов функций из common.js
    setupThemeToggle('themeToggle');
    setupBackToTop('backToTopBtn');
    registerSW('/vacancy-aggregator/');
</script>
</body>
</html>
