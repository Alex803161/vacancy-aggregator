<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-brands-400.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Панель администратора — ВКАНСА</title>
    <meta name="description" content="Управление прямыми вакансиями и рекламой ВКАНСА.">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="Панель администратора — ВКАНСА">
    <meta property="og:description" content="Управление прямыми вакансиями и рекламой.">
    <meta property="og:url" content="https://alex803161.github.io/vacancy-aggregator/admin.html">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>">
    <script>
        (function() { const theme = localStorage.getItem('theme'); if (theme === 'dark') { document.documentElement.classList.add('dark'); } else if (theme === 'light') { document.documentElement.classList.remove('dark'); } else { const hour = new Date().getHours(); if (hour >= 20 || hour < 6) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); } else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); } } })();
    </script>
    <style>
        .cards { display: flex; flex-direction: column; gap: 12px; }
        .card { background: white; border-radius: 16px; padding: 16px 20px; border: 1px solid #edf2f7; transition: box-shadow 0.2s; position: relative; }
        html.dark .card { background: #1e293b; border-color: #334155; }
        .card.premium { border: 2px solid #f5b042; box-shadow: 0 2px 12px rgba(245,176,66,0.3); }
        .card.urgent { border: 2px solid #dc2626; box-shadow: 0 2px 12px rgba(220,38,38,0.2); }
        .card h3 { color: #0f172a; margin-bottom: 4px; } html.dark .card h3 { color: #f1f5f9; }
        .card .company { color: #334155; font-weight: 600; } html.dark .card .company { color: #f1f5f9; }
        .card .salary { color: #059669; font-weight: 700; } html.dark .card .salary { color: #34d399; }
        .card-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .premium-btn { background: #f59e0b; color: white; border: none; padding: 6px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 4px; }
        .premium-btn.active { background: #b45309; }
        .urgent-btn { background: #ef4444; color: white; border: none; padding: 6px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 4px; }
        .urgent-btn.active { background: #b91c1c; }
        .remove-btn { background: #dc2626; color: white; border: none; padding: 6px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
        .section-divider { margin: 30px 0 20px; border-top: 2px solid #e2e8f0; padding-top: 20px; }
        html.dark .section-divider { border-color: #334155; }
        .ad-form { background: #f8fafc; border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        html.dark .ad-form { background: #1e293b; border-color: #334155; }
        .ad-form label { display: block; font-weight: 600; margin-bottom: 6px; color: #334155; }
        html.dark .ad-form label { color: #e2e8f0; }
        .ad-form input, .ad-form textarea { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 0.9rem; margin-bottom: 12px; background: white; color: inherit; }
        html.dark .ad-form input, html.dark .ad-form textarea { background: #0f172a; border-color: #475569; }
        .ad-card { background: #fff7ed; border: 1px solid #fdba74; }
        html.dark .ad-card { background: #2d2a1e; border-color: #f59e0b; }
    </style>
</head>
<body class="light">
<button id="backToTopBtn" title="Наверх"><i class="fas fa-arrow-up"></i></button>
<div class="container">
    <div class="header"><div class="logo-container"><span class="logo-heart"></span><span class="logo-text">Ваканса</span></div><h1 class="page-title">Панель администратора</h1><p>Работа найдётся — и не одна</p></div>

    <!-- Вакансии -->
    <p style="color:#64748b; margin-bottom: 20px;">Вакансии, добавленные через форму, хранятся в localStorage.</p>
    <div id="jobsList" class="cards"></div>
    <p id="emptyMessage" style="display:none; text-align:center; padding:40px;">Нет добавленных вакансий.</p>

    <!-- Раздел рекламы -->
    <div class="section-divider">
        <h2 style="margin-bottom: 16px;"><i class="fas fa-ad"></i> Управление рекламой</h2>
        <div class="ad-form">
            <label>Заголовок</label>
            <input type="text" id="adTitle" placeholder="Например: Лучшие курсы">
            <label>Описание</label>
            <textarea id="adDescription" rows="2" placeholder="Краткое описание"></textarea>
            <label>Ссылка</label>
            <input type="url" id="adLink" placeholder="https://...">
            <label>URL изображения (необязательно)</label>
            <input type="url" id="adImage" placeholder="https://...">
            <label>Срок окончания</label>
            <input type="date" id="adExpiry">
            <button id="addAdBtn" class="premium-btn" style="width:100%; margin-top: 8px;"><i class="fas fa-plus"></i> Добавить рекламу</button>
        </div>
        <div id="adsList" class="cards"></div>
        <p id="adsEmpty" style="display:none; text-align:center; padding:20px;">Нет активной рекламы.</p>
    </div>
</div>
<footer class="site-footer">
    <div class="footer-links">
        <div class="footer-links-row">
            <a href="history.html"><i class="fas fa-history"></i> История</a>
            <a href="compare.html" class="highlight"><i class="fas fa-balance-scale"></i> Сравнение</a>
            <a href="dashboard.html" class="highlight"><i class="fas fa-chart-pie"></i> Дашборд</a>
        </div>
        <div class="footer-links-row">
            <a href="privacy.html">Политика</a>
            <a href="terms.html">Соглашение</a>
            <a href="contacts.html">Контакты</a>
        </div>
    </div>
    <div class="footer-copy">© 2025 ВКАНСА</div>
</footer>
<button id="themeToggle" class="theme-switch">🌙</button>
<script src="common.js"></script>
<script>
    // Управление вакансиями
    const jobsList = document.getElementById('jobsList'), emptyMessage = document.getElementById('emptyMessage');
    function getDirectJobs() { return JSON.parse(localStorage.getItem('direct_jobs') || '[]'); }
    function saveDirectJobs(jobs) { localStorage.setItem('direct_jobs', JSON.stringify(jobs)); }
    function togglePremium(id) { let jobs = getDirectJobs(); const index = jobs.findIndex(j => j.id === id); if (index > -1) { jobs[index].isPremium = !jobs[index].isPremium; saveDirectJobs(jobs); renderJobs(); } }
    function toggleUrgent(id) { let jobs = getDirectJobs(); const index = jobs.findIndex(j => j.id === id); if (index > -1) { jobs[index].isUrgent = !jobs[index].isUrgent; saveDirectJobs(jobs); renderJobs(); } }
    function deleteJob(id) { let jobs = getDirectJobs(); jobs = jobs.filter(j => j.id !== id); saveDirectJobs(jobs); renderJobs(); }
    function renderJobs() { const jobs = getDirectJobs(); jobsList.innerHTML = ''; if (jobs.length === 0) { emptyMessage.style.display = 'block'; return; } emptyMessage.style.display = 'none'; jobs.sort((a, b) => (b.isPremium ? 1 : 0) - (a.isPremium ? 1 : 0) || (b.isUrgent ? 1 : 0) - (a.isUrgent ? 1 : 0)); jobs.forEach(job => { const card = document.createElement('div'); card.className = 'card'; if (job.isPremium) card.classList.add('premium'); if (job.isUrgent) card.classList.add('urgent'); const title = document.createElement('h3'); title.innerHTML = (job.isPremium ? '⭐ ' : '') + (job.isUrgent ? '🔴 ' : '') + escapeHtml(job.title || 'Без названия'); card.appendChild(title); const company = document.createElement('p'); company.className = 'company'; company.textContent = job.company || 'Компания не указана'; card.appendChild(company); if (job.salary) { const salary = document.createElement('p'); salary.className = 'salary'; salary.textContent = escapeHtml(job.salary); card.appendChild(salary); } const desc = document.createElement('p'); desc.textContent = job.description || ''; card.appendChild(desc); const actions = document.createElement('div'); actions.className = 'card-actions'; const premiumBtn = document.createElement('button'); premiumBtn.className = 'premium-btn' + (job.isPremium ? ' active' : ''); premiumBtn.innerHTML = job.isPremium ? '<i class="fas fa-star"></i> Убрать премиум' : '<i class="far fa-star"></i> Сделать премиум'; premiumBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePremium(job.id); }); actions.appendChild(premiumBtn); const urgentBtn = document.createElement('button'); urgentBtn.className = 'urgent-btn' + (job.isUrgent ? ' active' : ''); urgentBtn.innerHTML = job.isUrgent ? '<i class="fas fa-exclamation-circle"></i> Убрать срочность' : '<i class="far fa-exclamation-circle"></i> Сделать срочной'; urgentBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleUrgent(job.id); }); actions.appendChild(urgentBtn); const delBtn = document.createElement('button'); delBtn.textContent = 'Удалить'; delBtn.className = 'remove-btn'; delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteJob(job.id); }); actions.appendChild(delBtn); card.appendChild(actions); jobsList.appendChild(card); }); }

    // Управление рекламой
    const adsList = document.getElementById('adsList'), adsEmpty = document.getElementById('adsEmpty');
    function getAds() { return JSON.parse(localStorage.getItem('ads') || '[]'); }
    function saveAds(ads) { localStorage.setItem('ads', JSON.stringify(ads)); }
    function addAd() { const title = document.getElementById('adTitle').value.trim(); const desc = document.getElementById('adDescription').value.trim(); const link = document.getElementById('adLink').value.trim(); const image = document.getElementById('adImage').value.trim(); const expiry = document.getElementById('adExpiry').value; if (!title || !link) return alert('Заголовок и ссылка обязательны'); const ad = { id: Date.now(), title, description: desc, link, image, expiry: expiry ? new Date(expiry).toISOString() : null, created: new Date().toISOString() }; const ads = getAds(); ads.push(ad); saveAds(ads); renderAds(); clearAdForm(); }
    function deleteAd(id) { let ads = getAds(); ads = ads.filter(a => a.id !== id); saveAds(ads); renderAds(); }
    function clearAdForm() { document.getElementById('adTitle').value = ''; document.getElementById('adDescription').value = ''; document.getElementById('adLink').value = ''; document.getElementById('adImage').value = ''; document.getElementById('adExpiry').value = ''; }
    function isAdActive(ad) { if (!ad.expiry) return true; return new Date(ad.expiry) > new Date(); }
    function renderAds() { const ads = getAds().filter(isAdActive); adsList.innerHTML = ''; if (ads.length === 0) { adsEmpty.style.display = 'block'; return; } adsEmpty.style.display = 'none'; ads.forEach(ad => { const card = document.createElement('div'); card.className = 'card ad-card'; card.innerHTML = `<h3>${escapeHtml(ad.title)}</h3><p>${escapeHtml(ad.description) || ''}</p><p><a href="${escapeHtml(ad.link)}" target="_blank">${escapeHtml(ad.link)}</a></p>${ad.image ? `<img src="${escapeHtml(ad.image)}" style="max-width:100px; max-height:60px; margin-top:8px;">` : ''}<p style="font-size:0.8rem; color:#64748b;">${ad.expiry ? 'До: ' + new Date(ad.expiry).toLocaleDateString('ru-RU') : 'Без срока'}</p><div class="card-actions"><button class="remove-btn" data-id="${ad.id}">Удалить</button></div>`; card.querySelector('.remove-btn').addEventListener('click', (e) => { e.stopPropagation(); deleteAd(ad.id); }); adsList.appendChild(card); }); }

    document.getElementById('addAdBtn').addEventListener('click', addAd);
    renderJobs();
    renderAds();
    setupThemeToggle('themeToggle'); setupBackToTop('backToTopBtn'); registerSW('/vacancy-aggregator/');
</script>
</body>
</html>
