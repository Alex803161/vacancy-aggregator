<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка — ВКАНСА</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                const hour = new Date().getHours();
                if (hour >= 20 || hour < 6) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }
        })();
    </script>
</head>
<body class="light">
<button id="backToTopBtn" title="Наверх"><i class="fas fa-arrow-up"></i></button>

<div class="container">
    <div class="header">
        <h1><span class="logo-heart"></span> Ваканса</h1>
        <p>Работа найдётся — и не одна</p>
    </div>

    <div class="page-title">Управление прямыми вакансиями</div>
    <p style="color:#64748b; margin-bottom: 20px;">Вакансии, добавленные через форму, хранятся в localStorage.</p>

    <div id="jobsList" class="cards"></div>
    <p id="emptyMessage" style="display:none; text-align:center; padding:40px;">Нет добавленных вакансий.</p>
</div>

<footer class="site-footer">
    <div class="footer-links">
        <a href="privacy.html">Политика конфиденциальности</a>
        <a href="terms.html">Пользовательское соглашение</a>
        <a href="contacts.html">Контакты</a>
    </div>
    <div class="footer-copy">© 2025 ВКАНСА</div>
</footer>

<button id="themeToggle" class="theme-switch">🌙</button>

<script>
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
    });
    if (localStorage.getItem('theme') === 'dark') themeToggle.textContent = '☀️';

    const backToTopBtn = document.getElementById('backToTopBtn');
    window.addEventListener('scroll', () => {
        backToTopBtn.style.display = window.scrollY > 300 ? 'flex' : 'none';
    });
    backToTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    const jobsList = document.getElementById('jobsList');
    const emptyMessage = document.getElementById('emptyMessage');

    function getDirectJobs() {
        return JSON.parse(localStorage.getItem('direct_jobs') || '[]');
    }

    function deleteJob(id) {
        let jobs = getDirectJobs();
        jobs = jobs.filter(j => j.id !== id);
        localStorage.setItem('direct_jobs', JSON.stringify(jobs));
        renderJobs();
    }

    function renderJobs() {
        const jobs = getDirectJobs();
        jobsList.innerHTML = '';
        if (jobs.length === 0) {
            emptyMessage.style.display = 'block';
            return;
        }
        emptyMessage.style.display = 'none';

        jobs.forEach(job => {
            const card = document.createElement('div');
            card.className = 'card';

            const title = document.createElement('h3');
            title.textContent = job.title || 'Без названия';
            card.appendChild(title);

            const company = document.createElement('p');
            company.className = 'company';
            company.textContent = job.company || 'Компания не указана';
            card.appendChild(company);

            if (job.salary) {
                const salary = document.createElement('p');
                salary.className = 'salary';
                salary.textContent = job.salary;
                card.appendChild(salary);
            }

            const desc = document.createElement('p');
            desc.textContent = job.description || '';
            card.appendChild(desc);

            const actions = document.createElement('div');
            actions.className = 'card-actions';

            const delBtn = document.createElement('button');
            delBtn.textContent = 'Удалить';
            delBtn.className = 'remove-btn';
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteJob(job.id);
            });
            actions.appendChild(delBtn);

            card.appendChild(actions);
            jobsList.appendChild(card);
        });
    }

    renderJobs();
</script>
</body>
</html>
