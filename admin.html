<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка – управление прямыми вакансиями</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f7f9fc;
            color: #1a2c3e;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        h1 {
            margin-bottom: 24px;
        }
        .login-form {
            max-width: 300px;
            margin: 50px auto;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 60px;
            border: 1px solid #cfdfe9;
        }
        button {
            background: #2c6e9e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .vacancy-item {
            border: 1px solid #e2edf2;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .vacancy-info {
            flex: 1;
        }
        .vacancy-title {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .delete-btn {
            background: #e5484d;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
        }
        .premium-badge {
            background: #f5b042;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            margin-left: 10px;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #2c6e9e;
        }
        body.dark {
            background: #0e141b;
        }
        body.dark .container {
            background: #1e293b;
            color: #e2e8f0;
        }
        body.dark .vacancy-item {
            background: #2d3a4e;
            border-color: #475569;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1><i class="fas fa-shield-alt"></i> Админ-панель</h1>
    <div id="adminContent"></div>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
</div>

<script>
    const ADMIN_PASSWORD = "admin123"; // Смените на свой пароль

    function checkAuth() {
        const auth = sessionStorage.getItem('admin_authenticated');
        if (auth === 'true') {
            showAdminPanel();
        } else {
            showLoginForm();
        }
    }

    function showLoginForm() {
        const container = document.getElementById('adminContent');
        container.innerHTML = `
            <div class="login-form">
                <h3>Вход для администратора</h3>
                <input type="password" id="passwordInput" placeholder="Пароль">
                <button id="loginBtn">Войти</button>
            </div>
        `;
        document.getElementById('loginBtn').addEventListener('click', () => {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_authenticated', 'true');
                showAdminPanel();
            } else {
                alert('Неверный пароль');
            }
        });
    }

    function showAdminPanel() {
        const container = document.getElementById('adminContent');
        const jobs = JSON.parse(localStorage.getItem('direct_jobs') || '[]');
        if (jobs.length === 0) {
            container.innerHTML = '<p>Пока нет ни одной прямой вакансии.</p>';
            return;
        }
        let html = `<h3>Все прямые вакансии (${jobs.length})</h3>`;
        jobs.forEach((job, index) => {
            html += `
                <div class="vacancy-item" data-id="${job.id}">
                    <div class="vacancy-info">
                        <div class="vacancy-title">
                            ${escapeHtml(job.title)}
                            ${job.isPremium ? '<span class="premium-badge">⭐ Премиум</span>' : ''}
                        </div>
                        <div><strong>${escapeHtml(job.company)}</strong> | ${escapeHtml(job.city) || 'Город не указан'}</div>
                        <div>💰 ${escapeHtml(job.salary) || 'Не указана'}</div>
                        <div class="description">${escapeHtml(job.description.substring(0, 100))}${job.description.length > 100 ? '…' : ''}</div>
                    </div>
                    <button class="delete-btn" data-id="${job.id}"><i class="fas fa-trash"></i> Удалить</button>
                </div>
            `;
        });
        container.innerHTML = html;
        // Добавляем обработчики на кнопки удаления
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.getAttribute('data-id'));
                deleteVacancy(id);
            });
        });
    }

    function deleteVacancy(id) {
        let jobs = JSON.parse(localStorage.getItem('direct_jobs') || '[]');
        const newJobs = jobs.filter(job => job.id !== id);
        if (newJobs.length === jobs.length) {
            alert('Вакансия не найдена');
            return;
        }
        localStorage.setItem('direct_jobs', JSON.stringify(newJobs));
        alert('Вакансия удалена');
        showAdminPanel(); // обновляем список
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Тёмная тема (синхронизируем с основной)
    function initTheme() {
        const isDark = localStorage.getItem('theme_dark') === 'true';
        if (isDark) document.body.classList.add('dark');
    }
    initTheme();

    checkAuth();
</script>
</body>
</html>
