<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка — ВКАНСА</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Мгновенное применение темы
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                const hour = new Date().getHours();
                if (hour >= 20 || hour < 6) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }
        })();
    </script>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/">ВКАНСА</a> — Админка</h1>
            <button id="themeToggle" aria-label="Переключить тему">
                <span class="icon">🌓</span>
            </button>
        </div>
    </header>

    <main class="container">
        <h2>Управление прямыми вакансиями</h2>
        <p>Здесь отображаются вакансии, добавленные через форму. Данные хранятся в localStorage.</p>
        <div id="jobsList" class="cards">
            <!-- Карточки прямых вакансий -->
        </div>
        <p id="emptyMessage" style="display:none;">Нет добавленных вакансий.</p>
    </main>

    <footer>
        <p>&copy; 2025 ВКАНСА</p>
    </footer>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        });
        function updateThemeIcon(isDark) {
            themeToggle.querySelector('.icon').textContent = isDark ? '☀️' : '🌙';
        }
        updateThemeIcon(document.documentElement.classList.contains('dark'));

        const jobsList = document.getElementById('jobsList');
        const emptyMessage = document.getElementById('emptyMessage');

        function getDirectJobs() {
            return JSON.parse(localStorage.getItem('direct_jobs') || '[]');
        }

        function deleteJob(id) {
            let jobs = getDirectJobs();
            jobs = jobs.filter(j => j.id !== id);
            localStorage.setItem('direct_jobs', JSON.stringify(jobs));
            renderJobs();
        }

        function renderJobs() {
            const jobs = getDirectJobs();
            jobsList.innerHTML = '';
            if (jobs.length === 0) {
                emptyMessage.style.display = 'block';
                return;
            }
            emptyMessage.style.display = 'none';

            jobs.forEach(job => {
                const card = document.createElement('div');
                card.className = 'card';

                const title = document.createElement('h3');
                title.textContent = job.title || 'Без названия';
                card.appendChild(title);

                const company = document.createElement('p');
                company.className = 'company';
                company.textContent = job.company || 'Компания не указана';
                card.appendChild(company);

                if (job.salary) {
                    const salary = document.createElement('p');
                    salary.className = 'salary';
                    salary.textContent = job.salary;
                    card.appendChild(salary);
                }

                const desc = document.createElement('p');
                desc.textContent = job.description || '';
                card.appendChild(desc);

                const actions = document.createElement('div');
                actions.className = 'card-actions';

                const delBtn = document.createElement('button');
                delBtn.textContent = 'Удалить';
                delBtn.className = 'remove-btn';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteJob(job.id);
                });
                actions.appendChild(delBtn);

                card.appendChild(actions);
                jobsList.appendChild(card);
            });
        }

        renderJobs();
    </script>
</body>
</html>
