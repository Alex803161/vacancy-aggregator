<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ваканса — поиск работы</title>
    <meta name="description" content="Агрегатор вакансий Ваканса">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y3LEHS2D4G"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-Y3LEHS2D4G');
    </script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f3f4f6;font-family:system-ui,sans-serif;padding:0 16px 24px;color:#0f172a;}
        .container{max-width:1280px;margin:0 auto;}
        .header{text-align:center;margin:28px 0;}
        .header h1{font-size:2.5rem;background:linear-gradient(135deg,#0047cc,#3b82f6);background-clip:text;-webkit-background-clip:text;color:transparent;}
        .search-section{background:white;border-radius:20px;padding:20px;margin-bottom:24px;}
        .search-row{display:flex;gap:12px;margin-bottom:16px;}
        .search-input{flex:1;padding:12px 16px;border-radius:40px;border:1px solid #cbd5e1;}
        .search-btn{background:#0047cc;color:white;border:none;padding:0 28px;border-radius:40px;cursor:pointer;}
        .filters-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:16px;}
        .filter-group label{display:block;font-size:0.8rem;font-weight:600;}
        .filter-select,.filter-input-small{width:100%;padding:8px 12px;border-radius:12px;border:1px solid #cbd5e1;}
        .sort-btns{display:flex;gap:8px;margin-bottom:12px;}
        .sort-btn{padding:8px 16px;border-radius:20px;background:#eef2ff;border:1px solid #cbd5e1;cursor:pointer;}
        .sort-btn.active{background:#0047cc;color:white;}
        .vacancies-list{display:flex;flex-direction:column;gap:12px;}
        .vacancy-card{background:white;border-radius:16px;padding:16px 20px;border:1px solid #edf2f7;position:relative;cursor:pointer;animation:fadeSlideUp 0.3s ease-out forwards;opacity:0;}
        @keyframes fadeSlideUp{0%{opacity:0;transform:translateY(15px);}100%{opacity:1;transform:translateY(0);}}
        .job-title{font-size:1.1rem;font-weight:700;margin-bottom:4px;padding-right:50px;}
        .salary{font-size:1.15rem;font-weight:700;color:#059669;margin-bottom:6px;}
        .company-block{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
        .logo-placeholder{width:40px;height:40px;border-radius:8px;background:#e0e7ff;display:flex;align-items:center;justify-content:center;font-weight:700;}
        .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
        .tag{background:#f1f5f9;padding:2px 10px;border-radius:20px;font-size:0.75rem;}
        .card-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
        .btn-respond{background:#0047cc;color:white;padding:8px 18px;border-radius:20px;border:none;cursor:pointer;}
        .btn-call{background:#059669;color:white;padding:8px 18px;border-radius:20px;text-decoration:none;display:inline-block;}
        .btn-email{background:#3b82f6;color:white;padding:8px 18px;border-radius:20px;text-decoration:none;}
        .save-btn{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:white;border:1px solid #e2e8f0;cursor:pointer;}
        .save-btn.saved{background:#ff6b6b;color:white;}
        .theme-switch{position:fixed;bottom:20px;right:20px;background:#0047cc;color:white;border:none;border-radius:40px;padding:8px 16px;cursor:pointer;}
        #backToTopBtn{display:none;position:fixed;bottom:80px;right:20px;background:#0047cc;color:white;border:none;border-radius:50%;width:44px;height:44px;cursor:pointer;}
        @media (max-width:768px){.card-actions{flex-direction:column;}.btn-respond,.btn-call,.btn-email{justify-content:center;text-align:center;}}
    </style>
</head>
<body>
<button id="backToTopBtn"><i class="fas fa-arrow-up"></i></button>
<div class="container">
    <div class="header"><h1>Ваканса</h1><p>Работа найдётся — и не одна</p></div>
    <div class="search-section">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="Должность, компания, город...">
            <button id="searchButton" class="search-btn">Найти</button>
        </div>
        <div class="filters-grid">
            <div class="filter-group"><label>Город</label><select id="filterCity"><option value="">Все города</option><option value="1">Москва</option><option value="2">Санкт-Петербург</option></select></div>
            <div class="filter-group"><label>Опыт</label><select id="filterExperience"><option value="">Любой</option><option>Нет опыта</option><option>От 1 года до 3 лет</option><option>От 3 до 6 лет</option><option>Более 6 лет</option></select></div>
            <div class="filter-group"><label>Занятость</label><select id="filterEmployment"><option value="">Любая</option><option value="full">Полная</option><option value="part">Частичная</option><option value="remote">Удалённая</option></select></div>
            <div class="filter-group"><label>Зарплата от</label><input type="number" id="filterSalaryFrom" placeholder="0"></div>
        </div>
        <div class="sort-btns">
            <button id="sortByDate" class="sort-btn active">По дате</button>
            <button id="sortBySalary" class="sort-btn">По зарплате</button>
        </div>
    </div>
    <div id="vacanciesContainer" class="vacancies-list"></div>
    <div id="loadMoreWrapper" style="text-align:center;display:none;"><button id="loadMoreBtn" class="sort-btn">Загрузить ещё</button></div>
</div>
<button id="themeToggle" class="theme-switch"><i class="fas fa-moon"></i> Тёмная тема</button>
<script>
const API_URL="https://functions.yandexcloud.net/d4enif5klq871kh78jdp";
let allVacancies=[], filteredVacancies=[], displayedCount=0, currentSort="publication_time";
const PAGE_SIZE=20;
let savedVacancies=JSON.parse(localStorage.getItem("savedVacancies"))||[];
let currentArea="113";
const cityNameMap={"1":"Москва","2":"Санкт-Петербург"};

async function fetchVacanciesFromAPI(query,filters={}){
    const params=new URLSearchParams();
    if(query)params.set("text",query);
    if(filters.area)params.set("area",filters.area);
    if(filters.employment)params.set("employment",filters.employment);
    if(filters.order_by)params.set("order_by",filters.order_by);
    params.set("per_page",30);
    const url=`${API_URL}?${params.toString()}`;
    const response=await fetch(url);
    if(!response.ok)throw new Error("HTTP "+response.status);
    const data=await response.json();
    if(data&&Array.isArray(data.items))return data.items;
    if(Array.isArray(data))return data;
    return[];
}

function sendGAEvent(eventName,params={}){
    if(typeof gtag==="function"){
        gtag("event",eventName,params);
        console.log("GA4 event sent:",eventName,params);
    }
}

async function performSearch(reset=true){
    const query=document.getElementById("searchInput").value.trim();
    if(reset){allVacancies=[];displayedCount=0;}
    try{
        const filters={employment:document.getElementById("filterEmployment").value,order_by:currentSort,area:currentArea};
        allVacancies=await fetchVacanciesFromAPI(query,filters);
        if(reset&&query)sendGAEvent("search",{search_term:query});
        applyFilters();
    }catch(e){console.error(e);}
}

function applyFilters(){
    let filtered=[...allVacancies];
    const exp=document.getElementById("filterExperience").value;
    if(exp)filtered=filtered.filter(v=>v.experience===exp);
    const emp=document.getElementById("filterEmployment").value;
    if(emp)filtered=filtered.filter(v=>v.employment===emp);
    const salaryFrom=parseInt(document.getElementById("filterSalaryFrom").value)||0;
    if(salaryFrom)filtered=filtered.filter(v=>v.salary_from&&v.salary_from>=salaryFrom);
    const citySelect=document.getElementById("filterCity").value;
    if(citySelect!==""&&cityNameMap[citySelect])filtered=filtered.filter(v=>v.area===cityNameMap[citySelect]);
    if(currentSort==="salary_desc")filtered.sort((a,b)=>(b.salary_from||0)-(a.salary_from||0));
    else filtered.sort((a,b)=>new Date(b.published_at)-new Date(a.published_at));
    filteredVacancies=filtered;
    displayedCount=0;
    document.getElementById("counterDisplay").innerHTML=`Найдено: ${filtered.length}`;
    if(filtered.length===0){document.getElementById("vacanciesContainer").innerHTML="<div style='text-align:center;padding:40px;'>Ничего не найдено</div>";return;}
    renderVacancies(filtered.slice(0,PAGE_SIZE));
    displayedCount+=Math.min(PAGE_SIZE,filtered.length);
    document.getElementById("loadMoreWrapper").style.display=filtered.length>PAGE_SIZE?"block":"none";
}

function renderVacancies(vacancies){
    const container=document.getElementById("vacanciesContainer");
    if(displayedCount<=PAGE_SIZE)container.innerHTML="";
    vacancies.forEach(v=>{
        const vac=enrich(v);
        const isSaved=savedVacancies.includes(vac.id);
        const card=document.createElement("div");
        card.className="vacancy-card";
        card.dataset.id=vac.id;
        let contactButton="";
        if(vac.phone)contactButton=`<a href="tel:${vac.phone}" class="btn-call" data-vacancy-id="${vac.id}" onclick="sendGAEvent('click_contact',{contact_type:'phone',vacancy_id:'${vac.id}'});event.stopPropagation();"><i class="fas fa-phone-alt"></i> Позвонить</a>`;
        else if(vac.email)contactButton=`<a href="mailto:${vac.email}" class="btn-email" data-vacancy-id="${vac.id}" onclick="sendGAEvent('click_contact',{contact_type:'email',vacancy_id:'${vac.id}'});event.stopPropagation();"><i class="fas fa-envelope"></i> Написать</a>`;
        card.innerHTML=`
            <button class="save-btn ${isSaved?"saved":""}" data-id="${vac.id}"><i class="fas fa-heart"></i></button>
            <div class="job-title">${escapeHtml(vac.title)}</div>
            <div class="salary">${vac.salary}</div>
            <div class="tags">${vac.employment?`<span class="tag">${escapeHtml(vac.employment)}</span>`:""}${vac.schedule?`<span class="tag">${escapeHtml(vac.schedule)}</span>`:""}<span class="tag">${escapeHtml(vac.experience)}</span></div>
            <div class="company-block"><div class="logo-placeholder">${vac.logoLetter}</div><div><div class="company-name">${escapeHtml(vac.company)}</div></div></div>
            <div class="address">${escapeHtml(vac.city)}</div>
            <div class="card-actions">
                <button class="btn-respond" data-vacancy-id="${vac.id}" onclick="sendGAEvent('click_respond',{vacancy_id:'${vac.id}'});goToVacancy('${vac.id}');event.stopPropagation();"><i class="fas fa-paper-plane"></i> Откликнуться</button>
                ${contactButton}
            </div>
        `;
        container.appendChild(card);
    });
}

function enrich(v){
    return{...v,title:v.name||"Без названия",company:v.employer||"Компания не указана",city:v.area||"",salary:formatSalary(v),experience:v.experience||"Не указан",employment:v.employment||"",schedule:v.schedule||"",logoLetter:(v.employer||"А").charAt(0).toUpperCase(),phone:v.phone||null,email:v.email||null};
}
function formatSalary(v){if(!v.salary_from&&!v.salary_to)return"З/П не указана";let p=[];if(v.salary_from)p.push("от "+v.salary_from.toLocaleString());if(v.salary_to)p.push("до "+v.salary_to.toLocaleString());let r=p.join(" ");if(v.salary_currency)r+=" "+(v.salary_currency==="RUR"?"₽":v.salary_currency);return r;}
function goToVacancy(id){const vac=allVacancies.find(v=>v.id==id);if(vac){localStorage.setItem("selectedVacancy",JSON.stringify(vac));window.open("vacancy.html","_blank");}}
function toggleSaved(id,btn){if(savedVacancies.includes(id)){savedVacancies=savedVacancies.filter(v=>v!==id);btn.classList.remove("saved");}else{savedVacancies.push(id);btn.classList.add("saved");}localStorage.setItem("savedVacancies",JSON.stringify(savedVacancies));}
function toggleTheme(){document.body.classList.toggle("dark");localStorage.setItem("theme",document.body.classList.contains("dark")?"dark":"light");}
function loadTheme(){if(localStorage.getItem("theme")==="dark")document.body.classList.add("dark");}
function escapeHtml(t){if(!t)return"";return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
document.getElementById("searchButton").addEventListener("click",()=>performSearch(true));
document.getElementById("searchInput").addEventListener("keypress",e=>{if(e.key==="Enter")performSearch(true);});
document.getElementById("loadMoreBtn").addEventListener("click",()=>{const next=filteredVacancies.slice(displayedCount,displayedCount+PAGE_SIZE);renderVacancies(next);displayedCount+=next.length;if(displayedCount>=filteredVacancies.length)document.getElementById("loadMoreWrapper").style.display="none";});
document.getElementById("filterCity").addEventListener("change",()=>{currentArea=document.getElementById("filterCity").value||"113";performSearch(false);});
document.getElementById("filterExperience").addEventListener("change",applyFilters);
document.getElementById("filterEmployment").addEventListener("change",applyFilters);
document.getElementById("filterSalaryFrom").addEventListener("input",applyFilters);
document.getElementById("sortByDate").addEventListener("click",()=>{currentSort="publication_time";applyFilters();});
document.getElementById("sortBySalary").addEventListener("click",()=>{currentSort="salary_desc";applyFilters();});
document.getElementById("themeToggle").addEventListener("click",toggleTheme);
document.getElementById("vacanciesContainer").addEventListener("click",e=>{const card=e.target.closest(".vacancy-card");if(!card)return;const id=card.dataset.id;if(e.target.closest(".save-btn")){toggleSaved(id,e.target.closest(".save-btn"));return;}if(e.target.closest(".btn-respond")){sendGAEvent("click_respond",{vacancy_id:id});goToVacancy(id);return;}goToVacancy(id);});
loadTheme();
performSearch(true);
</script>
</body>
</html>
