<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Агрегатор вакансий ВКанса — поиск работы">
    <meta name="theme-color" content="#1a1a2e">
    <title>ВКанса — поиск вакансий</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="robots" content="index, follow">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="/vacancy-aggregator/" class="logo">ВКанса</a>
            <nav class="main-nav">
                <a href="/vacancy-aggregator/" class="active">Поиск</a>
                <a href="/vacancy-aggregator/vacancies.html">Все вакансии</a>
                <a href="/vacancy-aggregator/favorites.html">Избранное</a>
                <a href="/vacancy-aggregator/history.html">История</a>
                <a href="/vacancy-aggregator/compare.html">Сравнение</a>
            </nav>
            <div class="header-actions">
                <button id="themeToggle" class="theme-toggle" aria-label="Переключить тему">🌓</button>
            </div>
        </div>
    </header>

    <main class="container search-page">
        <h1>Поиск вакансий</h1>

        <!-- Панель поиска и фильтров -->
        <div class="search-panel">
            <input type="text" id="searchInput" placeholder="Профессия, должность или компания" autocomplete="off">
            <div class="filters">
                <select id="areaSelect">
                    <option value="">Все города</option>
                </select>
                <select id="experienceSelect">
                    <option value="">Любой опыт</option>
                    <option value="noExperience">Без опыта</option>
                    <option value="between1And3">1–3 года</option>
                    <option value="between3And6">3–6 лет</option>
                    <option value="moreThan6">Более 6 лет</option>
                </select>
                <select id="employmentSelect">
                    <option value="">Любая занятость</option>
                    <option value="full">Полная</option>
                    <option value="part">Частичная</option>
                    <option value="project">Проектная</option>
                </select>
                <input type="number" id="salaryFrom" placeholder="Зарплата от" min="0" step="1000">
                <label><input type="checkbox" id="onlyWithSalary"> Только с ЗП</label>
                <label><input type="checkbox" id="remoteOnly"> Удалённая</label>
                <label><input type="checkbox" id="showHidden"> Показывать скрытые</label>
                <select id="sortSelect">
                    <option value="date">По дате</option>
                    <option value="salary">По зарплате</option>
                    <option value="relevance">По совпадению</option>
                </select>
                <button id="searchBtn" class="btn btn-primary">Найти</button>
                <button id="saveSearchBtn" class="btn btn-secondary" title="Сохранить текущий поиск">Сохранить поиск</button>
            </div>
        </div>

        <!-- Статистика -->
        <div id="statsBlock" class="stats" style="display: none;"></div>

        <!-- Списки: история поиска, сохранённые, недавно просмотренные -->
        <div class="user-lists">
            <div class="history-searches" id="searchHistoryList"></div>
            <div class="saved-searches" id="savedSearchesList"></div>
            <div class="recently-viewed" id="recentlyViewedList"></div>
        </div>

        <!-- Блок подписки (ОБНОВЛЁН) -->
        <div class="subscribe-section card">
            <h2>Подписка на вакансии</h2>
            <form id="subscribeForm" class="subscribe-form">
                <div class="form-row">
                    <label>Email:
                        <input type="email" id="subEmail" placeholder="your@email.com" required>
                    </label>
                </div>
                <div class="form-row">
                    <label>Ключевые слова:
                        <input type="text" id="subText" placeholder="например, Python разработчик">
                    </label>
                </div>
                <div class="form-row">
                    <label>Город:
                        <select id="subArea">
                            <option value="">Все города</option>
                        </select>
                    </label>
                </div>
                <div class="form-row">
                    <label>Зарплата от:
                        <input type="number" id="subSalaryFrom" placeholder="50000" min="0" step="1000">
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">Подписаться</button>
                <span id="subscribeStatus" class="status-message"></span>
            </form>
            <p class="small">Будем присылать новые вакансии раз в сутки. <a href="unsubscribe.html">Отписаться</a></p>
        </div>

        <!-- Рекомендованные вакансии (до поиска) -->
        <div id="recommendationsContainer" class="vacancies-grid"></div>

        <!-- Результаты поиска -->
        <div id="vacanciesContainer" class="vacancies-grid"></div>
        <div id="paginationContainer" class="pagination"></div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© 2026 ВКанса. Данные с hh.ru</p>
            <p><a href="privacy.html">Политика конфиденциальности</a> | <a href="terms.html">Условия</a> | <a href="contacts.html">Контакты</a></p>
        </div>
    </footer>

    <button id="scrollToTop" class="scroll-to-top" title="Наверх">↑</button>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>

    <script src="common.js"></script>
    <script>
        // Конфигурация API
        const API_URL = 'https://functions.yandexcloud.net/d4e5m82nlqkadc3ap5o5'; // Node-функция
        const SUBSCRIBE_URL = 'https://functions.yandexcloud.net/d4e1urrsv08ehb7k6uk8'; // Python-функция

        // Глобальные переменные
        let currentPage = 0;
        let totalPages = 1;
        let currentFilters = {};
        let hiddenVacancies = JSON.parse(localStorage.getItem('hiddenVacancies') || '[]');

        // DOM элементы
        const searchInput = document.getElementById('searchInput');
        const areaSelect = document.getElementById('areaSelect');
        const experienceSelect = document.getElementById('experienceSelect');
        const employmentSelect = document.getElementById('employmentSelect');
        const salaryFromInput = document.getElementById('salaryFrom');
        const onlyWithSalaryCheck = document.getElementById('onlyWithSalary');
        const remoteOnlyCheck = document.getElementById('remoteOnly');
        const showHiddenCheck = document.getElementById('showHidden');
        const sortSelect = document.getElementById('sortSelect');
        const searchBtn = document.getElementById('searchBtn');
        const saveSearchBtn = document.getElementById('saveSearchBtn');
        const vacanciesContainer = document.getElementById('vacanciesContainer');
        const recommendationsContainer = document.getElementById('recommendationsContainer');
        const paginationContainer = document.getElementById('paginationContainer');
        const statsBlock = document.getElementById('statsBlock');
        const searchHistoryList = document.getElementById('searchHistoryList');
        const savedSearchesList = document.getElementById('savedSearchesList');
        const recentlyViewedList = document.getElementById('recentlyViewedList');

        // Загрузка городов
        async function loadAreas() {
            try {
                const resp = await fetch(API_URL + '?action=areas');
                const areas = await resp.json();
                [areaSelect, document.getElementById('subArea')].forEach(select => {
                    if (!select) return;
                    select.innerHTML = '<option value="">Все города</option>';
                    areas.forEach(area => {
                        const option = document.createElement('option');
                        option.value = area.id;
                        option.textContent = area.name;
                        select.appendChild(option);
                    });
                });
            } catch (e) {
                console.warn('Не удалось загрузить города');
            }
        }

        // Подписка
        document.getElementById('subscribeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('subEmail').value.trim();
            const text = document.getElementById('subText').value.trim();
            const area = document.getElementById('subArea').value;
            const areaName = document.getElementById('subArea').selectedOptions[0]?.text || '';
            const salaryFrom = document.getElementById('subSalaryFrom').value;
            const status = document.getElementById('subscribeStatus');

            if (!email) {
                status.textContent = 'Введите email';
                return;
            }

            const payload = {
                action: 'subscribe',
                email: email,
                filters: {
                    text: text,
                    area: area,
                    area_name: areaName,
                    salary_from: salaryFrom
                }
            };

            try {
                const resp = await fetch(SUBSCRIBE_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const data = await resp.json();
                if (resp.ok) {
                    status.textContent = '✅ Подписка оформлена!';
                } else {
                    status.textContent = '❌ Ошибка: ' + (data.error || 'неизвестно');
                }
            } catch (err) {
                status.textContent = '❌ Сетевая ошибка';
            }
        });

        // Сохранение поиска
        function saveSearch() {
            const text = searchInput.value.trim();
            if (!text) return;
            const filters = {
                text,
                area: areaSelect.value,
                area_name: areaSelect.selectedOptions[0]?.text,
                experience: experienceSelect.value,
                employment: employmentSelect.value,
                salary_from: salaryFromInput.value,
                only_with_salary: onlyWithSalaryCheck.checked,
                remote_only: remoteOnlyCheck.checked,
                sort: sortSelect.value
            };
            let saved = JSON.parse(localStorage.getItem('savedSearches') || '[]');
            saved.unshift({ date: new Date().toISOString(), filters });
            if (saved.length > 20) saved.pop();
            localStorage.setItem('savedSearches', JSON.stringify(saved));
            renderSavedSearches();
        }

        function renderSavedSearches() {
            const saved = JSON.parse(localStorage.getItem('savedSearches') || '[]');
            savedSearchesList.innerHTML = saved.length ? '<h3>Сохранённые поиски</h3>' : '';
            saved.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'saved-search-item';
                div.innerHTML = `<span>${escapeHtml(s.filters.text)} (${s.filters.area_name || 'все'})</span>
                    <button data-index="${i}" class="btn-small load-saved">Загрузить</button>`;
                savedSearchesList.appendChild(div);
            });
            // Обработчики загрузки
            savedSearchesList.querySelectorAll('.load-saved').forEach(btn => {
                btn.addEventListener('click', () => {
                    const index = parseInt(btn.dataset.index);
                    const saved = JSON.parse(localStorage.getItem('savedSearches') || '[]');
                    const s = saved[index];
                    if (!s) return;
                    searchInput.value = s.filters.text;
                    areaSelect.value = s.filters.area;
                    experienceSelect.value = s.filters.experience;
                    employmentSelect.value = s.filters.employment;
                    salaryFromInput.value = s.filters.salary_from;
                    onlyWithSalaryCheck.checked = s.filters.only_with_salary;
                    remoteOnlyCheck.checked = s.filters.remote_only;
                    sortSelect.value = s.filters.sort;
                    performSearch();
                });
            });
        }

        // История поиска
        function addToSearchHistory(text) {
            if (!text) return;
            let history = JSON.parse(localStorage.getItem('searchHistory') || '[]');
            history = history.filter(item => item.text !== text);
            history.unshift({ text, date: new Date().toISOString() });
            if (history.length > 20) history.pop();
            localStorage.setItem('searchHistory', JSON.stringify(history));
            renderSearchHistory();
        }

        function renderSearchHistory() {
            const history = JSON.parse(localStorage.getItem('searchHistory') || '[]');
            searchHistoryList.innerHTML = history.length ? '<h3>История поиска</h3>' : '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.textContent = item.text;
                div.addEventListener('click', () => {
                    searchInput.value = item.text;
                    performSearch();
                });
                searchHistoryList.appendChild(div);
            });
        }

        // Недавно просмотренные
        function addToRecentlyViewed(vacancy) {
            let viewed = JSON.parse(localStorage.getItem('recentlyViewed') || '[]');
            viewed = viewed.filter(v => v.id !== vacancy.id);
            viewed.unshift({ id: vacancy.id, name: vacancy.name, alternate_url: vacancy.alternate_url });
            if (viewed.length > 10) viewed.pop();
            localStorage.setItem('recentlyViewed', JSON.stringify(viewed));
            renderRecentlyViewed();
        }

        function renderRecentlyViewed() {
            const viewed = JSON.parse(localStorage.getItem('recentlyViewed') || '[]');
            recentlyViewedList.innerHTML = viewed.length ? '<h3>Недавно просмотренные</h3>' : '';
            viewed.forEach(v => {
                const div = document.createElement('div');
                div.className = 'viewed-item';
                div.innerHTML = `<a href="${v.alternate_url}" target="_blank">${escapeHtml(v.name)}</a>`;
                recentlyViewedList.appendChild(div);
            });
        }

        // Форматирование зарплаты (используется из common.js, но продублируем для безопасности)
        if (typeof formatSalary === 'undefined') {
            window.formatSalary = function(salary) {
                if (!salary) return '—';
                let result = '';
                if (salary.from) result += 'от ' + salary.from.toLocaleString();
                if (salary.to) result += (result ? ' до ' : 'до ') + salary.to.toLocaleString();
                if (salary.currency) result += ' ' + salary.currency;
                return result || '—';
            };
        }

        // Расчёт индекса совпадения (если не из common.js)
        if (typeof calculateMatchScore === 'undefined') {
            window.calculateMatchScore = function(vacancy, filters) {
                let score = 50;
                const text = (filters.text || '').toLowerCase();
                if (text && vacancy.name && vacancy.name.toLowerCase().includes(text)) score += 20;
                if (filters.remote_only && vacancy.schedule && vacancy.schedule.id === 'remote') score += 10;
                if (filters.salary_from && vacancy.salary && vacancy.salary.from && vacancy.salary.from >= filters.salary_from) score += 10;
                return Math.min(score, 100);
            };
        }

        // Поиск
        async function performSearch(page = 0) {
            const text = searchInput.value.trim();
            const area = areaSelect.value;
            const experience = experienceSelect.value;
            const employment = employmentSelect.value;
            const salary_from = salaryFromInput.value;
            const only_with_salary = onlyWithSalaryCheck.checked;
            const remote_only = remoteOnlyCheck.checked;
            const sort = sortSelect.value;
            const show_hidden = showHiddenCheck.checked;

            currentFilters = { text, area, experience, employment, salary_from, only_with_salary, remote_only, sort };
            currentPage = page;

            addToSearchHistory(text);
            saveSearchBtn.style.display = text ? 'inline-block' : 'none';

            vacanciesContainer.innerHTML = '<div class="loading">Загрузка...</div>';
            paginationContainer.innerHTML = '';

            const params = new URLSearchParams({
                action: 'search',
                text: text,
                area: area,
                experience: experience,
                employment: employment,
                salary_from: salary_from,
                only_with_salary: only_with_salary,
                remote_only: remote_only,
                order_by: sort === 'salary' ? 'salary_desc' : 'publication_time',
                page: page,
                per_page: 20
            });

            try {
                const resp = await fetch(API_URL + '?' + params.toString());
                const data = await resp.json();
                let vacancies = data.items || [];
                totalPages = Math.ceil((data.found || 0) / 20);

                // Фильтрация скрытых
                if (!show_hidden) {
                    vacancies = vacancies.filter(v => !hiddenVacancies.includes(v.id));
                }

                // Сортировка по совпадению (клиентская)
                if (sort === 'relevance') {
                    vacancies.sort((a, b) => {
                        const scoreA = calculateMatchScore(a, currentFilters);
                        const scoreB = calculateMatchScore(b, currentFilters);
                        return scoreB - scoreA;
                    });
                }

                // Статистика (упрощённо)
                renderStats(vacancies);

                renderVacancies(vacancies);
                renderPagination();

                // Показать/скрыть рекомендации
                if (text || area || experience || employment || salary_from) {
                    recommendationsContainer.style.display = 'none';
                } else {
                    loadRecommendations();
                }
            } catch (err) {
                vacanciesContainer.innerHTML = '<div class="error">Ошибка загрузки вакансий</div>';
            }
        }

        function renderVacancies(vacancies) {
            if (!vacancies.length) {
                vacanciesContainer.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
                return;
            }
            vacanciesContainer.innerHTML = vacancies.map(v => {
                const salary = formatSalary(v.salary);
                const matchScore = calculateMatchScore(v, currentFilters);
                const matchClass = matchScore >= 70 ? 'high' : (matchScore >= 40 ? 'medium' : 'low');
                const isFav = isInFavorites(v.id);
                const isHidden = hiddenVacancies.includes(v.id);
                const isInCompareList = isInCompare(v.id);
                return `
                <div class="vacancy-card ${isHidden ? 'hidden' : ''}" data-id="${v.id}">
                    <div class="card-header">
                        <h3><a href="vacancy.html?id=${v.id}" target="_blank">${escapeHtml(v.name)}</a></h3>
                        <span class="match-badge ${matchClass}">${matchScore}%</span>
                    </div>
                    <div class="card-body">
                        <p class="employer">${escapeHtml(v.employer?.name || '—')}</p>
                        <p class="salary">${salary}</p>
                        <p class="area">${escapeHtml(v.area?.name || '')}</p>
                        <p class="date">${timeAgo(v.published_at)}</p>
                    </div>
                    <div class="card-actions">
                        <button class="btn-icon fav-btn ${isFav ? 'active' : ''}" data-action="fav" data-id="${v.id}" title="В избранное">★</button>
                        <button class="btn-icon compare-btn ${isInCompareList ? 'active' : ''}" data-action="compare" data-id="${v.id}" title="Сравнить">⇆</button>
                        <button class="btn-icon hide-btn" data-action="hide" data-id="${v.id}" title="Скрыть">👁️</button>
                    </div>
                </div>`;
            }).join('');
        }

        function renderPagination() {
            if (totalPages <= 1) return;
            let html = '';
            for (let i = 0; i < totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i+1}</button>`;
            }
            paginationContainer.innerHTML = html;
        }

        function renderStats(vacancies) {
            if (!vacancies.length) {
                statsBlock.style.display = 'none';
                return;
            }
            // Простейшая статистика: медианная зарплата, топ навыков, города
            const salaries = vacancies
                .filter(v => v.salary && v.salary.from)
                .map(v => v.salary.from);
            const median = salaries.length ? salaries.sort((a,b)=>a-b)[Math.floor(salaries.length/2)] : '—';
            const skills = {};
            vacancies.forEach(v => {
                (v.key_skills || []).forEach(s => {
                    skills[s.name] = (skills[s.name] || 0) + 1;
                });
            });
            const topSkills = Object.entries(skills).sort((a,b) => b[1]-a[1]).slice(0,5).map(e=>e[0]).join(', ') || '—';
            const cities = {};
            vacancies.forEach(v => {
                if (v.area) cities[v.area.name] = (cities[v.area.name] || 0) + 1;
            });
            const topCities = Object.entries(cities).sort((a,b) => b[1]-a[1]).slice(0,3).map(e=>e[0]).join(', ') || '—';

            statsBlock.style.display = 'block';
            statsBlock.innerHTML = `
                <p>📊 Медианная зарплата: <strong>${median}</strong></p>
                <p>🔝 Топ навыков: <strong>${topSkills}</strong></p>
                <p>📍 Топ городов: <strong>${topCities}</strong></p>
                <p>📅 Найдено за неделю: <strong>${vacancies.length}</strong></p>
            `;
        }

        // Рекомендации
        async function loadRecommendations() {
            const container = recommendationsContainer;
            container.innerHTML = '<div class="loading">Загрузка рекомендаций...</div>';
            try {
                const resp = await fetch(API_URL + '?action=search&text=&per_page=6&order_by=publication_time');
                const data = await resp.json();
                const vacancies = (data.items || []).filter(v => !hiddenVacancies.includes(v.id));
                container.innerHTML = vacancies.length ? '<h2>Рекомендованные вакансии</h2>' + vacancies.map(v => {
                    const salary = formatSalary(v.salary);
                    return `<div class="vacancy-card" data-id="${v.id}">...</div>`; // аналогично карточке
                }).join('') : '<div class="empty-state">Пока нет рекомендаций</div>';
            } catch(e) {
                container.innerHTML = '';
            }
        }

        // Обработчики событий
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const action = btn.dataset.action;
            const id = parseInt(btn.dataset.id);

            if (action === 'fav') {
                const card = btn.closest('.vacancy-card');
                const name = card?.querySelector('h3 a')?.textContent || '';
                toggleFavorite({ id, name, alternate_url: `vacancy.html?id=${id}` });
                btn.classList.toggle('active', isInFavorites(id));
                // GA4 event
                if (typeof gtag === 'function') gtag('event', 'favorite', { event_category: 'engagement', event_label: name });
            }
            else if (action === 'compare') {
                const card = btn.closest('.vacancy-card');
                const name = card?.querySelector('h3 a')?.textContent || '';
                const vacancyData = { id, name, alternate_url: `vacancy.html?id=${id}`,
                    employer: { name: card?.querySelector('.employer')?.textContent },
                    salary: null, // нужно получить из данных
                    area: { name: card?.querySelector('.area')?.textContent }
                };
                toggleCompare(vacancyData);
                btn.classList.toggle('active', isInCompare(id));
                if (typeof gtag === 'function') gtag('event', 'compare', { event_category: 'engagement', event_label: name });
            }
            else if (action === 'hide') {
                hiddenVacancies.push(id);
                localStorage.setItem('hiddenVacancies', JSON.stringify(hiddenVacancies));
                btn.closest('.vacancy-card')?.classList.add('hidden');
            }
        });

        // Пагинация
        paginationContainer.addEventListener('click', (e) => {
            const btn = e.target.closest('.page-btn');
            if (btn) {
                const page = parseInt(btn.dataset.page);
                performSearch(page);
                window.scrollTo(0,0);
            }
        });

        // Кнопка поиска
        searchBtn.addEventListener('click', () => performSearch(0));
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch(0);
        });

        // Сохранить поиск
        saveSearchBtn.addEventListener('click', saveSearch);

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            loadAreas();
            renderSearchHistory();
            renderSavedSearches();
            renderRecentlyViewed();
            loadRecommendations();
            // Service Worker и тема регистрируются в common.js
            if (typeof registerSW === 'function') registerSW();
            if (typeof setupThemeToggle === 'function') setupThemeToggle();
        });

        // Вспомогательные функции из common.js должны быть доступны
        if (typeof getFavorites === 'undefined') {
            window.getFavorites = () => JSON.parse(localStorage.getItem('favorites') || '[]');
            window.isInFavorites = (id) => getFavorites().some(f => f.id === id);
        }
        if (typeof getCompareList === 'undefined') {
            window.getCompareList = () => JSON.parse(localStorage.getItem('compareList') || '[]');
            window.isInCompare = (id) => getCompareList().some(v => v.id === id);
        }
    </script>
</body>
</html>
