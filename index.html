    <div class="results-header"><div class="counter" id="counterDisplay">Найдено: <span>0</span></div><button id="resetButton" class="reset-btn"><i class="fas fa-undo"></i> Сбросить</button></div>
    <div id="vacanciesContainer" class="vacancies-list"></div>
    <div id="loadMoreWrapper" style="text-align:center; display:none; margin-top: 16px;"><button id="loadMoreBtn" class="load-more-btn">Загрузить ещё</button></div>
    <div class="extra-sections">
        <div class="section-title">Работа в компаниях</div>
        <div class="companies-grid">
            <div class="company-card" data-search="Магнит">Магнит</div>
            <div class="company-card" data-search="Пятёрочка">Пятёрочка</div>
            <div class="company-card" data-search="Сбер">Сбер</div>
            <div class="company-card" data-search="Яндекс">Яндекс</div>
            <div class="company-card" data-search="Ozon">Ozon</div>
            <div class="company-card" data-search="МТС">МТС</div>
        </div>
    </div>
</div>
<footer class="site-footer">
    <div class="footer-links">
        <a href="vacancies.html">Все вакансии</a>
        <a href="privacy.html">Политика конфиденциальности</a>
        <a href="terms.html">Пользовательское соглашение</a>
        <a href="contacts.html">Контакты</a>
    </div>
    <div class="footer-copy">© 2026 Ваканса. Все права защищены.</div>
</footer>
<button id="themeToggle" class="theme-switch"><i class="fas fa-moon"></i> Тёмная тема</button>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('ServiceWorker registered');
      }).catch(err => {
        console.log('ServiceWorker registration failed: ', err);
      });
    });
  }
</script>

<script>
    const BASE_PATH = '/vacancy-aggregator';

    const API_URL="https://functions.yandexcloud.net/d4enif5klq871kh78jdp";
    let allVacancies=[],filteredVacancies=[],displayedCount=0,currentSort='publication_time';
    const PAGE_SIZE=20;
    let savedVacancies=JSON.parse(localStorage.getItem('savedVacancies'))||[];
    let searchHistory=JSON.parse(localStorage.getItem('searchHistory'))||[];

    async function fetchVacanciesFromAPI(query,filters={}){
        const params=new URLSearchParams();
        if(query)params.set('text',query);
        params.set('area', '113');
        if(filters.employment)params.set('employment',filters.employment);
        if(filters.order_by)params.set('order_by',filters.order_by);
        if(filters.per_page)params.set('per_page',filters.per_page);
        if(filters.page!==undefined)params.set('page',filters.page);
        const url=`${API_URL}?${params.toString()}`;
        const response=await fetch(url);
        if(!response.ok)throw new Error(`HTTP ${response.status}`);
        const data=await response.json();
        if(data&&Array.isArray(data.items))return data.items;
        if(Array.isArray(data))return data;
        return[];
    }

    const searchInput=document.getElementById('searchInput'),searchBtn=document.getElementById('searchButton'),
        suggestionsDropdown=document.getElementById('suggestionsDropdown'),
        vacanciesContainer=document.getElementById('vacanciesContainer'),counterSpan=document.querySelector('#counterDisplay span'),
        loadMoreBtn=document.getElementById('loadMoreBtn'),loadMoreWrapper=document.getElementById('loadMoreWrapper'),
        filterCityInput=document.getElementById('filterCityInput'),filterExperience=document.getElementById('filterExperience'),
        filterEmployment=document.getElementById('filterEmployment'),filterSchedule=document.getElementById('filterSchedule'),
        filterSalaryFrom=document.getElementById('filterSalaryFrom'),
        sortByDateBtn=document.getElementById('sortByDate'),sortBySalaryBtn=document.getElementById('sortBySalary'),
        resetButton=document.getElementById('resetButton'),themeToggle=document.getElementById('themeToggle'),
        historyContainer=document.getElementById('historyContainer'),clearHistoryBtn=document.getElementById('clearHistoryBtn'),
        backToTopBtn=document.getElementById('backToTopBtn');

    const subscribeEmailInput = document.getElementById('subscribeEmail');
    const subscribeBtnEl = document.getElementById('subscribeBtn');
    const subscribeStatusInline = document.getElementById('subscribeStatusInline');

    let suggestTimeout;
    searchInput.addEventListener('input', function() {
        const query = this.value.trim();
        if (query.length < 2) {
            suggestionsDropdown.style.display = 'none';
            return;
        }
        clearTimeout(suggestTimeout);
        suggestTimeout = setTimeout(() => fetchSuggestions(query), 300);
    });
    searchInput.addEventListener('blur', () => {
        setTimeout(() => { suggestionsDropdown.style.display = 'none'; }, 150);
    });
    function fetchSuggestions(text) {
        fetch(`https://api.hh.ru/suggests?text=${encodeURIComponent(text)}`)
            .then(res => res.json())
            .then(data => {
                const items = data.items || [];
                if (items.length === 0) {
                    suggestionsDropdown.style.display = 'none';
                    return;
                }
                suggestionsDropdown.innerHTML = items.map(item => 
                    `<div class="suggestion-item">${escapeHtml(item.text)}</div>`
                ).join('');
                suggestionsDropdown.style.display = 'block';
                document.querySelectorAll('.suggestion-item').forEach(el => {
                    el.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        searchInput.value = el.textContent;
                        suggestionsDropdown.style.display = 'none';
                        performSearch(true, true);
                    });
                });
            })
            .catch(() => { suggestionsDropdown.style.display = 'none'; });
    }

    renderHistory();loadTheme();performSearch(true);
    searchBtn.addEventListener('click',()=>performSearch(true,true));
    searchInput.addEventListener('keypress',e=>{if(e.key==='Enter'){ suggestionsDropdown.style.display='none'; performSearch(true,true); }});
    loadMoreBtn.addEventListener('click',loadMore);

    let cityTimeout;
    filterCityInput.addEventListener('input', () => {
        clearTimeout(cityTimeout);
        cityTimeout = setTimeout(() => performSearch(true, false), 600);
    });
    filterCityInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') performSearch(true, false);
    });

    filterExperience.addEventListener('change',applyFilters);
    filterEmployment.addEventListener('change',applyFilters);
    filterSchedule.addEventListener('change',()=>performSearch(true,false));
    filterSalaryFrom.addEventListener('input',applyFilters);
    sortByDateBtn.addEventListener('click',()=>{setSort('publication_time');applyFilters()});
    sortBySalaryBtn.addEventListener('click',()=>{setSort('salary_desc');applyFilters()});
    resetButton.addEventListener('click',resetFilters);
    themeToggle.addEventListener('click',toggleTheme);
    clearHistoryBtn.addEventListener('click',clearHistory);
    window.addEventListener('scroll',()=>{backToTopBtn.style.display=window.scrollY>300?'block':'none'});
    backToTopBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
    document.querySelectorAll('[data-search]').forEach(el=>{el.addEventListener('click',()=>{searchInput.value=el.dataset.search;searchInput.blur();performSearch(true,false).then(()=>{setTimeout(()=>vacanciesContainer.scrollIntoView({behavior:'smooth',block:'start'}),100)})})});
    vacanciesContainer.addEventListener('click',e=>{
        const card=e.target.closest('.vacancy-card');if(!card)return;const id=card.dataset.id;
        if(e.target.closest('.save-btn')){toggleSaved(id,e.target.closest('.save-btn'));return}
        if(e.target.closest('.share-card-btn')){
            const link = e.target.closest('.share-card-btn').dataset.link;
            if(link) {
                navigator.clipboard.writeText(link).then(()=>alert('Ссылка скопирована!'));
            }
            return;
        }
        if(e.target.closest('.btn-respond')){
            ym(109600838, 'reachGoal', 'respond_click');
            goToVacancy(id);
            return;
        }
        goToVacancy(id);
    });

    // Обновлённый обработчик подписки с фильтрами
    subscribeBtnEl.addEventListener('click', async () => {
        const email = subscribeEmailInput.value.trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            subscribeStatusInline.textContent = 'Введите корректный email';
            subscribeStatusInline.style.color = '#dc2626';
            return;
        }
        const city = document.getElementById('subscribeCity').value.trim();
        const salary = document.getElementById('subscribeSalary').value.trim();
        const schedule = document.getElementById('subscribeSchedule').value;
        const employment = document.getElementById('subscribeEmployment').value;

        subscribeBtnEl.disabled = true;
        subscribeBtnEl.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Отправка...';
        subscribeStatusInline.textContent = '';

        let url = `${API_URL}?action=subscribe&email=${encodeURIComponent(email)}`;
        if (city) url += `&city=${encodeURIComponent(city)}`;
        if (salary) url += `&salary_from=${encodeURIComponent(salary)}`;
        if (schedule) url += `&schedule=${encodeURIComponent(schedule)}`;
        if (employment) url += `&employment=${encodeURIComponent(employment)}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.status === 'ok') {
                subscribeStatusInline.textContent = '✅ Вы подписаны!';
                subscribeStatusInline.style.color = '#059669';
                subscribeEmailInput.value = '';
                document.getElementById('subscribeCity').value = '';
                document.getElementById('subscribeSalary').value = '';
                document.getElementById('subscribeSchedule').value = '';
                document.getElementById('subscribeEmployment').value = '';
                ym(109600838, 'reachGoal', 'subscribe_click');
            } else {
                subscribeStatusInline.textContent = '❌ Ошибка: ' + data.message;
                subscribeStatusInline.style.color = '#dc2626';
            }
        } catch (error) {
            subscribeStatusInline.textContent = '❌ Не удалось соединиться';
            subscribeStatusInline.style.color = '#dc2626';
        } finally {
            subscribeBtnEl.disabled = false;
            subscribeBtnEl.innerHTML = '<i class="fas fa-paper-plane"></i> Подписаться';
        }
    });

    async function performSearch(reset=true,recordHistory=true){
        searchInput.blur();
        if(reset){allVacancies=[];filteredVacancies=[];displayedCount=0;vacanciesContainer.innerHTML='';loadMoreWrapper.style.display='none'}
        const query=searchInput.value.trim();
        if(recordHistory)addToHistory(query);
        if(reset){vacanciesContainer.innerHTML='<div class="vacancy-card" style="height:100px; background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%); background-size:200% 100%; animation: shimmer 1.2s infinite;"></div>'.repeat(8);counterSpan.textContent='0'}

        const originalHTML = searchBtn.innerHTML;
        searchBtn.disabled = true;
        searchBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Поиск...';

        try{
            let fullQuery = query;
            const city = filterCityInput.value.trim();
            if (city) fullQuery = fullQuery ? `${fullQuery} ${city}` : city;
            const schedule = filterSchedule.value;
            if (schedule) fullQuery = fullQuery ? `${fullQuery} ${schedule}` : schedule;

            const filters={
                employment:filterEmployment.value,
                order_by:currentSort,
                per_page:100,
                page:0
            };
            allVacancies=await fetchVacanciesFromAPI(fullQuery,filters);
            applyFilters();
            if (window.innerWidth <= 768) {
                setTimeout(() => { vacanciesContainer.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 150);
            }
        }catch(e){
            vacanciesContainer.innerHTML='<p style="text-align:center; padding:40px;">Ошибка загрузки</p>';
            console.error(e);allVacancies=[];filteredVacancies=[];
        }finally{
            searchBtn.disabled = false;
            searchBtn.innerHTML = originalHTML;
        }
    }

    function loadMore(){
        if(displayedCount<filteredVacancies.length){
            const nextItems=filteredVacancies.slice(displayedCount,displayedCount+PAGE_SIZE);
            renderVacancies(nextItems);
            displayedCount+=nextItems.length;
            updateLoadMoreButton();
        }else{ updateLoadMoreButton(); }
    }

    function setSort(sort){
        currentSort=sort;
        sortByDateBtn.classList.toggle('active',sort==='publication_time');
        sortBySalaryBtn.classList.toggle('active',sort==='salary_desc');
    }

    function applyFilters(){
        let filtered=[...allVacancies];
        const exp=filterExperience.value;
        if(exp) filtered=filtered.filter(v=>v.experience===exp);
        const emp=filterEmployment.value;
        if(emp) filtered=filtered.filter(v=>v.employment===emp);
        const salaryFrom=parseInt(filterSalaryFrom.value.replace(/\s/g,''))||0;
        if(salaryFrom) filtered=filtered.filter(v=>v.salary_from&&v.salary_from>=salaryFrom);

        if(currentSort==='salary_desc'){
            filtered.sort((a,b)=>(b.salary_from||0)-(a.salary_from||0));
        } else if(currentSort==='publication_time'){
            filtered.sort((a,b)=>new Date(b.published_at)-new Date(a.published_at));
        }

        filteredVacancies=filtered;
        vacanciesContainer.innerHTML='';
        displayedCount=0;
        counterSpan.textContent=filtered.length;

        if(filtered.length===0){
            vacanciesContainer.innerHTML='<p style="text-align:center; padding:40px;">Вакансий не найдено</p>';
            loadMoreWrapper.style.display='none';
            return;
        }
        const firstPage=filtered.slice(0,PAGE_SIZE);
        renderVacancies(firstPage);
        displayedCount+=firstPage.length;
        updateLoadMoreButton();
    }

    function updateLoadMoreButton(){
        if(displayedCount>=filteredVacancies.length){
            loadMoreBtn.textContent='Вакансий больше нет';
            loadMoreBtn.disabled=true;
        }else{
            loadMoreBtn.textContent='Загрузить ещё';
            loadMoreBtn.disabled=false;
        }
        loadMoreWrapper.style.display='block';
    }

    function formatSalary(v){
        if(!v.salary_from&&!v.salary_to)return'З/П не указана';
        let parts=[];
        if(v.salary_from)parts.push('от '+v.salary_from.toLocaleString());
        if(v.salary_to)parts.push('до '+v.salary_to.toLocaleString());
        let result=parts.join(' ');
        if(v.salary_currency){result+=' '+(v.salary_currency==='RUR'?'₽':v.salary_currency)}
        return result;
    }

    function enrich(v){
        return{...v,title:v.name||'Без названия',company:v.employer||'Компания не указана',city:v.area||'',link:v.url||'#',experience:v.experience||'Не указан',employment:v.employment||'',schedule:v.schedule||'',salary:formatSalary(v),rating:v.employer_rating||(Math.random()*2+3).toFixed(1),reviews:v.employer_reviews||Math.floor(Math.random()*5000)+100,logoLetter:(v.employer||'А').charAt(0).toUpperCase(),logoColor:['#e0e7ff','#dbeafe','#ede9fe','#fce7f3','#ffedd5','#dcfce7'][(v.employer||'А').charCodeAt(0)%6],phone:v.phone||null,email:v.email||null,logoUrl:v.logo_url||null,publishedDate:formatPublishedDate(v.published_at)};
    }

    function formatPublishedDate(dateString){
        if(!dateString)return'';
        const pubDate=new Date(dateString),now=new Date(),
            today=new Date(now.getFullYear(),now.getMonth(),now.getDate()),
            pubDay=new Date(pubDate.getFullYear(),pubDate.getMonth(),pubDate.getDate()),
            diffDays=Math.floor((today-pubDay)/(1000*60*60*24));
        if(diffDays===0)return'сегодня';
        if(diffDays===1)return'вчера';
        if(diffDays<=7)return diffDays+' дня назад';
        return pubDate.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
    }

    function renderVacancies(vacancies){
        vacancies.forEach(v=>{
            const vac=enrich(v),isSaved=savedVacancies.includes(vac.id),card=document.createElement('div');
            card.className='vacancy-card';card.dataset.id=vac.id;
            let contactButton='';
            if(vac.phone){contactButton=`<a href="tel:${vac.phone}" class="btn-call" onclick="event.stopPropagation()"><i class="fas fa-phone-alt"></i> Позвонить</a>`}
            else if(vac.email){contactButton=`<a href="mailto:${vac.email}" class="btn-email" onclick="event.stopPropagation()"><i class="fas fa-envelope"></i> Написать</a>`}
            const logoSrc=vac.logoUrl?`<img src="${vac.logoUrl}" alt="${escapeHtml(vac.company)}">`:vac.logoLetter;
            const shareUrl = `${window.location.origin}${BASE_PATH}/vacancy.html?id=${vac.id}`;
            card.innerHTML=`<button class="save-btn ${isSaved?'saved':''}" data-id="${vac.id}"><i class="fas fa-heart"></i></button><div class="job-title"><span>${escapeHtml(vac.title)}</span>${vac.publishedDate?`<span class="date-badge">${vac.publishedDate}</span>`:''}</div><div class="salary">${vac.salary}</div><div class="tags">${vac.employment?`<span class="tag">${escapeHtml(vac.employment)}</span>`:''}${vac.schedule?`<span class="tag">${escapeHtml(vac.schedule)}</span>`:''}<span class="tag">${escapeHtml(vac.experience)}</span></div><div class="company-block"><div class="logo-placeholder" style="background:${vac.logoUrl?'transparent':vac.logoColor}">${logoSrc}</div><div><div class="company-name">${escapeHtml(vac.company)}</div><div class="rating-row">⭐ ${vac.rating} • ${vac.reviews.toLocaleString()} отзывов</div></div></div><div class="address">${escapeHtml(vac.city)}</div><div class="card-actions"><button class="btn-respond" onclick="event.stopPropagation()">Откликнуться</button>${contactButton}<button class="btn-contact share-card-btn" data-link="${shareUrl}"><i class="fas fa-share-alt"></i> Поделиться</button></div>`;
            vacanciesContainer.appendChild(card);
        });
    }

    window.goToVacancy=function(id){const vac=allVacancies.find(v=>v.id==id);if(vac){localStorage.setItem('selectedVacancy',JSON.stringify(vac));window.open('vacancy.html','_blank')}};
    function toggleSaved(id,btn){if(savedVacancies.includes(id)){savedVacancies=savedVacancies.filter(v=>v!==id);btn.classList.remove('saved')}else{savedVacancies.push(id);btn.classList.add('saved')}localStorage.setItem('savedVacancies',JSON.stringify(savedVacancies))}
    function resetFilters(){
        filterCityInput.value='';
        filterExperience.value='';
        filterEmployment.value='';
        filterSchedule.value='';
        filterSalaryFrom.value='';
        setSort('publication_time');
        performSearch(true,false);
    }
    function toggleTheme(){document.body.classList.toggle('dark');document.body.classList.toggle('light');const isDark=document.body.classList.contains('dark');themeToggle.innerHTML=isDark?'<i class="fas fa-sun"></i> Светлая тема':'<i class="fas fa-moon"></i> Тёмная тема';localStorage.setItem('theme',isDark?'dark':'light')}
    function loadTheme(){if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');document.body.classList.remove('light');themeToggle.innerHTML='<i class="fas fa-sun"></i> Светлая тема'}}
    function addToHistory(q){if(!q||q.length<2)return;searchHistory=[q,...searchHistory.filter(h=>h!==q)].slice(0,7);localStorage.setItem('searchHistory',JSON.stringify(searchHistory));renderHistory()}
    function clearHistory(){searchHistory=[];localStorage.removeItem('searchHistory');renderHistory()}
    function renderHistory(){const cont=document.getElementById('historyContainer');if(!searchHistory.length){cont.innerHTML='<span style="font-size:0.8rem;color:#94a3b8;">Нет истории</span>';return}cont.innerHTML=searchHistory.map(q=>`<div class="history-item" data-query="${q}"><span>${q}</span><button class="delete-history" data-query="${q}">&times;</button></div>`).join('');document.querySelectorAll('.history-item span').forEach(el=>el.addEventListener('click',(e)=>{if(!e.target.classList.contains('delete-history')){searchInput.value=el.parentElement.dataset.query;performSearch(true,true)}}));document.querySelectorAll('.delete-history').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation();searchHistory=searchHistory.filter(h=>h!==btn.dataset.query);localStorage.setItem('searchHistory',JSON.stringify(searchHistory));renderHistory()}))}
    function escapeHtml(text){if(!text)return'';return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
</body>
</html>
