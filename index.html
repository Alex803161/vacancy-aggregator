<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Агрегатор вакансий | HeadHunter Proxy</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; padding: 24px 16px; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; transition: background 0.2s, color 0.2s; }
        body.light { background: #f3f4f6; color: #0f172a; }
        body.dark { background: #0f172a; color: #e2e8f0; }
        .container { max-width: 1280px; margin: 0 auto; width: 100%; flex: 1; }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #0047cc, #3b82f6); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 6px; }
        .search-bar { display: flex; gap: 12px; margin-bottom: 24px; background: white; border-radius: 60px; padding: 6px; border: 2px solid #cbd5e1; }
        body.dark .search-bar { background: #1e293b; border-color: #475569; }
        .search-bar:focus-within { border-color: #0047cc; }
        .search-input { flex: 1; padding: 14px 18px; font-size: 1rem; border: none; outline: none; background: transparent; }
        .search-btn { background: linear-gradient(180deg, #0055e6 0%, #0039a6 100%); color: white; border: none; padding: 0 28px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .main-layout { display: flex; gap: 28px; margin-bottom: 32px; flex-wrap: wrap; }
        .sidebar { width: 280px; flex-shrink: 0; background: white; border-radius: 24px; padding: 20px; border: 1px solid #e2e8f0; align-self: start; position: sticky; top: 24px; }
        body.dark .sidebar { background: #1e293b; border-color: #334155; }
        .content-area { flex: 1; min-width: 0; }
        .vacancies-list { display: flex; flex-direction: column; gap: 16px; }
        .vacancy-card { background: white; border-radius: 20px; padding: 18px 20px; border: 1px solid #e2e8f0; position: relative; cursor: pointer; transition: all 0.2s ease; }
        body.dark .vacancy-card { background: #1e293b; border-color: #334155; }
        .vacancy-card:hover { transform: translateY(-2px); box-shadow: 0 8px 16px -4px rgba(0,0,0,0.1); }
        .job-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; padding-right: 40px; }
        .salary { font-size: 1.25rem; font-weight: 700; color: #059669; margin-bottom: 8px; }
        body.dark .salary { color: #34d399; }
        .company-name { font-weight: 600; }
        .meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; font-size: 0.8rem; }
        .save-btn { position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 50%; background: #f8fafc; border: 1px solid #e2e8f0; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; transition: 0.2s; color: #94a3b8; }
        body.dark .save-btn { background: #334155; border-color: #475569; }
        .save-btn.saved { background: #ff6b6b; color: white; border-color: #dc2626; }
        .theme-switch { position: fixed; bottom: 24px; right: 24px; background: #0047cc; color: white; border: none; border-radius: 40px; padding: 10px 16px; z-index: 100; cursor: pointer; font-size: 0.9rem; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; width: 90%; max-width: 700px; height: 80%; border-radius: 28px; padding: 24px; overflow-y: auto; position: relative; }
        body.dark .modal { background: #1e293b; }
        .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 2rem; cursor: pointer; color: inherit; }
        .btn { font-weight: 600; font-size: 0.85rem; cursor: pointer; border: none; padding: 9px 16px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; }
        .btn-respond { background: linear-gradient(180deg, #0055e6 0%, #0039a6 100%); color: white; }
        .btn-share { background: transparent; border: 1px solid #cbd5e1; }
        body.dark .btn-share { border-color: #475569; }
        .skeleton-card { height: 120px; background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); border-radius: 20px; margin-bottom: 16px; background-size: 200% 100%; animation: shimmer 1.2s infinite; }
        body.dark .skeleton-card { background: linear-gradient(90deg, #334155 25%, #475569 50%, #334155 75%); }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .history-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .history-item { padding: 6px 12px; border-radius: 30px; font-size: 0.75rem; cursor: pointer; background: #eef2ff; display: inline-flex; align-items: center; gap: 6px; }
        body.dark .history-item { background: #334155; }
        .history-item button { background: none; border: none; cursor: pointer; font-size: 1rem; line-height: 1; color: inherit; }
        .clear-history { background: none; border: none; font-size: 0.7rem; cursor: pointer; color: #0047cc; }
        .counter { padding: 6px 14px; border-radius: 40px; font-size: 0.9rem; background: #e0e7ff; color: #0047cc; display: inline-block; margin-bottom: 16px; }
        body.dark .counter { background: #334155; color: #cbd5e1; }
        .footer { text-align: center; margin-top: 40px; padding: 20px; border-top: 1px solid #e2e8f0; font-size: 0.9rem; }
        body.dark .footer { border-color: #334155; }
        .filter-group { margin-bottom: 20px; }
        .filter-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; color: #64748b; }
        .filter-select, .filter-input { width: 100%; padding: 10px 12px; border-radius: 16px; font-size: 0.9rem; border: 1px solid #cbd5e1; background: white; outline: none; }
        body.dark .filter-select, body.dark .filter-input { background: #1e293b; border-color: #475569; color: #e2e8f0; }
        .reset-sidebar-btn { width: 100%; padding: 10px; border-radius: 40px; font-weight: 500; border: 1px solid #cbd5e1; background: #f1f5f9; cursor: pointer; margin-top: 8px; }
        body.dark .reset-sidebar-btn { background: #334155; border-color: #475569; color: #cbd5e1; }
        @media (max-width: 768px) { .main-layout { flex-direction: column; } .sidebar { width: 100%; position: static; } }
    </style>
</head>
<body class="light">
<div class="container">
    <div class="header">
        <h1>Агрегатор вакансий</h1>
        <p>Поиск реальных вакансий через HeadHunter API</p>
    </div>
    <div class="search-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="Должность, компания, ключевые слова...">
        <button id="searchButton" class="search-btn"><i class="fas fa-search"></i> Найти</button>
    </div>
    <div class="main-layout">
        <aside class="sidebar">
            <h3><i class="fas fa-sliders-h"></i> Фильтры</h3>
            <div class="filter-group">
                <label>Город</label>
                <input type="text" id="filterCity" class="filter-input" placeholder="Москва">
            </div>
            <div class="filter-group">
                <label>Опыт</label>
                <select id="filterExperience" class="filter-select">
                    <option value="">Любой</option>
                    <option>Нет опыта</option>
                    <option>От 1 года до 3 лет</option>
                    <option>От 3 до 6 лет</option>
                    <option>Более 6 лет</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Зарплата от</label>
                <input type="number" id="filterSalaryFrom" class="filter-input" placeholder="0">
            </div>
            <button id="sortBySalary" class="btn" style="width:100%; margin-bottom:12px; background:#eef2ff; justify-content:center;"><i class="fas fa-arrow-up"></i> По зарплате</button>
            <div style="margin-top:20px">
                <h3><i class="fas fa-history"></i> История <button id="clearHistoryBtn" class="clear-history">Очистить</button></h3>
                <div id="historyContainer" class="history-badges"></div>
            </div>
            <button id="resetSidebarBtn" class="reset-sidebar-btn"><i class="fas fa-undo"></i> Сбросить</button>
        </aside>
        <div class="content-area">
            <div class="counter" id="counterDisplay">Найдено: <span>0</span></div>
            <div id="vacanciesContainer" class="vacancies-list"></div>
            <div id="loadMoreWrapper" style="text-align:center; display:none;"><button id="loadMoreBtn" style="background:white; border:2px solid #0047cc; color:#0047cc; padding:12px 32px; border-radius:40px; font-weight:600; cursor:pointer;">Загрузить ещё</button></div>
        </div>
    </div>
    <div class="footer">© 2026 Агрегатор вакансий</div>
</div>
<div id="modalOverlay" class="modal-overlay">
    <div class="modal" id="modalContent">
        <button class="modal-close" id="modalClose">&times;</button>
        <div id="modalBody"></div>
    </div>
</div>
<button id="themeToggle" class="theme-switch"><i class="fas fa-moon"></i> Тёмная тема</button>

<script src="api.js?v=2"></script>
<script>
    // Глобальные переменные
    let allVacancies = [], displayedCount = 0, sortBySalary = false;
    const PAGE_SIZE = 10;
    let savedVacancies = JSON.parse(localStorage.getItem('savedVacancies')) || [];
    let searchHistory = JSON.parse(localStorage.getItem('searchHistory')) || [];

    // DOM-элементы
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchButton');
    const vacanciesContainer = document.getElementById('vacanciesContainer');
    const counterSpan = document.querySelector('#counterDisplay span');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const loadMoreWrapper = document.getElementById('loadMoreWrapper');
    const filterCity = document.getElementById('filterCity');
    const filterExperience = document.getElementById('filterExperience');
    const filterSalaryFrom = document.getElementById('filterSalaryFrom');
    const sortBySalaryBtn = document.getElementById('sortBySalary');
    const resetSidebarBtn = document.getElementById('resetSidebarBtn');
    const themeToggle = document.getElementById('themeToggle');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');
    const modalBody = document.getElementById('modalBody');
    const historyContainer = document.getElementById('historyContainer');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');

    // Обработчики событий
    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
    loadMoreBtn.addEventListener('click', loadMore);
    filterCity.addEventListener('input', applyFilters);
    filterExperience.addEventListener('change', applyFilters);
    filterSalaryFrom.addEventListener('input', applyFilters);
    sortBySalaryBtn.addEventListener('click', toggleSort);
    resetSidebarBtn.addEventListener('click', resetFilters);
    themeToggle.addEventListener('click', toggleTheme);
    modalClose.addEventListener('click', () => modalOverlay.classList.remove('active'));
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('active'); });
    clearHistoryBtn.addEventListener('click', clearHistory);

    // Инициализация
    renderHistory();
    loadTheme();

    // Поиск
    async function performSearch() {
        const query = searchInput.value.trim();
        if (!query) return;
        addToHistory(query);
        vacanciesContainer.innerHTML = '<div class="skeleton-card"></div>'.repeat(5);
        counterSpan.textContent = '0';
        loadMoreWrapper.style.display = 'none';
        displayedCount = 0;
        try {
            allVacancies = await fetchVacanciesFromAPI(query);
            applyFilters();
            if (allVacancies.length > 0) counterSpan.textContent = allVacancies.length;
        } catch (e) {
            vacanciesContainer.innerHTML = '<p style="text-align:center;">Ошибка загрузки вакансий</p>';
            console.error(e);
        }
    }

    // Подгрузка
    function loadMore() {
        const nextItems = allVacancies.slice(displayedCount, displayedCount + PAGE_SIZE);
        renderVacancies(nextItems);
        displayedCount += nextItems.length;
        if (displayedCount >= allVacancies.length) loadMoreWrapper.style.display = 'none';
    }

    // Фильтрация
    function applyFilters() {
        let filtered = [...allVacancies];
        const city = filterCity.value.trim().toLowerCase();
        const exp = filterExperience.value;
        const salaryFrom = parseInt(filterSalaryFrom.value) || 0;

        if (city) filtered = filtered.filter(v => v.city && v.city.toLowerCase().includes(city));
        if (exp) filtered = filtered.filter(v => v.experience === exp);
        if (salaryFrom) filtered = filtered.filter(v => v.salary_from && v.salary_from >= salaryFrom);

        if (sortBySalary) filtered.sort((a,b) => (b.salary_from || 0) - (a.salary_from || 0));

        vacanciesContainer.innerHTML = '';
        displayedCount = 0;
        counterSpan.textContent = filtered.length;

        if (filtered.length === 0) {
            vacanciesContainer.innerHTML = '<p style="text-align:center;">Ничего не найдено</p>';
            loadMoreWrapper.style.display = 'none';
            return;
        }

        const firstPage = filtered.slice(0, PAGE_SIZE);
        renderVacancies(firstPage);
        displayedCount += firstPage.length;
        loadMoreWrapper.style.display = displayedCount < filtered.length ? 'block' : 'none';
    }

    // Рендер карточек
    function renderVacancies(vacancies) {
        vacancies.forEach(v => {
            const card = document.createElement('div');
            card.className = 'vacancy-card';
            card.innerHTML = `
                <div class="job-title">${v.title || 'Без названия'}</div>
                <div class="salary">${v.salary || 'З/П не указана'}</div>
                <div class="meta-row">
                    <span class="company-name">${v.company || 'Компания не указана'}</span>
                    <span>${v.city || ''}</span>
                    <span>${v.experience || ''}</span>
                </div>
                <p>${(v.description || '').substring(0, 200)}...</p>
                <button class="save-btn ${savedVacancies.includes(v.id) ? 'saved' : ''}" data-id="${v.id}">
                    <i class="fas fa-heart"></i>
                </button>
            `;
            card.addEventListener('click', (e) => {
                if (!e.target.closest('.save-btn')) showModal(v);
            });
            card.querySelector('.save-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleSaved(v.id, card.querySelector('.save-btn'));
            });
            vacanciesContainer.appendChild(card);
        });
    }

    // Модальное окно
    function showModal(vacancy) {
        modalBody.innerHTML = `
            <h2 style="margin-bottom:16px">${vacancy.title || 'Без названия'}</h2>
            <p><strong>Компания:</strong> ${vacancy.company || '—'}</p>
            <p><strong>Зарплата:</strong> ${vacancy.salary || '—'}</p>
            <p><strong>Город:</strong> ${vacancy.city || '—'}</p>
            <p><strong>Опыт:</strong> ${vacancy.experience || '—'}</p>
            <p style="margin-top:16px">${vacancy.description || ''}</p>
            <p>${vacancy.requirements || ''}</p>
            <div style="display:flex; gap:12px; margin-top:20px;">
                <a href="${vacancy.link}" target="_blank" class="btn btn-respond">Откликнуться</a>
                <button id="shareBtn" class="btn btn-share"><i class="fas fa-share-alt"></i> Поделиться</button>
            </div>
        `;
        document.getElementById('shareBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(vacancy.link).then(() => alert('Ссылка скопирована!'));
        });
        modalOverlay.classList.add('active');
    }

    // Избранное
    function toggleSaved(id, btn) {
        if (savedVacancies.includes(id)) {
            savedVacancies = savedVacancies.filter(v => v !== id);
            btn.classList.remove('saved');
        } else {
            savedVacancies.push(id);
            btn.classList.add('saved');
        }
        localStorage.setItem('savedVacancies', JSON.stringify(savedVacancies));
    }

    // Сортировка
    function toggleSort() {
        sortBySalary = !sortBySalary;
        sortBySalaryBtn.innerHTML = sortBySalary ? '<i class="fas fa-arrow-down"></i> Отменить сортировку' : '<i class="fas fa-arrow-up"></i> По зарплате';
        applyFilters();
    }

    // Сброс фильтров
    function resetFilters() {
        filterCity.value = '';
        filterExperience.value = '';
        filterSalaryFrom.value = '';
        sortBySalary = false;
        sortBySalaryBtn.innerHTML = '<i class="fas fa-arrow-up"></i> По зарплате';
        applyFilters();
    }

    // Тёмная тема
    function toggleTheme() {
        document.body.classList.toggle('dark');
        document.body.classList.toggle('light');
        const isDark = document.body.classList.contains('dark');
        themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i> Светлая тема' : '<i class="fas fa-moon"></i> Тёмная тема';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    function loadTheme() {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            document.body.classList.remove('light');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i> Светлая тема';
        }
    }

    // История поиска
    function addToHistory(q) {
        searchHistory = [q, ...searchHistory.filter(h => h !== q)].slice(0,7);
        localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
        renderHistory();
    }
    function removeFromHistory(q) {
        searchHistory = searchHistory.filter(h => h !== q);
        localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
        renderHistory();
    }
    function clearHistory() {
        searchHistory = [];
        localStorage.removeItem('searchHistory');
        renderHistory();
    }
    function renderHistory() {
        if (!searchHistory.length) {
            historyContainer.innerHTML = '<span style="font-size:0.75rem;color:#94a3b8;">Пусто</span>';
            return;
        }
        historyContainer.innerHTML = searchHistory.map(q => `
            <div class="history-item" data-query="${q}">
                <span>${q}</span>
                <button class="delete-history" data-query="${q}">&times;</button>
            </div>
        `).join('');
        document.querySelectorAll('.history-item span').forEach(el => el.addEventListener('click', (e) => {
            if (!e.target.classList.contains('delete-history')) {
                searchInput.value = el.parentElement.dataset.query;
                performSearch();
            }
        }));
        document.querySelectorAll('.delete-history').forEach(btn => btn.addEventListener('click', (e) => {
            e.stopPropagation();
            removeFromHistory(btn.dataset.query);
        }));
    }

    // Бесконечный скролл
    window.addEventListener('scroll', () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            if (displayedCount < allVacancies.length) loadMore();
        }
    });
</script>
</body>
</html>
