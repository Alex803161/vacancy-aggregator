    <style>

<body>
    <button id="backToTopBtn"><i class="fas fa-arrow-up"></i></button>
    <div class="container">

            <h1><span class="logo-heart"></span> Ваканса</h1>
            <p>Работа найдётся — и не одна</p>
        </div>

        <div class="search-section">
            <div class="search-row">
                <input type="text" id="searchInput" class="search-input" placeholder="Должность, компания, город..." autocomplete="off">
                <button id="searchButton" class="search-btn"><i class="fas fa-search"></i> Найти</button>
            </div>
            <div class="filters-grid">

                </div>
                <div class="filter-group">
                    <label>Опыт</label>

                        <option>Нет опыта</option>

                </div>
                <div class="filter-group">

                        <option value="">Любая</option>

                        <option value="part">Частичная</option>

                    </select>
                </div>
                <div class="filter-group">
                    <label>Зарплата от</label>

            <div class="sort-btns">

        <div id="vacanciesContainer" class="vacancies-list"></div>

                    <input type="email" id="subscribeEmailInput" class="subscribe-input" placeholder="Ваш email" required>
                    <button type="submit" class="subscribe-btn">Подписаться</button>

        <div class="extra-sections">
            <div class="section-title">🎯 Популярные компании</div>
            <div class="companies-grid">
                <div class="company-card" data-search="Магнит">Магнит</div>
                <div class="company-card" data-search="Пятёрочка">Пятёрочка</div>
                <div class="company-card" data-search="Сбер">Сбер</div>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="privacy.html">Политика конфиденциальности</a>

        </div>
        <div class="footer-copy">© 2026 Ваканса. Все права защищены.</div>
    </footer>

    <button id="themeToggle" class="theme-switch"><i class="fas fa-moon"></i> Тёмная тема</button>

    <script>
        const API_URL = "https://functions.yandexcloud.net/d4enif5klq871kh78jdp";
        let allVacancies = [], filteredVacancies = [], displayedCount = 0, currentSort = "publication_time";
        const PAGE_SIZE = 20;
        let savedVacancies = JSON.parse(localStorage.getItem("savedVacancies")) || [];
        let searchHistory = JSON.parse(localStorage.getItem("searchHistory")) || [];
        let currentArea = "113";
        const cityNameMap = { "1": "Москва", "2": "Санкт-Петербург" };

        const CACHE_TTL = 5 * 60 * 1000;
        const searchCache = new Map();
        function getCachedResult(key) { const cached = searchCache.get(key); if (!cached) return null; if (Date.now() - cached.timestamp > CACHE_TTL) { searchCache.delete(key); return null; } return cached.data; }
        function setCachedResult(key, data) { searchCache.set(key, { timestamp: Date.now(), data: data }); }

        async function fetchVacanciesFromAPI(query, filters = {}) {
            const params = new URLSearchParams();
            if (query) params.set("text", query);
            if (filters.area) params.set("area", filters.area);
            if (filters.employment) params.set("employment", filters.employment);
            if (filters.order_by) params.set("order_by", filters.order_by);
            const perPage = filters.per_page || 30;
            params.set("per_page", perPage);
            if (filters.page !== undefined) params.set("page", filters.page);
            const url = `${API_URL}?${params.toString()}`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data && Array.isArray(data.items)) return data.items;
            if (Array.isArray(data)) return data;
            return [];
        }

        const searchInput = document.getElementById("searchInput");
        const searchBtn = document.getElementById("searchButton");
        const vacanciesContainer = document.getElementById("vacanciesContainer");
        const counterSpan = document.querySelector("#counterDisplay span");
        const loadMoreBtn = document.getElementById("loadMoreBtn");
        const loadMoreWrapper = document.getElementById("loadMoreWrapper");
        const filterCity = document.getElementById("filterCity");
        const filterExperience = document.getElementById("filterExperience");
        const filterEmployment = document.getElementById("filterEmployment");
        const filterSalaryFrom = document.getElementById("filterSalaryFrom");
        const sortByDateBtn = document.getElementById("sortByDate");
        const sortBySalaryBtn = document.getElementById("sortBySalary");
        const resetButton = document.getElementById("resetButton");
        const themeToggle = document.getElementById("themeToggle");
        const clearHistoryBtn = document.getElementById("clearHistoryBtn");
        const backToTopBtn = document.getElementById("backToTopBtn");
        const historyContainer = document.getElementById("historyContainer");
        const subscribeForm = document.getElementById("subscribeForm");
        const subscribeEmailInput = document.getElementById("subscribeEmailInput");
        const subscribeStatus = document.getElementById("subscribeStatus");

        function sendGAEvent(eventName, params = {}) {
            if (typeof gtag === "function") {
                gtag("event", eventName, params);
                console.log("GA4 event sent:", eventName, params);
            } else {
                console.warn("gtag not ready");
            }
        }

        async function performSearch(reset = true, recordHistory = true) {
            searchInput.blur();
            if (reset) { allVacancies = []; filteredVacancies = []; displayedCount = 0; vacanciesContainer.innerHTML = ""; loadMoreWrapper.style.display = "none"; }
            const query = searchInput.value.trim();
            if (recordHistory) addToHistory(query);
            if (reset) { vacanciesContainer.innerHTML = '<div class="vacancy-card" style="height:100px; background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%); background-size:200% 100%; animation: shimmer 1.2s infinite;"></div>'.repeat(8); counterSpan.textContent = "0"; }
            const originalHTML = searchBtn.innerHTML;
            searchBtn.disabled = true;
            searchBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Поиск...';
            try {
                const cacheKey = `${query}_${currentArea}_${filterEmployment.value}_${currentSort}`;
                const cachedData = getCachedResult(cacheKey);
                if (cachedData) { allVacancies = cachedData; applyFilters(); searchBtn.disabled = false; searchBtn.innerHTML = originalHTML; return; }
                const filters = { employment: filterEmployment.value, order_by: currentSort, area: currentArea, per_page: 30, page: 0 };
                allVacancies = await fetchVacanciesFromAPI(query, filters);
                setCachedResult(cacheKey, allVacancies);
                applyFilters();
                sendGAEvent("search", { search_term: query });
                if (window.innerWidth <= 768) { setTimeout(() => vacanciesContainer.scrollIntoView({ behavior: "smooth", block: "start" }), 150); }
            } catch(e) { vacanciesContainer.innerHTML = '<p style="text-align:center; padding:40px;">⚠️ Ошибка загрузки</p>'; console.error(e); allVacancies = []; filteredVacancies = []; }
            finally { searchBtn.disabled = false; searchBtn.innerHTML = originalHTML; }
        }

        function applyFilters() {
            let filtered = [...allVacancies];
            const exp = filterExperience.value;
            if (exp) filtered = filtered.filter(v => v.experience === exp);
            const emp = filterEmployment.value;
            if (emp) filtered = filtered.filter(v => v.employment === emp);
            const salaryFrom = parseInt(filterSalaryFrom.value.replace(/\s/g, "")) || 0;
            if (salaryFrom) filtered = filtered.filter(v => v.salary_from && v.salary_from >= salaryFrom);
            if (currentArea !== "113" && cityNameMap[currentArea]) { const targetCity = cityNameMap[currentArea]; filtered = filtered.filter(v => v.area === targetCity); }
            if (currentSort === "salary_desc") { filtered.sort((a, b) => (b.salary_from || 0) - (a.salary_from || 0)); }
            else if (currentSort === "publication_time") { filtered.sort((a, b) => new Date(b.published_at) - new Date(a.published_at)); }
            filteredVacancies = filtered;
            vacanciesContainer.innerHTML = "";
            displayedCount = 0;
            counterSpan.textContent = filtered.length;
            if (filtered.length === 0) { vacanciesContainer.innerHTML = `<div style="text-align:center; padding:40px;">🔍 Ничего не найдено<br><button id="emptyStateResetBtn" style="margin-top:12px; background:#0047cc; color:white; border:none; padding:8px 20px; border-radius:40px;">Сбросить фильтры</button></div>`; loadMoreWrapper.style.display = "none"; document.getElementById("emptyStateResetBtn")?.addEventListener("click", () => resetFilters()); return; }
            const firstPage = filtered.slice(0, PAGE_SIZE);
            renderVacancies(firstPage);
            displayedCount += firstPage.length;
            updateLoadMoreButton();
        }

        function renderVacancies(vacancies) {
            vacancies.forEach(v => {
                const vac = enrich(v);
                const isSaved = savedVacancies.includes(vac.id);
                const card = document.createElement("div");
                card.className = "vacancy-card";
                card.dataset.id = vac.id;
                let contactButton = "";
                if (vac.phone) { contactButton = `<a href="tel:${vac.phone}" class="btn-call" data-vacancy-id="${vac.id}" data-vacancy-title="${vac.title}" data-vacancy-company="${vac.company}"><i class="fas fa-phone-alt"></i> Позвонить</a>`; }
                else if (vac.email) { contactButton = `<a href="mailto:${vac.email}" class="btn-email" data-vacancy-id="${vac.id}" data-vacancy-title="${vac.title}" data-vacancy-company="${vac.company}"><i class="fas fa-envelope"></i> Написать</a>`; }
                const logoSrc = vac.logoUrl ? `<img src="${vac.logoUrl}" alt="${vac.company}" loading="lazy" style="width:100%; height:100%; object-fit:cover;">` : vac.logoLetter;
                card.innerHTML = `<button class="save-btn ${isSaved ? "saved" : ""}" data-id="${vac.id}"><i class="fas fa-heart"></i></button><div class="job-title"><span>${escapeHtml(vac.title)}</span>${vac.publishedDate ? `<span class="date-badge">${vac.publishedDate}</span>` : ""}</div><div class="salary">${vac.salary}</div><div class="tags">${vac.employment ? `<span class="tag">${escapeHtml(vac.employment)}</span>` : ""}${vac.schedule ? `<span class="tag">${escapeHtml(vac.schedule)}</span>` : ""}<span class="tag">${escapeHtml(vac.experience)}</span></div><div class="company-block"><div class="logo-placeholder" style="background:${vac.logoUrl ? "transparent" : vac.logoColor}">${logoSrc}</div><div><div class="company-name">${escapeHtml(vac.company)}</div><div class="rating-row">⭐ ${vac.rating} • ${vac.reviews.toLocaleString()} отзывов</div></div></div><div class="address">${escapeHtml(vac.city)}</div><div class="card-actions"><button class="btn-respond" data-vacancy-id="${vac.id}" data-vacancy-title="${vac.title}" data-vacancy-company="${vac.company}"><i class="fas fa-paper-plane"></i> Откликнуться</button>${contactButton}<button class="btn-contact share-card-btn" data-link="${vac.link}"><i class="fas fa-share-alt"></i> Поделиться</button></div>`;
                vacanciesContainer.appendChild(card);
            });
            document.querySelectorAll(".btn-respond").forEach(btn => { btn.removeEventListener("click", respondClickHandler); btn.addEventListener("click", respondClickHandler); });
            document.querySelectorAll(".btn-call, .btn-email").forEach(btn => { btn.removeEventListener("click", contactClickHandler); btn.addEventListener("click", contactClickHandler); });
        }

        function respondClickHandler(e) { e.stopPropagation(); const btn = e.currentTarget; sendGAEvent("click_respond", { vacancy_id: btn.dataset.vacancyId, vacancy_title: btn.dataset.vacancyTitle, vacancy_company: btn.dataset.vacancyCompany }); const vacancy = allVacancies.find(v => v.id == btn.dataset.vacancyId); if (vacancy) goToVacancy(vacancy.id); }
        function contactClickHandler(e) { e.stopPropagation(); const btn = e.currentTarget; const contactType = btn.classList.contains("btn-call") ? "phone" : "email"; sendGAEvent("click_contact", { contact_type: contactType, vacancy_id: btn.dataset.vacancyId, vacancy_title: btn.dataset.vacancyTitle, vacancy_company: btn.dataset.vacancyCompany }); }
        function loadMore() { if (displayedCount < filteredVacancies.length) { const nextItems = filteredVacancies.slice(displayedCount, displayedCount + PAGE_SIZE); renderVacancies(nextItems); displayedCount += nextItems.length; updateLoadMoreButton(); } }
        function updateLoadMoreButton() { if (displayedCount >= filteredVacancies.length) { loadMoreBtn.textContent = "Вакансий больше нет"; loadMoreBtn.disabled = true; } else { loadMoreBtn.textContent = "Загрузить ещё"; loadMoreBtn.disabled = false; } loadMoreWrapper.style.display = "block"; }
        function setSort(sort) { currentSort = sort; sortByDateBtn.classList.toggle("active", sort === "publication_time"); sortBySalaryBtn.classList.toggle("active", sort === "salary_desc"); applyFilters(); }
        function resetFilters() { filterCity.value = ""; filterExperience.value = ""; filterEmployment.value = ""; filterSalaryFrom.value = ""; currentArea = "113"; setSort("publication_time"); performSearch(true, false); }
        function formatSalary(v) { if (!v.salary_from && !v.salary_to) return "З/П не указана"; let parts = []; if (v.salary_from) parts.push("от " + v.salary_from.toLocaleString()); if (v.salary_to) parts.push("до " + v.salary_to.toLocaleString()); let result = parts.join(" "); if (v.salary_currency) result += " " + (v.salary_currency === "RUR" ? "₽" : v.salary_currency); return result; }
        function enrich(v) { return { ...v, title: v.name || "Без названия", company: v.employer || "Компания не указана", city: v.area || "", link: v.url || "#", experience: v.experience || "Не указан", employment: v.employment || "", schedule: v.schedule || "", salary: formatSalary(v), rating: v.employer_rating || (Math.random() * 2 + 3).toFixed(1), reviews: v.employer_reviews || Math.floor(Math.random() * 5000) + 100, logoLetter: (v.employer || "А").charAt(0).toUpperCase(), logoColor: ["#e0e7ff","#dbeafe","#ede9fe","#fce7f3","#ffedd5","#dcfce7"][(v.employer || "А").charCodeAt(0) % 6], phone: v.phone || null, email: v.email || null, logoUrl: v.logo_url || null, publishedDate: formatPublishedDate(v.published_at) }; }
        function formatPublishedDate(dateString) { if (!dateString) return ""; const pubDate = new Date(dateString); const now = new Date(); const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()); const pubDay = new Date(pubDate.getFullYear(), pubDate.getMonth(), pubDate.getDate()); const diffDays = Math.floor((today - pubDay) / (1000 * 60 * 60 * 24)); if (diffDays === 0) return "сегодня"; if (diffDays === 1) return "вчера"; if (diffDays <= 7) return diffDays + " дня назад"; return pubDate.toLocaleDateString("ru-RU", { day: "numeric", month: "long", year: "numeric" }); }
        function goToVacancy(id) { const vac = allVacancies.find(v => v.id == id); if (vac) { localStorage.setItem("selectedVacancy", JSON.stringify(vac)); window.open("vacancy.html", "_blank"); } }
        function toggleSaved(id, btn) { if (savedVacancies.includes(id)) { savedVacancies = savedVacancies.filter(v => v !== id); btn.classList.remove("saved"); } else { savedVacancies.push(id); btn.classList.add("saved"); } localStorage.setItem("savedVacancies", JSON.stringify(savedVacancies)); }
        function addToHistory(q) { if (!q || q.length < 2) return; searchHistory = [q, ...searchHistory.filter(h => h !== q)].slice(0, 7); localStorage.setItem("searchHistory", JSON.stringify(searchHistory)); renderHistory(); }
        function clearHistory() { searchHistory = []; localStorage.removeItem("searchHistory"); renderHistory(); }
        function renderHistory() { if (!searchHistory.length) { historyContainer.innerHTML = '<button id="clearHistoryBtn" class="clear-history">Очистить историю</button>'; document.getElementById("clearHistoryBtn")?.addEventListener("click", clearHistory); return; } historyContainer.innerHTML = searchHistory.map(q => `<div class="history-item" data-query="${q}"><span>${q}</span><button class="delete-history" data-query="${q}">&times;</button></div>`).join(""); document.querySelectorAll(".history-item span").forEach(el => { el.addEventListener("click", (e) => { if (!e.target.classList.contains("delete-history")) { searchInput.value = el.parentElement.dataset.query; performSearch(true, true); } }); }); document.querySelectorAll(".delete-history").forEach(btn => { btn.addEventListener("click", (e) => { e.stopPropagation(); searchHistory = searchHistory.filter(h => h !== btn.dataset.query); localStorage.setItem("searchHistory", JSON.stringify(searchHistory)); renderHistory(); }); }); const clearBtn = document.createElement("button"); clearBtn.textContent = "Очистить историю"; clearBtn.className = "clear-history"; clearBtn.addEventListener("click", clearHistory); historyContainer.appendChild(clearBtn); }
        function toggleTheme() { document.body.classList.toggle("dark"); document.body.classList.toggle("light"); const isDark = document.body.classList.contains("dark"); themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i> Светлая тема' : '<i class="fas fa-moon"></i> Тёмная тема'; localStorage.setItem("theme", isDark ? "dark" : "light"); }
        function loadTheme() { if (localStorage.getItem("theme") === "dark") { document.body.classList.add("dark"); document.body.classList.remove("light"); themeToggle.innerHTML = '<i class="fas fa-sun"></i> Светлая тема'; } }
        function escapeHtml(text) { if (!text) return ""; return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

        subscribeForm.addEventListener("submit", async (e) => { e.preventDefault(); const email = subscribeEmailInput.value.trim(); if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { subscribeStatus.textContent = "Введите корректный email"; subscribeStatus.style.color = "red"; return; } subscribeStatus.textContent = "Отправка..."; try { const response = await fetch(`${API_URL}?action=subscribe&email=${encodeURIComponent(email)}`); const data = await response.json(); if (data.status === "ok") { subscribeStatus.textContent = "✅ Подписка оформлена!"; subscribeStatus.style.color = "green"; subscribeEmailInput.value = ""; } else { subscribeStatus.textContent = "❌ Ошибка: " + data.message; subscribeStatus.style.color = "red"; } } catch(err) { subscribeStatus.textContent = "❌ Ошибка соединения"; subscribeStatus.style.color = "red"; } });

        window.addEventListener("scroll", () => { backToTopBtn.style.display = window.scrollY > 300 ? "block" : "none"; });
        backToTopBtn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
        searchBtn.addEventListener("click", () => performSearch(true, true));
        searchInput.addEventListener("keypress", (e) => { if (e.key === "Enter") performSearch(true, true); });
        loadMoreBtn.addEventListener("click", loadMore);
        filterCity.addEventListener("change", () => { currentArea = filterCity.value || "113"; performSearch(true, false); });
        filterExperience.addEventListener("change", applyFilters);
        filterEmployment.addEventListener("change", applyFilters);
        filterSalaryFrom.addEventListener("input", applyFilters);
        sortByDateBtn.addEventListener("click", () => setSort("publication_time"));
        sortBySalaryBtn.addEventListener("click", () => setSort("salary_desc"));
        resetButton.addEventListener("click", resetFilters);
        themeToggle.addEventListener("click", toggleTheme);
        clearHistoryBtn.addEventListener("click", clearHistory);
        document.querySelectorAll("[data-search]").forEach(el => { el.addEventListener("click", () => { searchInput.value = el.dataset.search; performSearch(true, false); setTimeout(() => vacanciesContainer.scrollIntoView({ behavior: "smooth", block: "start" }), 100); }); });
        vacanciesContainer.addEventListener("click", (e) => { const card = e.target.closest(".vacancy-card"); if (!card) return; const id = card.dataset.id; if (e.target.closest(".save-btn")) { toggleSaved(id, e.target.closest(".save-btn")); return; } if (e.target.closest(".share-card-btn")) { const link = e.target.closest(".share-card-btn").dataset.link; if (link) navigator.clipboard.writeText(link).then(() => alert("Ссылка скопирована!")); return; } goToVacancy(id); });
        renderHistory();
        loadTheme();
        performSearch(true);
    </script>
</body>
</html>
