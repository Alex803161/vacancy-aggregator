<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Агрегатор вакансий</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; padding: 10px; font-size: 16px; }
        .search-bar button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .vacancy-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .vacancy-card h2 { margin: 0 0 10px; font-size: 20px; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Агрегатор вакансий</h1>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Введите запрос, например Python">
        <button id="searchButton">Найти</button>
    </div>
    <div id="results"></div>

    <script src="api.js?v=2"></script>
    <script>
        document.getElementById('searchButton').addEventListener('click', performSearch);
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });

        function performSearch() {
            var query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            var resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Загрузка...</p>';

            fetchVacanciesFromAPI(query)
                .then(function(vacancies) {
                    if (!vacancies || vacancies.length === 0) {
                        resultsDiv.innerHTML = '<p>Ничего не найдено</p>';
                        return;
                    }
                    var html = '';
                    for (var i = 0; i < vacancies.length; i++) {
                        var v = vacancies[i];
                        html += '<div class="vacancy-card">' +
                            '<h2><a href="' + v.link + '" target="_blank">' + v.title + '</a></h2>' +
                            '<p><strong>Компания:</strong> ' + v.company + '</p>' +
                            '<p><strong>Город:</strong> ' + v.city + '</p>' +
                            '<p><strong>Зарплата:</strong> ' + v.salary + '</p>' +
                            '<p>' + (v.description || '') + '</p>' +
                            '</div>';
                    }
                    resultsDiv.innerHTML = html;
                })
                .catch(function(error) {
                    resultsDiv.innerHTML = '<p class="error">Ошибка: ' + error.message + '</p>';
                });
        }
    </script>
</body>
</html>
