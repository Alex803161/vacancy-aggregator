<body class="light">
<button id="backToTopBtn" title="Наверх"><i class="fas fa-arrow-up"></i></button>
<div class="container">
    <div class="header"><h1><span class="logo-heart"></span> Ваканса</h1><p>Работа найдётся — и не одна</p></div>
    <div class="page-title">Поиск вакансий</div>
    <div class="search-section">
        <div class="search-row">
            <input type="text" id="searchInput" class="search-input" placeholder="Должность, компания, город..." autocomplete="off">
            <button id="searchButton" class="search-btn"><span>Найти</span></button>
        </div>
        <div class="filters-grid">
            <div class="filter-group">
                <label>Город</label>
                <input type="text" id="filterCity" class="filter-input-small" placeholder="Введите город..." autocomplete="off">
                <div class="city-suggestions" id="citySuggestions"></div>
            </div>
            <div class="filter-group"><label>Опыт работы</label><select id="filterExperience" class="filter-select"><option value="">Любой</option><option>Нет опыта</option><option>От 1 года до 3 лет</option><option>От 3 до 6 лет</option><option>Более 6 лет</option></select></div>
            <div class="filter-group"><label>Тип занятости</label><select id="filterEmployment" class="filter-select"><option value="">Любая</option><option value="full">Полная</option><option value="part">Частичная</option><option value="remote">Удалённая</option><option value="probation">Стажировка</option></select></div>
            <div class="filter-group"><label>Зарплата от</label><input type="number" id="filterSalaryFrom" class="filter-input-small" placeholder="0" step="1000"></div>
        </div>
        <div style="display: flex; justify-content: space-between
