<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ваканса — поиск работы</title>
    <meta name="description" content="Агрегатор вакансий Ваканса — удобный поиск работы.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>">
    <style>
        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #0047cc;
            --shadow: rgba(0,0,0,0.04);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 24px 16px;
            color: var(--text-primary);
        }
        .container { max-width: 960px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-size: 2.5rem; font-weight: 800;
            background: linear-gradient(135deg, #0047cc, #3b82f6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .search-section {
            background: var(--surface);
            border-radius: 56px;
            padding: 6px;
            box-shadow: 0 4px 12px var(--shadow);
            margin-bottom: 24px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-input-wrapper { flex: 1; padding-left: 14px; }
        .search-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: none;
            outline: none;
            background: transparent;
        }
        .search-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            height: 50px;
        }
        .counter {
            background: #e0e7ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.9rem;
            color: var(--accent);
            margin-bottom: 16px;
            display: inline-block;
        }
        .vacancy-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 18px 20px;
            box-shadow: 0 2px 8px var(--shadow);
            margin-bottom: 12px;
        }
        .job-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
        .salary { font-size: 1.1rem; font-weight: 700; color: #059669; margin-bottom: 6px; }
        .company-name { font-weight: 600; color: var(--text-secondary); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💙 Ваканса</h1>
        <p style="color:#64748b;">Работа найдётся — и не одна</p>
    </div>

    <div class="search-section">
        <div class="search-input-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Должность, компания, город..." autocomplete="off">
        </div>
        <button id="searchButton" class="search-btn">Найти</button>
    </div>

    <div class="counter" id="counterDisplay">Найдено: <span>0</span></div>
    <div id="vacanciesContainer"></div>
</div>

<script src="api.js"></script>

<script>
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    async function performSearch(query) {
        const container = document.getElementById('vacanciesContainer');
        try {
            const results = await fetchVacanciesFromAPI(query);
            document.getElementById('counterDisplay').innerHTML = 'Найдено: <span>' + results.length + '</span>';
            
            if (!results.length) {
                container.innerHTML = '<p style="text-align:center;padding:40px;">Ничего не найдено</p>';
                return;
            }
            
            container.innerHTML = results.slice(0, 20).map(v => `
                <div class="vacancy-card">
                    <div class="job-title">${escapeHtml(v.title)}</div>
                    <div class="salary">${escapeHtml(v.salary)} <small>${escapeHtml(v.salary_details)}</small></div>
                    <div class="company-name">${escapeHtml(v.company)} — ${escapeHtml(v.experience)} — ${escapeHtml(v.city)}</div>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = '<p style="text-align:center;padding:40px;">Ошибка загрузки</p>';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        performSearch('');
        document.getElementById('searchButton').addEventListener('click', () => {
            performSearch(document.getElementById('searchInput').value);
        });
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') performSearch(e.target.value);
        });
    });
</script>
</body>
</html>
