<script>
    let allVacancies=[],filteredVacancies=[],displayedCount=0,currentSort='publication_time',map=null;
    const PAGE_SIZE=20;
    let savedVacancies=JSON.parse(localStorage.getItem('savedVacancies'))||[];

    let currentArea='';
    const searchInput=document.getElementById('searchInput'),searchBtn=document.getElementById('searchButton'),vacanciesContainer=document.getElementById('vacanciesContainer'),counterSpan=document.querySelector('#counterDisplay span'),loadMoreBtn=document.getElementById('loadMoreBtn'),loadMoreWrapper=document.getElementById('loadMoreWrapper'),filterCity=document.getElementById('filterCity'),filterExperience=document.getElementById('filterExperience'),filterEmployment=document.getElementById('filterEmployment'),filterSalaryFrom=document.getElementById('filterSalaryFrom'),sortByDateBtn=document.getElementById('sortByDate'),sortBySalaryBtn=document.getElementById('sortBySalary'),resetButton=document.getElementById('resetButton'),themeToggle=document.getElementById('themeToggle'),historyContainer=document.getElementById('historyContainer'),clearHistoryBtn=document.getElementById('clearHistoryBtn'),backToTopBtn=document.getElementById('backToTopBtn'),subscribeBtn=document.getElementById('subscribeBtn'),subscribeEmail=document.getElementById('subscribeEmail'),viewListBtn=document.getElementById('viewListBtn'),viewMapBtn=document.getElementById('viewMapBtn'),mapContainer=document.getElementById('mapContainer');

    searchBtn.addEventListener('click',()=>performSearch(true,true));
    searchInput.addEventListener('keypress',e=>{if(e.key==='Enter')performSearch(true,true)});
    loadMoreBtn.addEventListener('click',loadMore);
    filterCity.addEventListener('change',()=>{currentArea=filterCity.value;performSearch(true,false)});
    filterExperience.addEventListener('change',applyFilters);
    filterEmployment.addEventListener('change',applyFilters);
    filterSalaryFrom.addEventListener('input',applyFilters);
    sortByDateBtn.addEventListener('click',()=>{setSort('publication_time');applyFilters()});
    sortBySalaryBtn.addEventListener('click',()=>{setSort('salary_desc');applyFilters()});
    resetButton.addEventListener('click',resetFilters);
    themeToggle.addEventListener('click',toggleTheme);
    clearHistoryBtn.addEventListener('click',clearHistory);
    subscribeBtn.addEventListener('click',()=>{const email=subscribeEmail.value.trim();if(email&&email.includes('@')){localStorage.setItem('subscriptionEmail',email);alert('Вы подписаны на уведомления!')}else alert('Введите корректный email')});
    window.addEventListener('scroll',()=>{backToTopBtn.style.display=window.scrollY>300?'block':'none'});
    backToTopBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
    viewListBtn.addEventListener('click',()=>{viewListBtn.classList.add('active');viewMapBtn.classList.remove('active');vacanciesContainer.style.display='';mapContainer.style.display='none';if(map)map.remove();map=null});
    viewMapBtn.addEventListener('click',()=>{viewMapBtn.classList.add('active');viewListBtn.classList.remove('active');vacanciesContainer.style.display='none';mapContainer.style.display='block';if(!map)initMap();updateMapMarkers(filteredVacancies.slice(0,50))});
    document.querySelectorAll('[data-search]').forEach(el=>{el.addEventListener('click',()=>{searchInput.value=el.dataset.search;searchInput.blur();performSearch(true,false).then(()=>{setTimeout(()=>vacanciesContainer.scrollIntoView({behavior:'smooth',block:'start'}),100)})})});
    vacanciesContainer.addEventListener('click',e=>{const card=e.target.closest('.vacancy-card');if(!card)return;const id=card.dataset.id;if(e.target.closest('.save-btn')){toggleSaved(id,e.target.closest('.save-btn'));return}if(e.target.closest('.share-card-btn')){const link=e.target.closest('.share-card-btn').dataset.link;if(link)navigator.clipboard.writeText(link).then(()=>alert('Ссылка скопирована!'));return}if(e.target.closest('.btn-respond')){goToVacancy(id);return}goToVacancy(id)});
    async function performSearch(reset=true,recordHistory=true){
        searchInput.blur();
        if(reset){allVacancies=[];filteredVacancies=[];displayedCount=0;vacanciesContainer.innerHTML='';loadMoreWrapper.style.display='none'}
        const query=searchInput.value.trim();
        if(recordHistory)addToHistory(query);
        if(reset){vacanciesContainer.innerHTML='<div class="vacancy-card" style="height:100px; background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%); background-size:200% 100%; animation: shimmer 1.2s infinite;"></div>'.repeat(8);counterSpan.textContent='0'}
        try{
            const filters={employment:filterEmployment.value,order_by:currentSort,area:currentArea,per_page:100,page:0};
            const items=await fetchVacanciesFromAPI(query,filters);
            if(reset){allVacancies=items}else{allVacancies=allVacancies.concat(items)}
            applyFilters()
        }catch(e){vacanciesContainer.innerHTML='<p style="text-align:center; padding:40px;">Ошибка загрузки</p>';console.error(e);allVacancies=[];filteredVacancies=[]}
    }
    function loadMore(){if(displayedCount<filteredVacancies.length){const nextItems=filteredVacancies.slice(displayedCount,displayedCount+PAGE_SIZE);renderVacancies(nextItems);displayedCount+=nextItems.length;updateLoadMoreButton()}else{updateLoadMoreButton()}}
    function setSort(sort){currentSort=sort;sortByDateBtn.classList.toggle('active',sort==='publication_time');sortBySalaryBtn.classList.toggle('active',sort==='salary_desc')}
    function applyFilters(){
        let filtered=[...allVacancies];
        const exp=filterExperience.value;
        const salaryFrom=parseInt(filterSalaryFrom.value.replace(/\s/g,''))||0;
        const emp=filterEmployment.value;
        if(exp)filtered=filtered.filter(v=>v.experience===exp);
        if(salaryFrom)filtered=filtered.filter(v=>v.salary_from&&v.salary_from>=salaryFrom);
        if(emp)filtered=filtered.filter(v=>v.employment===emp);
        if(currentSort==='salary_desc')filtered.sort((a,b)=>(b.salary_from||0)-(a.salary_from||0));
        else if(currentSort==='publication_time')filtered.sort((a,b)=>new Date(b.published_at)-new Date(a.published_at));
        filteredVacancies=filtered;vacanciesContainer.innerHTML='';displayedCount=0;counterSpan.textContent=filtered.length;
        if(filtered.length===0){vacanciesContainer.innerHTML='<p style="text-align:center; padding:40px;">Ничего не найдено</p>';loadMoreWrapper.style.display='none';if(map)updateMapMarkers([]);return}
        const firstPage=filtered.slice(0,PAGE_SIZE);renderVacancies(firstPage);displayedCount+=firstPage.length;updateLoadMoreButton();if(map)updateMapMarkers(filtered.slice(0,50))
    }
    function updateLoadMoreButton(){if(displayedCount>=filteredVacancies.length){loadMoreBtn.textContent='Вакансий больше нет';loadMoreBtn.disabled=true}else{loadMoreBtn.textContent='Загрузить ещё';loadMoreBtn.disabled=false}loadMoreWrapper.style.display='block'}
    function formatSalary(v){if(!v.salary_from&&!v.salary_to)return'З/П не указана';let parts=[];if(v.salary_from)parts.push('от '+v.salary_from.toLocaleString());if(v.salary_to)parts.push('до '+v.salary_to.toLocaleString());let result=parts.join(' ');if(v.salary_currency){result+=' '+(v.salary_currency==='RUR'?'₽':v.salary_currency)}return result}
    function enrich(v){
        return{
            ...v,
            title:v.name||'Без названия',
            company:v.employer||'Компания не указана',
            city:v.area||'',
            link:v.url||'#',
            experience:v.experience||'Не указан',
            employment:v.employment||'',
            schedule:v.schedule||'',
            salary:formatSalary(v),
            rating:v.employer_rating||(Math.random()*2+3).toFixed(1),
            reviews:v.employer_reviews||Math.floor(Math.random()*5000)+100,
            logoLetter:(v.employer||'А').charAt(0).toUpperCase(),
            logoColor:['#e0e7ff','#dbeafe','#ede9fe','#fce7f3','#ffedd5','#dcfce7'][(v.employer||'А').charCodeAt(0)%6],
            phone:v.phone||null,
            email:v.email||null,
            lat:v.lat,lng:v.lng,
            logoUrl:v.logo_url||null,
            publishedDate:formatPublishedDate(v.published_at)
        }
    }
    function formatPublishedDate(dateString){
        if(!dateString)return'';
        const pubDate=new Date(dateString);
        const now=new Date();
        const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
        const pubDay=new Date(pubDate.getFullYear(),pubDate.getMonth(),pubDate.getDate());
        const diffDays=Math.floor((today-pubDay)/(1000*60*60*24));
        if(diffDays===0)return'сегодня';
        if(diffDays===1)return'вчера';
        if(diffDays<=7)return diffDays+' дня назад';
        return pubDate.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
    }
    function renderVacancies(vacancies){
        vacancies.forEach(v=>{
            const vac=enrich(v);
            const isSaved=savedVacancies.includes(vac.id);
            const card=document.createElement('div');
            card.className='vacancy-card';
            card.dataset.id=vac.id;
            let contactButton='';
            if(vac.phone){contactButton=`<a href="tel:${vac.phone}" class="btn-call" onclick="event.stopPropagation()"><i class="fas fa-phone-alt"></i> Позвонить</a>`}
            else if(vac.email){contactButton=`<a href="mailto:${vac.email}" class="btn-email" onclick="event.stopPropagation()"><i class="fas fa-envelope"></i> Написать</a>`}
            const logoSrc=vac.logoUrl?`<img src="${vac.logoUrl}" alt="${escapeHtml(vac.company)}">`:vac.logoLetter;
            card.innerHTML=`
                <button class="save-btn ${isSaved?'saved':''}" data-id="${vac.id}"><i class="fas fa-heart"></i></button>
                <div class="job-title">
                    <span>${escapeHtml(vac.title)}</span>
                    ${vac.publishedDate?`<span class="date-badge">${vac.publishedDate}</span>`:''}
                </div>
                <div class="salary">${vac.salary}</div>
                <div class="tags">
                    ${vac.employment?`<span class="tag">${escapeHtml(vac.employment)}</span>`:''}
                    ${vac.schedule?`<span class="tag">${escapeHtml(vac.schedule)}</span>`:''}
                    <span class="tag">${escapeHtml(vac.experience)}</span>
                </div>
                <div class="company-block">
                    <div class="logo-placeholder" style="background:${vac.logoUrl?'transparent':vac.logoColor}">${logoSrc}</div>
                    <div>
                        <div class="company-name">${escapeHtml(vac.company)}</div>
                        <div class="rating-row">⭐ ${vac.rating} • ${vac.reviews.toLocaleString()} отзывов</div>
                    </div>
                </div>
                <div class="address">${escapeHtml(vac.city)}</div>
                <div class="card-actions">
                    <button class="btn-respond" onclick="event.stopPropagation()">Откликнуться</button>
                    ${contactButton}
                    <button class="btn-contact share-card-btn" data-link="${vac.link}"><i class="fas fa-share-alt"></i> Поделиться</button>
                </div>`;
            vacanciesContainer.appendChild(card);
        });
    }
    window.goToVacancy=function(id){const vac=allVacancies.find(v=>v.id==id);if(vac){localStorage.setItem('selectedVacancy',JSON.stringify(vac));window.open('vacancy.html','_blank')}};
    function toggleSaved(id,btn){if(savedVacancies.includes(id)){savedVacancies=savedVacancies.filter(v=>v!==id);btn.classList.remove('saved')}else{savedVacancies.push(id);btn.classList.add('saved')}localStorage.setItem('savedVacancies',JSON.stringify(savedVacancies))}
    function resetFilters(){filterCity.value='';filterExperience.value='';filterEmployment.value='';filterSalaryFrom.value='';currentArea='';setSort('publication_time');performSearch(true,false)}
    function initMap(){
        map=L.map(mapContainer).setView([55.7558,37.6173],10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
    }
    function updateMapMarkers(vacancies=[]){
        if(!map)return;
        map.eachLayer(layer=>{if(layer instanceof L.Marker)map.removeLayer(layer)});
        const redIcon=L.icon({
            iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
            iconSize:[25,41],
            iconAnchor:[12,41],
            popupAnchor:[1,-34],
            shadowSize:[41,41]
        });
        const bounds=[];
        vacancies.forEach(v=>{
            if(v.lat&&v.lng){
                const marker=L.marker([v.lat,v.lng],{icon:redIcon}).addTo(map).bindPopup(v.title);
                bounds.push([v.lat,v.lng]);
            }
        });
        if(bounds.length>0)map.fitBounds(bounds,{padding:[50,50]});
    }
    function toggleTheme(){document.body.classList.toggle('dark');document.body.classList.toggle('light');const isDark=document.body.classList.contains('dark');themeToggle.innerHTML=isDark?'<i class="fas fa-sun"></i> Светлая тема':'<i class="fas fa-moon"></i> Тёмная тема';localStorage.setItem('theme',isDark?'dark':'light')}
    function loadTheme(){if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');document.body.classList.remove('light');themeToggle.innerHTML='<i class="fas fa-sun"></i> Светлая тема'}}
    function addToHistory(q){if(!q||q.length<2)return;searchHistory=[q,...searchHistory.filter(h=>h!==q)].slice(0,7);localStorage.setItem('searchHistory',JSON.stringify(searchHistory));renderHistory()}
    function clearHistory(){searchHistory=[];localStorage.removeItem('searchHistory');renderHistory()}
    function renderHistory(){const cont=document.getElementById('historyContainer');if(!searchHistory.length){cont.innerHTML='<span style="font-size:0.8rem;color:#94a3b8;">Нет истории</span>';return}cont.innerHTML=searchHistory.map(q=>`<div class="history-item" data-query="${q}"><span>${q}</span><button class="delete-history" data-query="${q}">&times;</button></div>`).join('');document.querySelectorAll('.history-item span').forEach(el=>el.addEventListener('click',(e)=>{if(!e.target.classList.contains('delete-history')){searchInput.value=el.parentElement.dataset.query;performSearch(true,true)}}));document.querySelectorAll('.delete-history').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation();searchHistory=searchHistory.filter(h=>h!==btn.dataset.query);localStorage.setItem('searchHistory',JSON.stringify(searchHistory));renderHistory()}))}
    function escapeHtml(text){if(!text)return'';return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
</body>
</html>
