<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JobScout — Агрегатор вакансий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        :root {
            --bg-page: #f7f8fc;
            --bg-card: #ffffff;
            --text-primary: #1e2a3a;
            --text-secondary: #4a5b6e;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-hover: 0 12px 24px -8px rgba(0, 0, 0, 0.1);
            --heart: #ef4444;
            --skeleton-base: #e2e8f0;
            --skeleton-wave: rgba(255, 255, 255, 0.5);
            --input-bg: #ffffff;
        }

        body.dark {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 12px 24px -8px rgba(0, 0, 0, 0.5);
            --input-bg: #334155;
            --skeleton-base: #2d3a4e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.4;
            padding-bottom: 60px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
            background-color: var(--bg-card);
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .theme-toggle {
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 8px 16px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: 500;
        }

        /* Search + Filters */
        .search-section {
            margin: 24px 0 20px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 14px 18px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 60px;
            background: var(--input-bg);
            color: var(--text-primary);
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .btn-primary {
            background: var(--accent);
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 24px;
            align-items: center;
        }

        .filter-select, .filter-input {
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.85rem;
            min-width: 130px;
        }

        .sort-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            background: var(--bg-card);
        }

        /* History */
        .history-area {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }

        .history-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .clear-history {
            background: none;
            border: none;
            color: var(--text-secondary);
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.75rem;
        }

        /* Cards grid */
        .vacancies-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin: 20px 0 40px;
        }

        .vacancy-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: 0.2s;
            border: 1px solid var(--border);
            cursor: pointer;
            position: relative;
        }

        .vacancy-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .card-header {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 12px;
        }

        .company-logo {
            width: 56px;
            height: 56px;
            background: #eef2ff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
            background: var(--bg-page);
            border: 1px solid var(--border);
            color: var(--accent);
            flex-shrink: 0;
            overflow: hidden;
        }

        .company-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            flex: 1;
        }

        .vacancy-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .company-name {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .salary {
            font-weight: 700;
            color: var(--accent);
            margin: 8px 0;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .favorite-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #cbd5e1;
            transition: 0.1s;
        }

        .favorite-btn.active {
            color: var(--heart);
        }

        /* Skeleton */
        .skeleton-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .skeleton-line {
            height: 20px;
            background: var(--skeleton-base);
            border-radius: 12px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
        }

        .skeleton-line::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--skeleton-wave), transparent);
            animation: shimmer 1.2s infinite;
        }

        .skeleton-title { width: 70%; height: 26px; }
        .skeleton-company { width: 45%; }
        .skeleton-salary { width: 40%; }

        @keyframes shimmer {
            0% { transform: translateX(-100%);}
            100% { transform: translateX(100%);}
        }

        /* modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-card);
            max-width: 650px;
            width: 90%;
            border-radius: 32px;
            padding: 28px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .modal h3 { font-size: 1.6rem; margin-bottom: 12px; }
        .modal p { margin: 12px 0; color: var(--text-secondary);}
        .modal-close {
            background: var(--accent);
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            color: white;
            margin-top: 16px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        footer {
            text-align: center;
            font-size: 0.75rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="container header-inner">
        <div class="logo">JobScout</div>
        <button class="theme-toggle" id="themeToggle">🌙 Тёмная</button>
    </div>
</div>

<div class="container">
    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Должность, профессия, ключевые слова..." value="Программист">
            <button id="searchBtn" class="btn-primary">Найти</button>
        </div>
        <div class="filters">
            <input type="text" id="cityFilter" class="filter-input" placeholder="Город (Москва)">
            <select id="expFilter" class="filter-select">
                <option value="">Любой опыт</option>
                <option value="Без опыта">Без опыта</option>
                <option value="От 1 года до 3 лет">1-3 года</option>
                <option value="От 3 до 6 лет">3-6 лет</option>
                <option value="Более 6 лет">Более 6 лет</option>
            </select>
            <input type="number" id="salaryFromFilter" class="filter-input" placeholder="Зарплата от (₽)">
            <button id="sortSalaryBtn" class="sort-btn">↑ По зарплате</button>
        </div>
        <div class="history-area">
            <span>🔍 Недавние:</span>
            <div id="historyContainer" class="history-badges"></div>
            <button id="clearHistoryBtn" class="clear-history">Очистить</button>
        </div>
    </div>
    <div id="vacanciesContainer" class="vacancies-grid"></div>
    <div id="loadingTrigger" style="height: 20px;"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p><strong>Компания:</strong> <span id="modalCompany"></span></p>
        <p><strong>Зарплата:</strong> <span id="modalSalary"></span></p>
        <p><strong>Город / Метро:</strong> <span id="modalMetro"></span></p>
        <p><strong>График:</strong> <span id="modalSchedule"></span></p>
        <p><strong>Требования:</strong> <span id="modalRequirements"></span></p>
        <p><strong>Обязанности:</strong> <span id="modalDescription"></span></p>
        <p><strong>Телефон:</strong> <span id="modalPhone"></span></p>
        <a id="modalLink" href="#" target="_blank" style="color: var(--accent);">Открыть на HH.ru →</a>
        <div><button class="modal-close" id="closeModalBtn">Закрыть</button></div>
    </div>
</div>

<script src="api.js"></script>
<script>
    // ---------- STATE ----------
    let allVacancies = [];         // исходный массив из API
    let filteredVacancies = [];    // текущий отфильтрованный + сортировка
    let currentPage = 0;
    const PAGE_SIZE = 5;
    let isLoading = false;
    let hasMore = true;
    let currentSearchQuery = "Программист";
    let currentSortBySalary = false;   // false: по умолчанию по релевантности, true: по убыванию зарплаты (парсим число)
    
    // favorites & history
    let favorites = new Set();      // id вакансии (число)
    let searchHistory = [];          // строки запросов
    
    // DOM
    const container = document.getElementById('vacanciesContainer');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const cityFilter = document.getElementById('cityFilter');
    const expFilter = document.getElementById('expFilter');
    const salaryFromFilter = document.getElementById('salaryFromFilter');
    const sortSalaryBtn = document.getElementById('sortSalaryBtn');
    const themeToggle = document.getElementById('themeToggle');
    const historyContainer = document.getElementById('historyContainer');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const modal = document.getElementById('modal');
    
    // helper: извлечь число из строки зарплаты (примерное)
    function extractSalaryNumber(salaryStr) {
        if (!salaryStr || salaryStr === "Не указана") return 0;
        const match = salaryStr.match(/(\d+[\s]?\d*)/g);
        if (match) {
            let num = parseInt(match[0].replace(/\s/g, ''), 10);
            return isNaN(num) ? 0 : num;
        }
        return 0;
    }
    
    // Фильтрация и сортировка
    function applyFiltersAndSort() {
        let filtered = [...allVacancies];
        const cityRaw = cityFilter.value.trim().toLowerCase();
        const expValue = expFilter.value;
        const salaryFromVal = parseInt(salaryFromFilter.value, 10);
        
        if (cityRaw) {
            filtered = filtered.filter(v => v.city.toLowerCase().includes(cityRaw));
        }
        if (expValue) {
            filtered = filtered.filter(v => v.experience === expValue);
        }
        if (!isNaN(salaryFromVal) && salaryFromVal > 0) {
            filtered = filtered.filter(v => extractSalaryNumber(v.salary) >= salaryFromVal);
        }
        
        if (currentSortBySalary) {
            filtered.sort((a,b) => extractSalaryNumber(b.salary) - extractSalaryNumber(a.salary));
        } else {
            // исходный порядок как пришёл с API (по relevance), сохраняем стабильность
            // но лучше держать индекс
        }
        filteredVacancies = filtered;
        hasMore = true;
        currentPage = 0;
        renderSkeletons();
        setTimeout(() => {
            renderVacancies(true);
        }, 50);
    }
    
    // рендер пачки
    function renderVacancies(reset = true) {
        if (reset) {
            currentPage = 0;
            container.innerHTML = '';
        }
        const start = currentPage * PAGE_SIZE;
        const end = start + PAGE_SIZE;
        const pageItems = filteredVacancies.slice(start, end);
        if (pageItems.length === 0 && currentPage === 0 && filteredVacancies.length === 0) {
            container.innerHTML = '<div class="empty-state">📭 По вашему запросу ничего не найдено</div>';
            hasMore = false;
            return;
        }
        pageItems.forEach(vac => {
            const card = createVacancyCard(vac);
            container.appendChild(card);
        });
        if (end >= filteredVacancies.length) hasMore = false;
        else hasMore = true;
        isLoading = false;
    }
    
    function createVacancyCard(vac) {
        const div = document.createElement('div');
        div.className = 'vacancy-card';
        div.setAttribute('data-id', vac.id);
        const logoHtml = vac.logo ? `<img src="${vac.logo}" alt="logo" style="width:100%;height:100%;object-fit:contain;">` : (vac.company.charAt(0) || '🏢');
        const logoDiv = `<div class="company-logo">${vac.logo ? `<img src="${vac.logo}" alt="лого">` : vac.company.charAt(0).toUpperCase()}</div>`;
        const isFav = favorites.has(vac.id) ? 'active' : '';
        div.innerHTML = `
            <button class="favorite-btn ${isFav}" data-id="${vac.id}">${isFav ? '❤️' : '🤍'}</button>
            <div class="card-header">
                ${logoDiv}
                <div class="card-info">
                    <div class="vacancy-title">${escapeHtml(vac.title)}</div>
                    <div class="company-name">${escapeHtml(vac.company)}</div>
                    <div class="salary">${escapeHtml(vac.salary)}</div>
                    <div class="meta">
                        <span>📍 ${escapeHtml(vac.city) || 'Не указан'}</span>
                        <span>💼 ${escapeHtml(vac.experience)}</span>
                        <span>⭐ ${vac.rating}</span>
                    </div>
                </div>
            </div>
        `;
        const favBtn = div.querySelector('.favorite-btn');
        favBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFavorite(vac.id);
            const newActive = favorites.has(vac.id);
            favBtn.textContent = newActive ? '❤️' : '🤍';
            if(newActive) favBtn.classList.add('active');
            else favBtn.classList.remove('active');
        });
        div.addEventListener('click', () => showModal(vac));
        return div;
    }
    
    function toggleFavorite(id) {
        if(favorites.has(id)) favorites.delete(id);
        else favorites.add(id);
        localStorage.setItem('job_favorites', JSON.stringify([...favorites]));
    }
    
    function loadFavorites() {
        const stored = localStorage.getItem('job_favorites');
        if(stored) {
            try {
                const arr = JSON.parse(stored);
                favorites = new Set(arr);
            } catch(e) {}
        }
    }
    
    // history
    function addToHistory(query) {
        if(!query.trim()) return;
        searchHistory = searchHistory.filter(q => q !== query);
        searchHistory.unshift(query);
        if(searchHistory.length > 5) searchHistory.pop();
        localStorage.setItem('search_history', JSON.stringify(searchHistory));
        renderHistory();
    }
    
    function renderHistory() {
        historyContainer.innerHTML = '';
        searchHistory.forEach(term => {
            const badge = document.createElement('span');
            badge.className = 'history-item';
            badge.textContent = term;
            badge.addEventListener('click', () => {
                searchInput.value = term;
                performSearch(term);
            });
            historyContainer.appendChild(badge);
        });
    }
    
    function clearHistory() {
        searchHistory = [];
        localStorage.setItem('search_history', JSON.stringify(searchHistory));
        renderHistory();
    }
    
    // загрузка вакансий через прокси
    async function performSearch(query) {
        currentSearchQuery = query;
        addToHistory(query);
        isLoading = true;
        renderSkeletons(true);
        try {
            const vacancies = await fetchVacanciesFromAPI(query);
            allVacancies = vacancies;
            currentSortBySalary = false;
            applyFiltersAndSort(); // пересчитает filtered и отрендерит
        } catch(e) {
            console.error(e);
            container.innerHTML = '<div class="empty-state">⚠️ Ошибка загрузки, попробуйте позже</div>';
        } finally {
            isLoading = false;
        }
    }
    
    function renderSkeletons(clear = true) {
        if(clear) container.innerHTML = '';
        for(let i=0; i<3; i++) {
            const sk = document.createElement('div');
            sk.className = 'skeleton-card';
            sk.innerHTML = `<div class="skeleton-line skeleton-title"></div><div class="skeleton-line skeleton-company"></div><div class="skeleton-line skeleton-salary"></div><div class="skeleton-line" style="width:60%"></div>`;
            container.appendChild(sk);
        }
    }
    
    // бесконечный скролл
    function onScroll() {
        const trigger = document.getElementById('loadingTrigger');
        if(!trigger) return;
        const rect = trigger.getBoundingClientRect();
        if(rect.top < window.innerHeight + 100 && !isLoading && hasMore) {
            isLoading = true;
            currentPage++;
            setTimeout(() => {
                const start = currentPage * PAGE_SIZE;
                const end = start + PAGE_SIZE;
                const newItems = filteredVacancies.slice(start, end);
                if(newItems.length === 0) {
                    hasMore = false;
                    isLoading = false;
                    return;
                }
                newItems.forEach(vac => {
                    const card = createVacancyCard(vac);
                    container.appendChild(card);
                });
                if(end >= filteredVacancies.length) hasMore = false;
                isLoading = false;
            }, 300);
        }
    }
    
    // modal logic
    function showModal(vac) {
        document.getElementById('modalTitle').innerText = vac.title;
        document.getElementById('modalCompany').innerText = vac.company;
        document.getElementById('modalSalary').innerText = vac.salary;
        const metroStr = vac.metro?.length ? vac.metro.join(', ') : 'Не указано';
        document.getElementById('modalMetro').innerText = `${vac.city || ''} • ${metroStr}`;
        document.getElementById('modalSchedule').innerText = vac.schedule || 'Не указан';
        document.getElementById('modalRequirements').innerText = vac.requirements || 'Нет данных';
        document.getElementById('modalDescription').innerText = vac.description || 'Нет описания';
        document.getElementById('modalPhone').innerText = vac.phone || 'Не указан';
        document.getElementById('modalLink').href = vac.link;
        modal.style.display = 'flex';
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // тема
    function initTheme() {
        const dark = localStorage.getItem('theme_dark') === 'true';
        if(dark) document.body.classList.add('dark');
        themeToggle.innerText = dark ? '☀️ Светлая' : '🌙 Тёмная';
    }
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('theme_dark', isDark);
        themeToggle.innerText = isDark ? '☀️ Светлая' : '🌙 Тёмная';
    });
    
    // Event listeners
    searchBtn.addEventListener('click', () => performSearch(searchInput.value.trim() || "разработчик"));
    cityFilter.addEventListener('input', () => applyFiltersAndSort());
    expFilter.addEventListener('change', () => applyFiltersAndSort());
    salaryFromFilter.addEventListener('input', () => applyFiltersAndSort());
    sortSalaryBtn.addEventListener('click', () => {
        currentSortBySalary = !currentSortBySalary;
        sortSalaryBtn.innerText = currentSortBySalary ? '↓ По умолчанию' : '↑ По зарплате';
        applyFiltersAndSort();
    });
    clearHistoryBtn.addEventListener('click', clearHistory);
    window.addEventListener('scroll', onScroll);
    document.getElementById('closeModalBtn').addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', (e) => { if(e.target === modal) modal.style.display = 'none'; });
    
    // Инициализация
    async function bootstrap() {
        loadFavorites();
        const storedHistory = localStorage.getItem('search_history');
        if(storedHistory) {
            try { searchHistory = JSON.parse(storedHistory); } catch(e) {}
            renderHistory();
        }
        initTheme();
        await performSearch("Программист");
    }
    bootstrap();
</script>
</body>
</html>
