<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ваканса — поиск работы</title>
    <meta name="description" content="Агрегатор вакансий Ваканса — удобный поиск работы. Найдите свою идеальную вакансию среди тысяч предложений от ведущих компаний.">
    <meta name="keywords" content="работа, вакансии, поиск работы, агрегатор вакансий, hh.ru, труд, занятость">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>">
    <style>
        /* ========== CSS-ПЕРЕМЕННЫЕ (светлая тема по умолчанию) ========== */
        :root {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --surface-border: #edf2f7;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #0047cc;
            --accent-light: #e0e7ff;
            --shadow: rgba(0,0,0,0.04);
            --hover-bg: #f1f5f9;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
            --tag-bg: #ede9fe;
            --tag-color: #5b21b6;
            --salary-color: #059669;
            --heart-inactive: #64748b;
            --footer-bg: #ffffff;
            --footer-border: #e2e8f0;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --accent: #60a5fa;
            --accent-light: #1e3a5f;
            --shadow: rgba(255,255,255,0.04);
            --hover-bg: #334155;
            --input-bg: #0f172a;
            --input-border: #475569;
            --tag-bg: #312e81;
            --tag-color: #c7d2fe;
            --salary-color: #34d399;
            --heart-inactive: #64748b;
            --footer-bg: #1e293b;
            --footer-border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 24px 16px;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            transition: background 0.3s, color 0.3s;
        }

        .container { max-width: 960px; margin: 0 auto; flex: 1; }

        /* Шапка */
        .header { margin-bottom: 28px; text-align: center; position: relative; }
        .theme-toggle {
            position: absolute; top: 0; right: 0;
            background: var(--surface); border: 1px solid var(--input-border);
            color: var(--text-primary); width: 40px; height: 40px; border-radius: 50%;
            font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 6px var(--shadow); transition: background 0.3s, color 0.3s;
        }
        .header h1 {
            font-size: 2.5rem; font-weight: 800;
            background: linear-gradient(135deg, #0047cc, #3b82f6);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin-bottom: 6px; letter-spacing: -0.5px; display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .header p { color: var(--text-secondary); font-size: 1rem; font-style: italic; }
        .logo-heart {
            display: inline-block; width: 44px; height: 44px;
            background: repeating-linear-gradient(45deg, #0047cc 0px, #0047cc 6px, rgba(179,217,255,0.85) 6px, rgba(179,217,255,0.85) 12px);
            clip-path: path("M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z");
            transform: scale(1.3); transform-origin: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2), 0 1px 0 rgba(255,255,255,0.3) inset, 0 -1px 0 rgba(0,0,0,0.1) inset;
            flex-shrink: 0;
        }

        /* Поиск */
        .search-section {
            background: var(--surface); border-radius: 56px; padding: 6px;
            box-shadow: 0 4px 12px var(--shadow); margin-bottom: 32px; display: flex; gap: 8px;
            flex-wrap: wrap; align-items: center; border: 2px solid var(--input-border);
            transition: border-color 0.2s; position: relative;
        }
        .search-section:focus-within { border-color: var(--accent); box-shadow: 0 4px 12px rgba(0,71,204,0.15); }
        .search-input-wrapper { flex: 1; min-width: 200px; padding-left: 14px; position: relative; }
        .search-input {
            width: 100%; padding: 14px 16px; font-size: 1rem; border: none; outline: none;
            background: transparent; color: var(--text-primary);
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-btn {
            background: linear-gradient(180deg, #0055e6 0%, #0039a6 100%); color: white;
            border: none; padding: 0 28px; border-radius: 40px; font-weight: 600; font-size: 0.95rem;
            cursor: pointer; transition: all 0.2s; height: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .search-btn:hover { background: linear-gradient(180deg, #0039a6 0%, #002d80 100%); }

        /* История поиска */
        .search-history {
            position: absolute; top: 100%; left: 0; right: 0; background: var(--surface);
            border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); margin-top: 8px;
            overflow: hidden; z-index: 10; display: none;
        }
        .search-history.active { display: block; }
        .history-item {
            padding: 12px 20px; cursor: pointer; font-size: 0.9rem; color: var(--text-primary);
            border-bottom: 1px solid var(--surface-border); transition: background 0.2s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .history-item:hover { background: var(--hover-bg); }
        .history-item .delete-history { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; padding: 0 4px; }
        .clear-history-btn {
            padding: 10px 20px; text-align: center; color: var(--accent); font-weight: 500;
            cursor: pointer; font-size: 0.85rem; border-top: 1px solid var(--surface-border);
            background: var(--hover-bg); transition: background 0.2s;
        }
        .clear-history-btn:hover { background: var(--surface-border); }

        /* Фильтры */
        .filters-panel {
            background: var(--surface); border-radius: 20px; padding: 16px 20px;
            margin-bottom: 24px; box-shadow: 0 2px 8px var(--shadow); display: flex;
            flex-wrap: wrap; gap: 12px; align-items: center; border: 1px solid var(--surface-border);
        }
        .filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .filter-group label { font-size: 0.85rem; color: var(--text-secondary); white-space: nowrap; }
        .filter-select, .filter-input {
            padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 20px;
            font-size: 0.85rem; outline: none; background: var(--input-bg); color: var(--text-primary); min-width: 140px;
        }
        .filter-select { padding-right: 32px; appearance: auto; }
        .filter-select:focus, .filter-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,71,204,0.1); }
        .sort-btn {
            background: var(--hover-bg); border: 1px solid var(--input-border); padding: 8px 14px;
            border-radius: 20px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center;
            gap: 6px; transition: all 0.2s; color: var(--text-primary); font-weight: 500;
        }
        .sort-btn .arrow { font-size: 1.2rem; line-height: 1; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .sort-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .sort-btn.active .arrow { text-shadow: 0 1px 3px rgba(0,0,0,0.3); }

        /* Результаты */
        .results-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
        .counter { background: var(--accent-light); padding: 6px 14px; border-radius: 40px; font-size: 0.9rem; font-weight: 500; color: var(--accent); }
        .reset-btn, .favorites-btn {
            background: var(--hover-bg); border: 1px solid var(--input-border); color: var(--text-primary);
            font-size: 0.85rem; cursor: pointer; text-decoration: none; padding: 8px 16px;
            border-radius: 20px; font-weight: 500; transition: all 0.2s;
        }
        .reset-btn:hover, .favorites-btn:hover { background: var(--surface-border); }

        .vacancies-list { display: flex; flex-direction: column; gap: 16px; }
        .vacancy-card {
            background: var(--surface); border-radius: 20px; padding: 18px 20px;
            box-shadow: 0 2px 8px var(--shadow); transition: all 0.2s ease;
            border: 1px solid var(--surface-border); position: relative; cursor: pointer;
        }
        .vacancy-card:hover { transform: translateY(-2px); box-shadow: 0 8px 16px -4px rgba(0,0,0,0.15); border-color: var(--input-border); }
        .job-title { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); line-height: 1.3; margin-bottom: 6px; }
        .salary { font-size: 1.25rem; font-weight: 700; color: var(--salary-color); margin-bottom: 8px; }
        .salary small { font-size: 0.75rem; font-weight: normal; color: var(--text-secondary); }
        .meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; font-size: 0.8rem; font-weight: 500; }
        .meta-item { background: var(--tag-bg); color: var(--tag-color); padding: 4px 10px; border-radius: 20px; }
        .company-block { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .logo-placeholder {
            width: 44px; height: 44px; border-radius: 10px; background: #e0e7ff; display: flex;
            align-items: center; justify-content: center; font-weight: 700; font-size: 1.4rem;
            color: #0047cc; flex-shrink: 0; text-transform: uppercase;
        }
        .company-text { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; flex: 1; }
        .company-name { font-weight: 600; color: var(--text-primary); font-size: 0.9rem; }
        .rating-row {
            display: flex; align-items: center; gap: 4px; font-size: 0.85rem; color: #b45309;
            background: #fffbeb; padding: 2px 8px; border-radius: 20px; font-weight: 500;
        }
        .rating-stars { color: #f59e0b; }
        .address-block { margin-bottom: 14px; font-size: 0.85rem; color: var(--text-secondary); }
        .metro-list { margin-top: 4px; font-size: 0.8rem; color: var(--accent); }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .btn { font-weight: 600; font-size: 0.85rem; cursor: pointer; border: none; transition: all 0.2s; text-align: center; padding: 9px 16px; border-radius: 20px; }
        .btn-respond {
            background: linear-gradient(180deg, #0055e6 0%, #0039a6 100%); color: #ffffff;
            box-shadow: 0 3px 5px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.15);
            max-width: 220px; width: auto; flex: 0 0 auto;
        }
        .btn-respond:hover { background: linear-gradient(180deg, #0039a6 0%, #002d80 100%); animation: pulse 0.8s infinite; }
        .btn-contact {
            background: #f1f5f9; border: 1px solid #cbd5e1; color: #1e293b;
            padding: 9px 18px; display: flex; align-items: center; gap: 6px;
            flex: 0 0 auto; white-space: nowrap; font-weight: 600; min-width: 140px; justify-content: center;
        }
        .btn-contact:hover { background: #e2e8f0; border-color: #94a3b8; color: #0f172a; }
        .btn-share { background: transparent; color: var(--text-secondary); padding: 9px 12px; display: flex; align-items: center; gap: 4px; flex: 0 0 auto; white-space: nowrap; }
        .btn-share:hover { background: var(--hover-bg); color: var(--text-primary); }
        .save-btn {
            position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.5);
            border: none; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s; color: var(--heart-inactive); line-height: 1; z-index: 2;
        }
        .save-btn.saved { background: linear-gradient(180deg, #ff6b6b 0%, #dc2626 100%); color: white; box-shadow: 0 4px 8px rgba(220,38,38,0.3); }
        .save-btn:hover { transform: scale(1.1); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,71,204,0.4), 0 2px 4px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.1); }
            70% { box-shadow: 0 0 0 8px rgba(0,71,204,0), 0 2px 4px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.1); }
        }

        .no-results, .loading-state, .error-state { text-align: center; padding: 60px 20px; background: var(--surface); border-radius: 32px; }

        /* Подвал */
        .site-footer { margin-top: 40px; padding: 24px 16px; background: var(--footer-bg); border-top: 1px solid var(--footer-border); text-align: center; }
        .footer-content { max-width: 960px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 20px; }
        .footer-links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
        .footer-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
        .footer-links a:hover { color: var(--accent); text-decoration: underline; }
        .footer-copy { color: var(--text-muted); font-size: 0.8rem; white-space: nowrap; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <button class="theme-toggle" id="themeToggle" title="Переключить тему">☀️</button>
        <h1><span class="logo-heart"></span>Ваканса</h1>
        <p>Работа найдётся — и не одна</p>
    </div>

    <div class="search-section">
        <div class="search-input-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Должность, компания, город..." autocomplete="off">
            <div id="searchHistory" class="search-history"></div>
        </div>
        <button id="searchButton" class="search-btn">Найти</button>
    </div>

    <div class="filters-panel">
        <div class="filter-group"><label>Город</label><input type="text" id="filterCity" class="filter-input" placeholder="Москва, СПб..."></div>
        <div class="filter-group">
            <label>Опыт</label>
            <select id="filterExperience" class="filter-select">
                <option value="">Любой</option><option value="Без опыта">Без опыта</option>
                <option value="Опыт от 1 года">От 1 года</option><option value="Опыт 2-3 года">2–3 года</option>
                <option value="Опыт от 5 лет">От 5 лет</option>
            </select>
        </div>
        <div class="filter-group"><label>Зарплата от</label><input type="text" id="filterSalaryFrom" class="filter-input" placeholder="0" style="min-width:100px;" inputmode="numeric" pattern="[0-9\s]*"></div>
        <button id="sortBySalary" class="sort-btn"><span class="arrow">↑</span> По зарплате</button>
    </div>

    <div class="results-header">
        <div class="counter" id="counterDisplay">Найдено: <span>0</span></div>
        <div style="display:flex; gap:8px;">
            <button id="favoritesButton" class="favorites-btn">❤️ Избранное</button>
            <button id="resetButton" class="reset-btn">Сбросить</button>
        </div>
    </div>

    <div id="vacanciesContainer" class="vacancies-list"></div>
</div>

<footer class="site-footer">
    <div class="footer-content">
        <div class="footer-links">
            <a href="privacy.html">Политика конфиденциальности</a>
            <a href="terms.html">Пользовательское соглашение</a>
            <a href="contacts.html">Контакты</a>
        </div>
        <div class="footer-copy">© 2026 Ваканса. Все права защищены.</div>
    </div>
</footer>

<script src="api.js"></script>

<script>
    // ========== СОСТОЯНИЕ ==========
    let savedVacancies = JSON.parse(localStorage.getItem('savedVacancies') || '[]');
    let searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');
    let allLoadedVacancies = [];
    let sortBySalaryAsc = true;

    const FILTERS_KEY = 'savedFilters';
    let savedFilters = JSON.parse(localStorage.getItem(FILTERS_KEY) || '{}');

    const THEME_KEY = 'theme';
    let currentTheme = localStorage.getItem(THEME_KEY) || 'light';

    // ========== ТЁМНАЯ ТЕМА ==========
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('themeToggle').textContent = theme === 'dark' ? '🌙' : '☀️';
        localStorage.setItem(THEME_KEY, theme);
    }
    document.getElementById('themeToggle').addEventListener('click', () => {
        currentTheme = currentTheme === 'light' ? 'dark' : 'light';
        applyTheme(currentTheme);
    });
    applyTheme(currentTheme);

    // ========== УТИЛИТЫ ==========
    function escapeHtml(s) { return s?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) || ''; }
    function extractMinSalary(str) { const n = str?.replace(/\s/g,'').match(/\d+/); return n ? parseInt(n[0]) || 0 : 0; }

    // ========== РЕНДЕР КАРТОЧЕК ==========
    function renderVacancies(vacancies) {
        const container = document.getElementById('vacanciesContainer');
        document.querySelector('#counterDisplay span').textContent = vacancies.length;

        if (!vacancies.length) {
            container.innerHTML = '<div class="no-results">По вашему запросу ничего не найдено</div>';
            return;
        }

        container.innerHTML = vacancies.map(v => `
            <div class="vacancy-card" data-id="${v.id}">
                <button class="save-btn ${savedVacancies.includes(v.id) ? 'saved' : ''}" data-id="${v.id}">
                    ${savedVacancies.includes(v.id) ? '♥' : '♡'}
                </button>
                <div class="job-title">${escapeHtml(v.title)}</div>
                <div class="salary">${escapeHtml(v.salary)} <small>${escapeHtml(v.salary_details)}</small></div>
                <div class="meta-row"><span class="meta-item">${escapeHtml(v.experience)}</span></div>
                <div class="company-block">
                    <div class="logo-placeholder">${v.company.charAt(0)}</div>
                    <div class="company-text"><span class="company-name">${escapeHtml(v.company)}</span></div>
                </div>
                <div class="address-block">${escapeHtml(v.city)}</div>
                <div class="button-group">
                    <button class="btn btn-respond">Откликнуться</button>
                    <button class="btn btn-contact">☎ Связаться</button>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.vacancy-card').forEach(card => {
            card.addEventListener('click', function(e) {
                if (e.target.closest('button')) return;
                const vac = allLoadedVacancies.find(v => v.id === +this.dataset.id);
                if (vac) window.open(vac.link, '_blank');
            });
        });
        document.querySelectorAll('.save-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const id = +this.dataset.id;
                if (savedVacancies.includes(id)) {
                    savedVacancies = savedVacancies.filter(i => i !== id);
                    this.classList.remove('saved'); this.textContent = '♡';
                } else {
                    savedVacancies.push(id);
                    this.classList.add('saved'); this.textContent = '♥';
                }
                localStorage.setItem('savedVacancies', JSON.stringify(savedVacancies));
            });
        });
    }

    // ========== ПОИСК ==========
    async function performSearch(query) {
        try {
            const results = await fetchVacanciesFromAPI(query);
            allLoadedVacancies = results;
            renderVacancies(results.slice(0, 20));
        } catch (e) {
            document.getElementById('vacanciesContainer').innerHTML = '<div class="error-state">Ошибка загрузки. Попробуйте позже.</div>';
        }
    }

    function updateSearchAndRender() {
        performSearch(document.getElementById('searchInput').value);
    }

    document.addEventListener('DOMContentLoaded', () => {
        performSearch('');
        document.getElementById('searchButton').addEventListener('click', updateSearchAndRender);
        document.getElementById('searchInput').addEventListener('keypress', e => e.key === 'Enter' && updateSearchAndRender());
    });
</script>
</body>
</html>
