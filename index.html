<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВКАНСА — поиск вакансий</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                const hour = new Date().getHours();
                if (hour >= 20 || hour < 6) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }
        })();
    </script>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/">ВКАНСА</a></h1>
            <button id="themeToggle" aria-label="Переключить тему">
                <span class="icon">🌓</span>
            </button>
        </div>
    </header>

    <main class="container">
        <section class="search">
            <div class="search-bar">
                <input type="text" id="textSearch" placeholder="Должность, навыки или компания" autocomplete="off">
                <div class="city-autocomplete">
                    <input type="text" id="cityInput" placeholder="Город" autocomplete="off">
                    <div id="cityDropdown" class="autocomplete-dropdown"></div>
                </div>
                <button id="searchBtn">Найти</button>
            </div>
        </section>

        <section class="results">
            <div id="vacanciesContainer" class="cards"></div>
            <div id="loading" style="display:none;">Загрузка...</div>
            <button id="loadMore" style="display:none;">Загрузить ещё</button>
        </section>

        <section class="subscription">
            <h2>Подпишитесь на новые вакансии</h2>
            <form id="subscribeForm">
                <input type="email" id="emailInput" placeholder="Ваш email" required>
                <button type="submit">Подписаться</button>
            </form>
            <p id="subscribeMessage"></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 ВКАНСА</p>
    </footer>

    <script>
        const API_URL = 'https://functions.yandexcloud.net/d4e1urrsv08ehb7k6uk8';

        // Тема
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        });
        function updateThemeIcon(isDark) {
            themeToggle.querySelector('.icon').textContent = isDark ? '☀️' : '🌙';
        }
        updateThemeIcon(document.documentElement.classList.contains('dark'));

        // Автодополнение городов
        let areas = [];
        const cityInput = document.getElementById('cityInput');
        const cityDropdown = document.getElementById('cityDropdown');
        let selectedArea = null;

        async function loadAreas() {
            try {
                const res = await fetch(`${API_URL}?action=areas`);
                areas = await res.json();
            } catch (e) {
                console.error('Ошибка загрузки городов', e);
            }
        }

        function findCities(query) {
            const q = query.toLowerCase().trim();
            if (!q) return [];
            const result = [];
            function search(areasList, path = '') {
                for (const item of areasList) {
                    const fullName = path ? `${path}, ${item.name}` : item.name;
                    if (item.name.toLowerCase().includes(q)) {
                        result.push({ id: item.id, name: item.name, fullName });
                    }
                    if (item.areas) {
                        search(item.areas, fullName);
                    }
                }
            }
            search(areas);
            return result.slice(0, 10);
        }

        function showDropdown(matches) {
            cityDropdown.innerHTML = '';
            if (!matches.length || !cityInput.value.trim()) {
                cityDropdown.style.display = 'none';
                return;
            }
            matches.forEach(match => {
                const div = document.createElement('div');
                div.className = 'autocomplete-item';
                div.textContent = match.fullName;
                div.addEventListener('click', () => {
                    cityInput.value = match.name;
                    selectedArea = { id: match.id, name: match.name };
                    cityDropdown.style.display = 'none';
                });
                cityDropdown.appendChild(div);
            });
            cityDropdown.style.display = 'block';
        }

        cityInput.addEventListener('input', () => {
            selectedArea = null;
            const matches = findCities(cityInput.value);
            showDropdown(matches);
        });

        document.addEventListener('click', (e) => {
            if (!cityInput.contains(e.target) && !cityDropdown.contains(e.target)) {
                cityDropdown.style.display = 'none';
            }
        });

        // Поиск вакансий
        let currentPage = 0;
        let totalPages = 0;
        const vacanciesContainer = document.getElementById('vacanciesContainer');
        const loadMoreBtn = document.getElementById('loadMore');
        const searchBtn = document.getElementById('searchBtn');
        const textSearch = document.getElementById('textSearch');

        function buildQuery() {
            const params = new URLSearchParams();
            params.append('action', 'vacancies');
            if (textSearch.value.trim()) params.append('text', textSearch.value.trim());
            if (selectedArea) params.append('area', selectedArea.id);
            params.append('page', currentPage);
            params.append('per_page', 10);
            return params.toString();
        }

        async function fetchVacancies() {
            const queryString = buildQuery();
            try {
                const res = await fetch(`${API_URL}?${queryString}`);
                const data = await res.json();
                return data;
            } catch (e) {
                console.error('Ошибка поиска', e);
                return { items: [], pages: 0 };
            }
        }

        function getEmployerName(employer) {
            if (!employer) return 'Компания не указана';
            return typeof employer === 'object' ? employer.name : employer;
        }

        function renderVacancy(vacancy) {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => {
                window.location.href = `vacancy.html?id=${vacancy.id}`;
            };

            const title = document.createElement('h3');
            title.textContent = vacancy.name;
            card.appendChild(title);

            const company = document.createElement('p');
            company.className = 'company';
            company.textContent = getEmployerName(vacancy.employer);
            card.appendChild(company);

            if (vacancy.salary) {
                const salary = document.createElement('p');
                salary.className = 'salary';
                const from = vacancy.salary.from ? `от ${vacancy.salary.from}` : '';
                const to = vacancy.salary.to ? `до ${vacancy.salary.to}` : '';
                const currency = vacancy.salary.currency || '';
                salary.textContent = [from, to, currency].filter(Boolean).join(' ') || 'З/П не указана';
                card.appendChild(salary);
            }

            const favBtn = document.createElement('button');
            favBtn.className = 'fav-btn';
            favBtn.textContent = '★';
            favBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFavorite(vacancy);
                favBtn.classList.toggle('active', isFavorite(vacancy.id));
            });
            favBtn.classList.toggle('active', isFavorite(vacancy.id));
            card.appendChild(favBtn);

            return card;
        }

        function displayVacancies(vacancies) {
            vacancies.forEach(v => {
                vacanciesContainer.appendChild(renderVacancy(v));
            });
        }

        async function search() {
            currentPage = 0;
            vacanciesContainer.innerHTML = '';
            loadMoreBtn.style.display = 'none';
            const data = await fetchVacancies();
            totalPages = data.pages;
            displayVacancies(data.items);
            if (currentPage < totalPages - 1) {
                loadMoreBtn.style.display = 'block';
            }
        }

        searchBtn.addEventListener('click', search);
        textSearch.addEventListener('keypress', (e) => { if (e.key === 'Enter') search(); });

        loadMoreBtn.addEventListener('click', async () => {
            currentPage++;
            const data = await fetchVacancies();
            displayVacancies(data.items);
            if (currentPage >= totalPages - 1) {
                loadMoreBtn.style.display = 'none';
            }
        });

        // Избранное
        function getFavorites() {
            return JSON.parse(localStorage.getItem('favorites') || '[]');
        }

        function isFavorite(id) {
            return getFavorites().some(v => v.id === id);
        }

        function toggleFavorite(vacancy) {
            let favs = getFavorites();
            const index = favs.findIndex(v => v.id === vacancy.id);
            if (index > -1) {
                favs.splice(index, 1);
            } else {
                favs.push(vacancy);
            }
            localStorage.setItem('favorites', JSON.stringify(favs));
        }

        // Подписка
        const subscribeForm = document.getElementById('subscribeForm');
        const subscribeMessage = document.getElementById('subscribeMessage');
        subscribeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'subscribe', email }),
                });
                const result = await res.json();
                if (result.success) {
                    subscribeMessage.textContent = 'Вы успешно подписались!';
                    subscribeMessage.style.color = 'green';
                } else {
                    subscribeMessage.textContent = 'Ошибка подписки.';
                    subscribeMessage.style.color = 'red';
                }
            } catch (err) {
                subscribeMessage.textContent = 'Сетевая ошибка.';
                subscribeMessage.style.color = 'red';
            }
        });

        // Инициализация
        loadAreas().then(() => {
            search();
        });
    </script>
</body>
</html>
