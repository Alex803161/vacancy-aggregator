<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ваканса – агрегатор вакансий</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f7f9fc;
            color: #1a2c3e;
            transition: background 0.2s, color 0.2s;
        }
        body.dark {
            background: #0e141b;
            color: #e2e8f0;
        }
        body.dark .card {
            background: #1e293b;
            border-color: #334155;
        }
        body.dark .sidebar {
            background: #111827;
            border-color: #1f2a3e;
        }
        body.dark .filter-group input,
        body.dark .filter-group select,
        body.dark .search-input {
            background: #2d3a4e;
            border-color: #475569;
            color: #f1f5f9;
        }
        body.dark .history-item {
            background: #334155;
            color: #cbd5e1;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }
        .header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,0.96);
        }
        body.dark .header {
            background: rgba(15, 23, 42, 0.96);
            border-bottom-color: #1e293b;
        }
        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            gap: 20px;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2c6e9e, #4a9fcf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .theme-toggle {
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            padding: 8px 18px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        body.dark .theme-toggle {
            background: #2d3a4e;
            color: #e2e8f0;
        }
        .main-layout {
            display: flex;
            gap: 32px;
            margin: 32px 0;
        }
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            background: white;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #e2edf2;
            align-self: start;
            position: sticky;
            top: 90px;
        }
        .sidebar h3 {
            font-size: 1.1rem;
            margin-bottom: 18px;
        }
        .filter-group {
            margin-bottom: 24px;
        }
        .filter-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #5a6e7c;
        }
        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cfdfe9;
            border-radius: 14px;
            font-size: 0.9rem;
            background: white;
        }
        .sort-btn {
            width: 100%;
            background: #eef2f8;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .history-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-item {
            background: #eff3f6;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .vacancies-area {
            flex: 1;
        }
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .search-input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #cfdfe9;
            border-radius: 60px;
            font-size: 1rem;
            background: white;
        }
        .btn-primary {
            background: #2c6e9e;
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
        }
        .vacancy-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #e2edf2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }
        .vacancy-card.premium {
            border: 2px solid #f5b042;
            background: linear-gradient(white, #fffaf0);
        }
        body.dark .vacancy-card.premium {
            background: #1e293b;
            border-color: #f5b042;
        }
        .card-header {
            display: flex;
            gap: 16px;
        }
        .company-logo {
            width: 64px;
            height: 64px;
            background: #eef2fa;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #2c6e9e;
            flex-shrink: 0;
            overflow: hidden;
        }
        .company-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .vacancy-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .salary {
            font-weight: 700;
            color: #2c6e9e;
            margin: 8px 0;
        }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 0.8rem;
            color: #5f7f92;
        }
        .favorite-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #b9cfdf;
        }
        .favorite-btn.active {
            color: #e5484d;
        }
        .skeleton-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid #e2edf2;
        }
        .skeleton-line {
            height: 18px;
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-card {
            background: white;
            max-width: 680px;
            width: 90%;
            border-radius: 32px;
            padding: 32px;
            max-height: 85vh;
            overflow-y: auto;
        }
        body.dark .modal-card {
            background: #1e293b;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c868e;
        }
        footer {
            text-align: center;
            padding: 30px 0;
            font-size: 0.75rem;
            border-top: 1px solid #e2e8f0;
            margin-top: 20px;
        }
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="container header-inner">
        <div class="logo">Ваканса</div>
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> Тёмная</button>
    </div>
</div>
<div class="container main-layout">
    <aside class="sidebar">
        <h3><i class="fas fa-sliders-h"></i> Фильтры</h3>
        <div class="filter-group">
            <label>Город</label>
            <input type="text" id="cityFilter" placeholder="Москва, СПб...">
        </div>
        <div class="filter-group">
            <label>Опыт работы</label>
            <select id="expFilter">
                <option value="">Любой</option>
                <option value="Без опыта">Без опыта</option>
                <option value="От 1 года до 3 лет">1–3 года</option>
                <option value="От 3 до 6 лет">3–6 лет</option>
                <option value="Более 6 лет">Более 6 лет</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Зарплата от (₽)</label>
            <input type="number" id="salaryFromFilter" placeholder="80000">
        </div>
        <button id="sortSalaryBtn" class="sort-btn"><i class="fas fa-arrow-up"></i> По зарплате</button>
        <div style="margin-top: 32px;">
            <div class="history-header">
                <h3><i class="fas fa-history"></i> История</h3>
                <button id="clearHistoryBtn" class="clear-history" style="background:none;border:none;color:#2c6e9e;cursor:pointer;">Очистить</button>
            </div>
            <div id="historyContainer" class="history-badges"></div>
        </div>
    </aside>
    <div class="vacancies-area">
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Должность, ключевые слова..." value="Python разработчик">
            <button id="searchBtn" class="btn-primary"><i class="fas fa-search"></i> Найти</button>
        </div>
        <div id="vacanciesContainer" class="vacancies-list"></div>
        <div id="sentinel" style="height: 10px;"></div>
    </div>
</div>
<footer>© Ваканса — агрегатор вакансий</footer>
<div id="modal" class="modal">
    <div class="modal-card">
        <h2 id="modalTitle"></h2>
        <p><strong><i class="fas fa-building"></i> Компания:</strong> <span id="modalCompany"></span></p>
        <p><strong><i class="fas fa-ruble-sign"></i> Зарплата:</strong> <span id="modalSalary"></span></p>
        <p><strong><i class="fas fa-map-marker-alt"></i> Метро:</strong> <span id="modalMetro"></span></p>
        <p><strong><i class="fas fa-calendar-alt"></i> График:</strong> <span id="modalSchedule"></span></p>
        <p><strong><i class="fas fa-tasks"></i> Требования:</strong> <span id="modalRequirements"></span></p>
        <p><strong><i class="fas fa-clipboard-list"></i> Обязанности:</strong> <span id="modalDescription"></span></p>
        <p><strong><i class="fas fa-phone-alt"></i> Телефон:</strong> <span id="modalPhone"></span></p>
        <a id="modalLink" href="#" target="_blank" style="color:#2c6e9e;">Открыть на hh.ru →</a>
        <div><button class="btn-primary" id="closeModalBtn" style="margin-top:16px;">Закрыть</button></div>
    </div>
</div>

<script src="api.js"></script>
<script>
    class VacancyApp {
        constructor() {
            this.allVacancies = [];
            this.filteredVacancies = [];
            this.currentPage = 0;
            this.pageSize = 5;
            this.isLoading = false;
            this.hasMore = true;
            this.sortBySalary = false;
            this.favorites = new Set();
            this.searchHistory = [];
            this.currentQuery = "Python разработчик";
            this.abortController = null;
            this.cache = new Map(); // ключ: query, значение: { data, timestamp }
            this.cacheTTL = 5 * 60 * 1000; // 5 минут
            this.init();
        }

        init() {
            this.loadFavorites();
            this.loadHistory();
            this.initTheme();
            this.bindEvents();
            this.setupIntersectionObserver();
            this.performSearch(this.currentQuery);
        }

        bindEvents() {
            document.getElementById('searchBtn').addEventListener('click', () => {
                const query = document.getElementById('searchInput').value.trim();
                if (query) this.performSearch(query);
            });
            document.getElementById('cityFilter').addEventListener('input', this.debounce(() => this.filterAndRender(), 300));
            document.getElementById('expFilter').addEventListener('change', () => this.filterAndRender());
            document.getElementById('salaryFromFilter').addEventListener('input', this.debounce(() => this.filterAndRender(), 300));
            document.getElementById('sortSalaryBtn').addEventListener('click', () => {
                this.sortBySalary = !this.sortBySalary;
                const btn = document.getElementById('sortSalaryBtn');
                btn.innerHTML = this.sortBySalary ? '<i class="fas fa-arrow-down"></i> По умолчанию' : '<i class="fas fa-arrow-up"></i> По зарплате';
                this.filterAndRender();
            });
            document.getElementById('clearHistoryBtn').addEventListener('click', () => this.clearHistory());
            document.getElementById('themeToggle').addEventListener('click', () => this.toggleTheme());
            document.getElementById('closeModalBtn').addEventListener('click', () => document.getElementById('modal').style.display = 'none');
            window.addEventListener('click', (e) => { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; });
        }

        debounce(func, delay) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => func.apply(this, args), delay);
            };
        }

        async performSearch(query) {
            if (this.abortController) this.abortController.abort();
            this.abortController = new AbortController();
            this.currentQuery = query;
            this.addToHistory(query);
            this.showSkeletons(true);
            this.isLoading = true;
            try {
                let vacancies;
                const cached = this.cache.get(query);
                if (cached && (Date.now() - cached.timestamp) < this.cacheTTL) {
                    vacancies = cached.data;
                } else {
                    vacancies = await fetchVacanciesFromAPI(query);
                    this.cache.set(query, { data: vacancies, timestamp: Date.now() });
                }
                this.allVacancies = vacancies.map(v => ({ ...v, salaryNum: this.extractSalaryNumber(v.salary) }));
                this.sortBySalary = false;
                document.getElementById('sortSalaryBtn').innerHTML = '<i class="fas fa-arrow-up"></i> По зарплате';
                this.filterAndRender();
            } catch (err) {
                if (err.name !== 'AbortError') console.error(err);
                document.getElementById('vacanciesContainer').innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
            } finally {
                this.isLoading = false;
            }
        }

        extractSalaryNumber(salaryStr) {
            if (!salaryStr || salaryStr === "Не указана") return 0;
            const match = salaryStr.match(/(\d+[\s]?\d+)/);
            return match ? parseInt(match[0].replace(/\s/g, ''), 10) : 0;
        }

        filterAndRender() {
            let filtered = [...this.allVacancies];
            const city = document.getElementById('cityFilter').value.trim().toLowerCase();
            const exp = document.getElementById('expFilter').value;
            const salaryFrom = parseInt(document.getElementById('salaryFromFilter').value, 10);
            if (city) filtered = filtered.filter(v => v.city.toLowerCase().includes(city));
            if (exp) filtered = filtered.filter(v => v.experience === exp);
            if (!isNaN(salaryFrom)) filtered = filtered.filter(v => v.salaryNum >= salaryFrom);
            if (this.sortBySalary) filtered.sort((a,b) => b.salaryNum - a.salaryNum);
            this.filteredVacancies = filtered;
            this.hasMore = true;
            this.currentPage = 0;
            this.renderVacancies(true);
        }

        renderVacancies(reset = true) {
            const container = document.getElementById('vacanciesContainer');
            if (reset) {
                container.innerHTML = '';
                this.currentPage = 0;
            }
            const start = this.currentPage * this.pageSize;
            const pageItems = this.filteredVacancies.slice(start, start + this.pageSize);
            if (pageItems.length === 0 && this.currentPage === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i> По вашему запросу ничего не найдено</div>';
                this.hasMore = false;
                return;
            }
            const fragment = document.createDocumentFragment();
            pageItems.forEach(vac => fragment.appendChild(this.createCard(vac)));
            container.appendChild(fragment);
            this.hasMore = (start + this.pageSize) < this.filteredVacancies.length;
        }

        createCard(vac) {
            const card = document.createElement('div');
            card.className = `vacancy-card ${vac.isPremium ? 'premium' : ''}`;
            card.setAttribute('data-id', vac.id);
            const isFav = this.favorites.has(vac.id);
            const logoHtml = vac.logo ? `<img src="${vac.logo}" alt="logo" loading="lazy">` : vac.company.charAt(0).toUpperCase();
            card.innerHTML = `
                <button class="favorite-btn ${isFav ? 'active' : ''}" data-id="${vac.id}">${isFav ? '❤️' : '🤍'}</button>
                <div class="card-header">
                    <div class="company-logo">${vac.logo ? `<img src="${vac.logo}" alt="лого" loading="lazy">` : vac.company.charAt(0)}</div>
                    <div class="card-main">
                        <div class="vacancy-title">${this.escapeHtml(vac.title)}</div>
                        <div class="company-name">${this.escapeHtml(vac.company)}</div>
                        <div class="salary">${this.escapeHtml(vac.salary)}</div>
                        <div class="card-meta">
                            <span><i class="fas fa-map-pin"></i> ${this.escapeHtml(vac.city) || 'Не указан'}</span>
                            <span><i class="fas fa-briefcase"></i> ${this.escapeHtml(vac.experience)}</span>
                        </div>
                    </div>
                </div>
            `;
            const favBtn = card.querySelector('.favorite-btn');
            favBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                this.toggleFavorite(vac.id);
                const active = this.favorites.has(vac.id);
                favBtn.textContent = active ? '❤️' : '🤍';
                favBtn.classList.toggle('active', active);
            });
            card.addEventListener('click', () => this.showModal(vac));
            return card;
        }

        showSkeletons(clear = true) {
            const container = document.getElementById('vacanciesContainer');
            if (clear) container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const sk = document.createElement('div');
                sk.className = 'skeleton-card';
                sk.innerHTML = `<div class="skeleton-line" style="height:24px;width:60%"></div>
                                <div class="skeleton-line" style="width:40%"></div>
                                <div class="skeleton-line" style="width:50%"></div>
                                <div class="skeleton-line" style="width:80%"></div>`;
                container.appendChild(sk);
            }
        }

        setupIntersectionObserver() {
            const sentinel = document.getElementById('sentinel');
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !this.isLoading && this.hasMore) {
                    this.isLoading = true;
                    this.currentPage++;
                    this.renderVacancies(false);
                    this.isLoading = false;
                }
            }, { threshold: 0.1 });
            observer.observe(sentinel);
        }

        toggleFavorite(id) {
            if (this.favorites.has(id)) this.favorites.delete(id);
            else this.favorites.add(id);
            localStorage.setItem('job_favorites', JSON.stringify([...this.favorites]));
        }

        loadFavorites() {
            const stored = localStorage.getItem('job_favorites');
            if (stored) this.favorites = new Set(JSON.parse(stored));
        }

        addToHistory(query) {
            if (!query.trim()) return;
            this.searchHistory = this.searchHistory.filter(q => q !== query);
            this.searchHistory.unshift(query);
            if (this.searchHistory.length > 6) this.searchHistory.pop();
            localStorage.setItem('search_history', JSON.stringify(this.searchHistory));
            this.renderHistory();
        }

        renderHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '';
            this.searchHistory.forEach(term => {
                const badge = document.createElement('span');
                badge.className = 'history-item';
                badge.innerHTML = `<i class="fas fa-clock"></i> ${this.escapeHtml(term)}`;
                badge.addEventListener('click', () => {
                    document.getElementById('searchInput').value = term;
                    this.performSearch(term);
                });
                container.appendChild(badge);
            });
        }

        loadHistory() {
            const stored = localStorage.getItem('search_history');
            if (stored) {
                try { this.searchHistory = JSON.parse(stored); } catch(e) {}
                this.renderHistory();
            }
        }

        clearHistory() {
            this.searchHistory = [];
            localStorage.setItem('search_history', JSON.stringify(this.searchHistory));
            this.renderHistory();
        }

        showModal(vac) {
            document.getElementById('modalTitle').innerText = vac.title;
            document.getElementById('modalCompany').innerText = vac.company;
            document.getElementById('modalSalary').innerText = vac.salary;
            const metro = vac.metro?.length ? vac.metro.join(', ') : '—';
            document.getElementById('modalMetro').innerHTML = `${vac.city || ''} • ${metro}`;
            document.getElementById('modalSchedule').innerText = vac.schedule || 'Полный день';
            document.getElementById('modalRequirements').innerText = vac.requirements || 'Не указаны';
            document.getElementById('modalDescription').innerText = vac.description || 'Нет описания';
            document.getElementById('modalPhone').innerText = vac.phone || 'Не указан';
            document.getElementById('modalLink').href = vac.link;
            document.getElementById('modal').style.display = 'flex';
        }

        initTheme() {
            const isDark = localStorage.getItem('theme_dark') === 'true';
            if (isDark) document.body.classList.add('dark');
            const btn = document.getElementById('themeToggle');
            btn.innerHTML = isDark ? '<i class="fas fa-sun"></i> Светлая' : '<i class="fas fa-moon"></i> Тёмная';
        }

        toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme_dark', isDark);
            const btn = document.getElementById('themeToggle');
            btn.innerHTML = isDark ? '<i class="fas fa-sun"></i> Светлая' : '<i class="fas fa-moon"></i> Тёмная';
        }

        escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
    }

    new VacancyApp();
</script>
</body>
</html>
