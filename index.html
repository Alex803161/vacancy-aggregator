    <script>
        // ========== СОСТОЯНИЕ ==========
        let savedVacancies = JSON.parse(localStorage.getItem('savedVacancies') || '[]');
        let searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');
        let allLoadedVacancies = [];
        let displayedCount = 0;
        let isLoadingMore = false;
        let sortBySalaryAsc = true;
        let vibrateEnabled = JSON.parse(localStorage.getItem('vibrateEnabled') ?? 'true');

        const FILTERS_KEY = 'savedFilters';
        let savedFilters = JSON.parse(localStorage.getItem(FILTERS_KEY) || '{}');

        const THEME_KEY = 'theme';
        let currentTheme = localStorage.getItem(THEME_KEY) || 'light';

        // ========== ТЁМНАЯ ТЕМА, УТИЛИТЫ, ИСТОРИЯ, МОДАЛКИ (без изменений) ==========
        // ... все функции (applyTheme, escapeHtml, renderVacancies и т.д.) остаются как в последней версии ...

        // ========== ГЛАВНОЕ ИСПРАВЛЕНИЕ: performSearch ==========
        async function performSearch(query) {
            const loader = document.getElementById('scrollLoader');
            loader.classList.remove('visible');
            renderSkeletons(5);

            try {
                let results = [];

                if (typeof fetchVacanciesFromAPI === 'function') {
                    results = await fetchVacanciesFromAPI(query);
                }

                // Прямые вакансии
                const direct = loadDirectVacancies();
                if (direct.length > 0) {
                    const filteredDirect = query ? direct.filter(v =>
                        v.title.toLowerCase().includes(query.toLowerCase()) ||
                        v.company.toLowerCase().includes(query.toLowerCase()) ||
                        v.city.toLowerCase().includes(query.toLowerCase())
                    ) : direct;
                    results = [...results, ...filteredDirect];
                }

                if (!results.length) {
                    document.getElementById('vacanciesContainer').innerHTML = '<div class="no-results">По вашему запросу ничего не найдено</div>';
                    updateDocumentTitle(0);
                    loader.classList.remove('visible');
                    return;
                }

                results = applyExtraFilters(results);
                if (document.getElementById('sortBySalary').classList.contains('active')) {
                    results = sortVacancies(results);
                } else {
                    results = sortVacancies(results);
                }

                allLoadedVacancies = results;
                displayedCount = 0;
                renderVacancies(results.slice(0, 5), false);
                updateDocumentTitle(results.length);
                vibrateOnNewData();
            } catch (e) {
                document.getElementById('vacanciesContainer').innerHTML = '<div class="error-state">Ошибка загрузки. Попробуйте позже.</div>';
                allLoadedVacancies = [];
                updateDocumentTitle(0);
            }
        }

        // ... остальная логика (loadMore, события, инициализация) без изменений ...
    </script>
