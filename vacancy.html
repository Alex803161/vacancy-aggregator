<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакансия — Ваканса</title>
    <script>
        // Мгновенное применение темы
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #fff;
            --text: #1a1a2e;
            --text-secondary: #555;
            --link: #1a73e8;
            --border: #e0e0e0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --btn-bg: #1a73e8;
            --btn-text: #fff;
            --badge-bg: #e8f0fe;
            --badge-color: #1a73e8;
        }
        .dark {
            --bg: #121212;
            --card-bg: #1e1e2f;
            --text: #e0e0e0;
            --text-secondary: #aaa;
            --link: #8ab4f8;
            --border: #2a2a3c;
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
            --btn-bg: #8ab4f8;
            --btn-text: #121212;
            --badge-bg: #2a3a5c;
            --badge-color: #8ab4f8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        a { color: var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .badge {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--badge-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 4px 4px 4px 0;
        }
        .btn {
            display: inline-block;
            background: var(--btn-bg);
            color: var(--btn-text);
            padding: 10px 24px;
            border-radius: 24px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            margin-right: 10px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; text-decoration: none; }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--btn-bg);
            color: var(--btn-bg);
        }
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        @media (min-width: 768px) {
            .content-layout {
                display: grid;
                grid-template-columns: 1fr 300px;
                gap: 30px;
            }
            .main-info { grid-column: 1; }
            .side-info { grid-column: 2; }
        }
        .side-info .card { padding: 20px; }
        .similar-list { display: flex; flex-direction: column; gap: 10px; }
        .similar-item {
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            transition: 0.2s;
        }
        .similar-item:hover { border-color: var(--link); }
        #map { width: 100%; height: 250px; margin: 20px 0; border-radius: 12px; }
        @media (max-width: 767px) {
            .content-layout { display: block; }
            .side-info { margin-top: 20px; }
            .details-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav style="margin-bottom:20px;">
            <a href="index.html">← Назад к поиску</a>
        </nav>
        <div id="vacancy-card" class="card">
            <div id="loader" style="text-align:center; padding:40px;">Загрузка...</div>
        </div>
        <div class="content-layout">
            <div class="main-info">
                <div id="similar-card" class="card">
                    <h3>Похожие вакансии</h3>
                    <div id="similar-list" class="similar-list">Загрузка...</div>
                </div>
            </div>
            <div class="side-info">
                <div id="map-card" class="card" style="display:none;">
                    <h3>Местоположение</h3>
                    <div id="map"></div>
                </div>
            </div>
        </div>
        <div style="text-align:center; margin-top:20px; font-size:0.85rem; color:var(--text-secondary);">
            <a href="https://hh.ru" target="_blank">Вакансии с hh.ru</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://functions.yandexcloud.net/d4e1urrsv08ehb7k6uk8';
        const params = new URLSearchParams(window.location.search);
        const vacancyId = params.get('id');
        if (!vacancyId) {
            document.getElementById('vacancy-card').innerHTML = '<p style="color:red;">Не указан ID вакансии</p>';
            throw new Error('No ID');
        }

        let currentVacancy = null;

        async function fetchVacancy(id) {
            const resp = await fetch(`${API_URL}?id=${id}`);
            if (!resp.ok) throw new Error('Ошибка загрузки');
            return resp.json();
        }

        async function loadSimilar(vacancy) {
            const container = document.getElementById('similar-list');
            if (!vacancy || !vacancy.name) {
                container.innerHTML = '<p>Нет данных для поиска похожих</p>';
                return;
            }
            try {
                const resp = await fetch(`${API_URL}?text=${encodeURIComponent(vacancy.name)}&per_page=6&order_by=relevance`);
                const data = await resp.json();
                const items = (data.items || []).filter(v => v.id !== vacancy.id).slice(0, 5);
                if (items.length === 0) {
                    container.innerHTML = '<p>Похожих вакансий не найдено</p>';
                    return;
                }
                container.innerHTML = items.map(v => {
                    const salary = v.salary ?
                        (v.salary.from ? `от ${v.salary.from}` : '') +
                        (v.salary.to ? ` до ${v.salary.to}` : '') +
                        ` ${v.salary.currency || ''}` : 'З/П не указана';
                    return `
                        <div class="similar-item">
                            <a href="vacancy.html?id=${v.id}" style="font-weight:500;">${v.name}</a>
                            <div style="font-size:0.9rem; color:var(--text-secondary);">${salary}</div>
                            <small>${v.employer?.name || ''} — ${v.area?.name || ''}</small>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                container.innerHTML = '<p>Ошибка загрузки похожих вакансий</p>';
                console.error(e);
            }
        }

        function renderVacancy(v) {
            currentVacancy = v;
            const card = document.getElementById('vacancy-card');
            const salary = v.salary ?
                (v.salary.from ? `от ${v.salary.from.toLocaleString()}` : '') +
                (v.salary.to ? ` до ${v.salary.to.toLocaleString()}` : '') +
                ` ${v.salary.currency || ''}` : 'З/П не указана';
            const address = v.address?.raw || v.area?.name || '';
            const experience = v.experience?.name || 'Не указан';
            const employment = v.employment?.name || 'Не указана';
            const published = v.published_at ? new Date(v.published_at).toLocaleDateString('ru-RU') : '';
            const skills = (v.key_skills || []).map(s => s.name);
            const description = v.description || '';

            card.innerHTML = `
                <h1 style="font-size:2rem; margin-bottom:10px;">${v.name}</h1>
                <div style="font-size:2rem; font-weight:600; color:var(--link); margin-bottom:20px;">${salary}</div>
                <div class="details-grid">
                    <div><strong>Компания:</strong> ${v.employer?.name || 'Не указана'}</div>
                    <div><strong>Город:</strong> ${address}</div>
                    <div><strong>Опыт:</strong> ${experience}</div>
                    <div><strong>Занятость:</strong> ${employment}</div>
                    <div><strong>Дата публикации:</strong> ${published}</div>
                </div>
                ${skills.length > 0 ? `<div style="margin:15px 0;">${skills.map(s => `<span class="badge">${s}</span>`).join(' ')}</div>` : ''}
                <div style="margin:20px 0; line-height:1.8;">${description}</div>
                <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:20px;">
                    <a href="https://hh.ru/vacancy/${v.id}" target="_blank" class="btn">Откликнуться на hh.ru</a>
                    <button id="shareBtn" class="btn btn-outline">Поделиться</button>
                </div>
            `;

            document.getElementById('shareBtn').addEventListener('click', () => {
                navigator.clipboard.writeText(window.location.href);
                alert('Ссылка скопирована!');
            });

            if (v.address?.lat && v.address?.lng) {
                document.getElementById('map-card').style.display = 'block';
                initMap(v.address.lat, v.address.lng);
            }
        }

        function initMap(lat, lng) {
            if (typeof ymaps === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://api-maps.yandex.ru/2.1/?lang=ru_RU';
                script.onload = () => {
                    ymaps.ready(() => {
                        new ymaps.Map('map', {
                            center: [lat, lng],
                            zoom: 14,
                            controls: ['zoomControl']
                        }).geoObjects.add(new ymaps.Placemark([lat, lng]));
                    });
                };
                document.head.appendChild(script);
            } else {
                ymaps.ready(() => {
                    new ymaps.Map('map', {
                        center: [lat, lng],
                        zoom: 14,
                        controls: ['zoomControl']
                    }).geoObjects.add(new ymaps.Placemark([lat, lng]));
                });
            }
        }

        (async () => {
            try {
                const vacancy = await fetchVacancy(vacancyId);
                renderVacancy(vacancy);
                loadSimilar(vacancy);
            } catch (err) {
                document.getElementById('vacancy-card').innerHTML = `<p style="color:red;">Ошибка: ${err.message}</p>`;
                console.error(err);
            }
        })();
    </script>
</body>
</html>
