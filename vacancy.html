<script src="common.js"></script>
<script>
    const API_URL = 'https://functions.yandexcloud.net/d4e1urrsv08ehb7k6uk8';
    function mapDirectJobToVacancy(job) { return { id: job.id, name: job.title, employer: job.company, salary: parseSalaryString(job.salary), description: job.description || 'Описание отсутствует', area: { name: job.city || '' }, key_skills: [], published_at: job.timestamp, alternate_url: null, source: 'direct', phone: job.phone || null, email: job.email || null, website: job.website || null, isPremium: !!job.isPremium, isUrgent: !!job.isUrgent }; }
    function updateBreadcrumbs(vacancy) {
        const city = vacancy.area?.name || '';
        const title = vacancy.name || 'Без названия';
        let html = '<a href="/vacancy-aggregator/">Главная</a> <span>→</span> ';
        if (city) {
            html += `<a href="/vacancy-aggregator/vacancies/rossiya/${city.toLowerCase()}.html">${escapeHtml(city)}</a> <span>→</span> `;
        }
        html += `<span>${escapeHtml(title)}</span>`;
        document.getElementById('breadcrumbsContainer').innerHTML = html;
        // JSON-LD для хлебных крошек
        const breadcrumbData = {
            "@context": "https://schema.org",
            "@type": "BreadcrumbList",
            "itemListElement": [
                { "@type": "ListItem", "position": 1, "name": "Главная", "item": "https://alex803161.github.io/vacancy-aggregator/" }
            ]
        };
        if (city) {
            breadcrumbData.itemListElement.push({
                "@type": "ListItem",
                "position": 2,
                "name": city,
                "item": `https://alex803161.github.io/vacancy-aggregator/vacancies/rossiya/${city.toLowerCase()}.html`
            });
            breadcrumbData.itemListElement.push({
                "@type": "ListItem",
                "position": 3,
                "name": title
            });
        } else {
            breadcrumbData.itemListElement.push({
                "@type": "ListItem",
                "position": 2,
                "name": title
            });
        }
        const script = document.createElement('script');
        script.type = 'application/ld+json';
        script.textContent = JSON.stringify(breadcrumbData);
        document.head.appendChild(script);
    }
    function updateSEOTags(vacancy, isDirect) { const empName = getEmployerName(vacancy.employer); const salaryText = formatSalary(vacancy.salary); const cityText = vacancy.area?.name || ''; const title = `${vacancy.name} — вакансия в компании ${empName} — ВКАНСА`; const description = `Вакансия: ${vacancy.name} (${empName}). ${salaryText}. ${cityText}. Подробности, зарплата, требования — на ВКАНСА.`.substring(0, 160); const canonicalUrl = window.location.origin + window.location.pathname + '?id=' + vacancy.id; document.title = title; document.getElementById('seoCanonical').setAttribute('href', canonicalUrl); document.querySelector('meta[property="og:title"]').setAttribute('content', title); document.querySelector('meta[property="og:description"]').setAttribute('content', description); document.getElementById('ogUrl').setAttribute('content', canonicalUrl); document.getElementById('vacancyTitle').textContent = vacancy.name; const jsonLd = { "@context": "https://schema.org", "@type": "JobPosting", "title": vacancy.name, "description": vacancy.description || description, "hiringOrganization": { "@type": "Organization", "name": empName }, "jobLocation": { "@type": "Place", "address": { "@type": "PostalAddress", "addressLocality": cityText || 'Не указан' } }, "datePosted": vacancy.published_at ? new Date(vacancy.published_at).toISOString().split('T')[0] : new Date().toISOString().split('T')[0] }; if (vacancy.salary) { jsonLd.baseSalary = { "@type": "MonetaryAmount", "currency": vacancy.salary.currency === '₽' ? 'RUB' : (vacancy.salary.currency || 'RUB'), "value": { "@type": "QuantitativeValue", "minValue": vacancy.salary.from || undefined, "maxValue": vacancy.salary.to || undefined, "unitText": "MONTH" } }; if (!jsonLd.baseSalary.value.minValue) delete jsonLd.baseSalary.value.minValue; if (!jsonLd.baseSalary.value.maxValue) delete jsonLd.baseSalary.value.maxValue; } document.getElementById('jsonLd').textContent = JSON.stringify(jsonLd); }
    function saveRecentVacancy(vacancy) { let recent = JSON.parse(localStorage.getItem('recentVacancies')) || []; recent = recent.filter(v => v.id !== vacancy.id); recent.unshift({ id: vacancy.id, name: vacancy.name, employer: getEmployerName(vacancy.employer), salary: formatSalary(vacancy.salary), area: vacancy.area?.name || '', timestamp: Date.now() }); if (recent.length > 200) recent = recent.slice(0, 200); localStorage.setItem('recentVacancies', JSON.stringify(recent)); }
    function renderVacancy(vacancy) { const employerName = getEmployerName(vacancy.employer); const vacancyUrl = window.location.href; const isDirect = vacancy.source === 'direct'; const shareText = encodeURIComponent(`Вакансия: ${vacancy.name} (${employerName}), ${formatSalary(vacancy.salary)}. Подробнее: ${vacancyUrl}`); const whatsappLink = `https://wa.me/?text=${shareText}`; const telegramLink = `https://t.me/share/url?url=${encodeURIComponent(vacancyUrl)}&text=${encodeURIComponent(`Вакансия: ${vacancy.name} (${employerName}), ${formatSalary(vacancy.salary)}`)}`; const vkLink = `https://vk.com/share.php?url=${encodeURIComponent(vacancyUrl)}&title=${encodeURIComponent(`Вакансия: ${vacancy.name} (${employerName}), ${formatSalary(vacancy.salary)}`)}`; const reportSubject = isDirect ? 'Жалоба на прямое объявление' : `Жалоба на вакансию ID ${vacancy.id}`; const reportBody = isDirect ? `Пожалуйста, опишите проблему с вакансией "${vacancy.name}" (${employerName}).%0D%0AID: ${vacancy.id}%0D%0AСсылка: ${vacancyUrl}` : `Пожалуйста, опишите проблему с вакансией "${vacancy.name}" (${employerName}).%0D%0AСсылка: ${vacancyUrl}`; const reportMailto = `mailto:abuse@vakansa.ru?subject=${encodeURIComponent(reportSubject)}&body=${reportBody}`; const shareBlock = `<div class="share-wrapper" onclick="event.stopPropagation();"><button class="btn-share-trigger" title="Поделиться"><i class="fas fa-share-alt"></i> Поделиться</button><div class="share-popup"><a href="${whatsappLink}" target="_blank" class="btn-share-round btn-whatsapp" title="WhatsApp"><i class="fab fa-whatsapp"></i></a><a href="${telegramLink}" target="_blank" class="btn-share-round btn-telegram" title="Telegram"><i class="fab fa-telegram-plane"></i></a><a href="${vkLink}" target="_blank" class="btn-share-round btn-vk" title="ВКонтакте"><i class="fab fa-vk"></i></a><button class="btn-share-round btn-copy-link" title="Копировать ссылку" data-url="${vacancyUrl}"><i class="fas fa-link"></i></button></div></div>`; 
        let contactButtons = '';
        if (vacancy.phone) { contactButtons += `<a href="tel:${vacancy.phone}" class="btn-call" onclick="event.stopPropagation();"><i class="fas fa-phone-alt"></i> Позвонить</a>`; }
        if (vacancy.email) { contactButtons += `<a href="mailto:${vacancy.email}" class="btn-email" onclick="event.stopPropagation();"><i class="fas fa-envelope"></i> Написать</a>`; }
        if (vacancy.website) { contactButtons += `<a href="${vacancy.website}" target="_blank" rel="noopener noreferrer" class="btn-website" onclick="event.stopPropagation();"><i class="fas fa-globe"></i> Сайт компании</a>`; }
        let html = `<div class="vacancy-full"><h2>${vacancy.name || 'Без названия'}</h2><p class="company">${employerName}</p><p class="salary">${formatSalary(vacancy.salary)}</p><div class="description">${vacancy.description || 'Описание отсутствует'}</div><p class="skills"><strong>Навыки:</strong> ${(vacancy.key_skills || []).map(s => typeof s === 'object' ? s.name : s).join(', ') || 'Не указаны'}</p><p class="published"><strong>Опубликовано:</strong> ${vacancy.published_at ? new Date(vacancy.published_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' }) : 'Неизвестно'}</p>${vacancy.area?.name ? `<p class="address">📍 ${vacancy.area.name}</p>` : ''}<div class="actions"><button id="favButton" class="fav-btn" style="background: #1a73e8; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer;">★ В избранное</button>${!isDirect ? `<a href="${vacancy.alternate_url || '#'}" target="_blank" rel="noopener noreferrer" style="color: #1a73e8;">Открыть на hh.ru</a>` : '<span style="color: #94a3b8; font-size: 0.9rem;">🏠 Прямое объявление</span>'}${contactButtons}<a href="javascript:history.back()" class="back-link" style="color: #1a73e8;">← Назад</a><a href="${reportMailto}" class="btn-report" title="Пожаловаться на вакансию"><i class="fas fa-flag"></i> Пожаловаться</a>${shareBlock}</div></div>`; 
        detailContainer.innerHTML = html; 
        updateBreadcrumbs(vacancy);
        const trigger = document.querySelector('.btn-share-trigger'); const popup = document.querySelector('.share-popup'); if (trigger && popup) { trigger.addEventListener('click', function(e) { e.stopPropagation(); popup.classList.toggle('show'); }); } 
        const copyBtn = document.querySelector('.btn-copy-link'); if (copyBtn) { copyBtn.addEventListener('click', function(e) { e.stopPropagation(); e.preventDefault(); const url = this.dataset.url; navigator.clipboard.writeText(url).then(() => { this.classList.add('copied'); setTimeout(() => this.classList.remove('copied'), 1500); }).catch(() => { alert('Не удалось скопировать ссылку'); }); }); } 
        updateSEOTags(vacancy, isDirect); const favBtn = document.getElementById('favButton'); updateFavButton(favBtn, vacancy); favBtn.addEventListener('click', () => { toggleFavorite(vacancy); updateFavButton(favBtn, vacancy); }); loadSimilar(vacancy.name, vacancy.id); saveRecentVacancy(vacancy); }
    function updateFavButton(btn, vacancy) { const isFav = isFavorite(vacancy.id); btn.textContent = isFav ? '★ В избранном' : '☆ В избранное'; btn.classList.toggle('active', isFav); }
    async function loadVacancy(id) { loadingEl.style.display = 'block'; errorEl.style.display = 'none'; detailContainer.innerHTML = ''; try { const res = await fetch(`${API_URL}?action=vacancy&id=${encodeURIComponent(id)}`); if (res.ok) { const vacancy = await res.json(); if (vacancy && !vacancy.errors && vacancy.id) { renderVacancy(vacancy); loadingEl.style.display = 'none'; return; } } } catch (e) { console.warn('API не ответил, ищем в localStorage'); } try { const directJobs = JSON.parse(localStorage.getItem('direct_jobs') || '[]'); const job = directJobs.find(j => String(j.id) === String(id)); if (job) { const mapped = mapDirectJobToVacancy(job); renderVacancy(mapped); loadingEl.style.display = 'none'; return; } } catch (e) { console.error('Ошибка чтения localStorage', e); } document.getElementById('vacancyTitle').textContent = 'Вакансия не найдена'; errorEl.textContent = 'Вакансия не найдена. Возможно, она была удалена или ID указан неверно.'; errorEl.style.display = 'block'; loadingEl.style.display = 'none'; }
    async function loadSimilar(title, currentId) { try { const res = await fetch(`${API_URL}?action=vacancies&text=${encodeURIComponent(title.split(' ')[0])}&per_page=5`); const data = await res.json(); const items = data.items || []; const filtered = items.filter(v => v.id != currentId).slice(0, 4); if (filtered.length === 0) return; let html = `<div class="similar-section"><h3 class="similar-title">Похожие вакансии</h3><div class="similar-grid">`; filtered.forEach(v => { const emp = typeof v.employer === 'object' ? v.employer?.name : v.employer; const salary = v.salary ? formatSalary(v.salary) : ''; const area = v.area?.name || ''; html += `<a href="vacancy.html?id=${v.id}" class="similar-card"><h4>${v.name || 'Без названия'}</h4><div class="company">${emp || 'Компания не указана'}</div>${salary ? `<div class="salary">${salary}</div>` : ''}${area ? `<div class="city">${area}</div>` : ''}</a>`; }); html += `</div></div>`; similarContainer.innerHTML = html; } catch (e) { console.error('Ошибка загрузки похожих вакансий', e); } }
    document.addEventListener('click', (e) => { if (!e.target.closest('.share-wrapper')) { document.querySelectorAll('.share-popup.show').forEach(p => p.classList.remove('show')); } });
    const urlParams = new URLSearchParams(window.location.search); const vacancyId = urlParams.get('id');
    const detailContainer = document.getElementById('vacancyDetail'), similarContainer = document.getElementById('similarContainer'), loadingEl = document.getElementById('loading'), errorEl = document.getElementById('error');
    if (vacancyId) { loadVacancy(vacancyId); } else {
        document.getElementById('vacancyTitle').textContent = 'Вакансия не выбрана';
        detailContainer.innerHTML = `<div class="no-vacancy"><i class="fas fa-search"></i><h2>Вакансия не выбрана</h2><p>Пожалуйста, выберите вакансию из списка или начните поиск.</p><a href="index.html" class="btn-search"><i class="fas fa-arrow-right"></i> Перейти к поиску</a></div>`;
    }
    setupThemeToggle('themeToggle'); setupBackToTop('backToTopBtn'); registerSW('/vacancy-aggregator/');
</script>
