<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакансия — ВКАНСА</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Мгновенное применение темы до отрисовки
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                // Авто по времени
                const hour = new Date().getHours();
                if (hour >= 20 || hour < 6) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }
        })();
    </script>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/">ВКАНСА</a></h1>
            <button id="themeToggle" aria-label="Переключить тему">
                <span class="icon">🌓</span>
            </button>
        </div>
    </header>

    <main class="container">
        <div id="vacancyDetail">
            <!-- Динамическое содержимое -->
        </div>
        <div id="loading" style="display:none;">Загрузка...</div>
        <div id="error" style="display:none;"></div>
    </main>

    <footer>
        <p>&copy; 2025 ВКАНСА</p>
    </footer>

    <script>
        const API_URL = 'https://functions.yandexcloud.net/d4e1urrsv08ehb7k6uk8';

        // Тёмная тема
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        });
        function updateThemeIcon(isDark) {
            themeToggle.querySelector('.icon').textContent = isDark ? '☀️' : '🌙';
        }
        updateThemeIcon(document.documentElement.classList.contains('dark'));

        // Получение ID из URL
        const urlParams = new URLSearchParams(window.location.search);
        const vacancyId = urlParams.get('id');

        const detailContainer = document.getElementById('vacancyDetail');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');

        function getEmployerName(employer) {
            if (!employer) return 'Компания не указана';
            return typeof employer === 'object' ? employer.name : employer;
        }

        function formatSalary(salary) {
            if (!salary) return 'Зарплата не указана';
            let parts = [];
            if (salary.from) parts.push(`от ${salary.from}`);
            if (salary.to) parts.push(`до ${salary.to}`);
            if (salary.currency) parts.push(salary.currency);
            return parts.join(' ') || 'Зарплата не указана';
        }

        function renderVacancy(vacancy) {
            const employerName = getEmployerName(vacancy.employer);

            let html = `
                <div class="vacancy-full">
                    <h2>${vacancy.name || 'Без названия'}</h2>
                    <p class="company">${employerName}</p>
                    <p class="salary">${formatSalary(vacancy.salary)}</p>
                    <div class="description">${vacancy.description || 'Описание отсутствует'}</div>
                    <p class="skills"><strong>Навыки:</strong> ${(vacancy.key_skills || []).map(s => s.name).join(', ') || 'Не указаны'}</p>
                    <p class="published"><strong>Опубликовано:</strong> ${vacancy.published_at ? new Date(vacancy.published_at).toLocaleDateString('ru-RU') : 'Неизвестно'}</p>
                    <div class="actions">
                        <button id="favButton" class="fav-btn">★ В избранное</button>
                        <a href="${vacancy.alternate_url || '#'}" target="_blank" rel="noopener">Открыть на hh.ru</a>
                        <a href="javascript:history.back()" class="back-link">← Назад</a>
                    </div>
                </div>
            `;
            detailContainer.innerHTML = html;

            // Обработчик кнопки избранного
            const favBtn = document.getElementById('favButton');
            updateFavButton(favBtn, vacancy);
            favBtn.addEventListener('click', () => {
                toggleFavorite(vacancy);
                updateFavButton(favBtn, vacancy);
            });
        }

        function updateFavButton(btn, vacancy) {
            const isFav = isFavorite(vacancy.id);
            btn.textContent = isFav ? '★ В избранном' : '☆ В избранное';
            btn.classList.toggle('active', isFav);
        }

        // Работа с избранным (localStorage)
        function getFavorites() {
            return JSON.parse(localStorage.getItem('favorites') || '[]');
        }

        function isFavorite(id) {
            return getFavorites().some(v => v.id === id);
        }

        function toggleFavorite(vacancy) {
            let favs = getFavorites();
            const index = favs.findIndex(v => v.id === vacancy.id);
            if (index > -1) {
                favs.splice(index, 1);
            } else {
                favs.push(vacancy);
            }
            localStorage.setItem('favorites', JSON.stringify(favs));
        }

        async function loadVacancy(id) {
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            detailContainer.innerHTML = '';
            try {
                const res = await fetch(`${API_URL}?action=vacancy&id=${encodeURIComponent(id)}`);
                if (!res.ok) {
                    throw new Error(`Ошибка ${res.status}`);
                }
                const vacancy = await res.json();
                if (vacancy.errors) {
                    throw new Error(vacancy.errors[0]?.value || 'Ошибка данных');
                }
                renderVacancy(vacancy);
            } catch (e) {
                errorEl.textContent = 'Не удалось загрузить вакансию. ' + e.message;
                errorEl.style.display = 'block';
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        if (vacancyId) {
            loadVacancy(vacancyId);
        } else {
            errorEl.textContent = 'Идентификатор вакансии не указан.';
            errorEl.style.display = 'block';
        }
    </script>
</body>
</html>
