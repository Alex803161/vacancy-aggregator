<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-solid-900.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/webfonts/fa-brands-400.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <title id="seoTitle">Загрузка вакансии — ВКАНСА</title>
    <meta name="description" id="seoDescription" content="Подробная информация о вакансии. Актуальные предложения работы на сайте ВКАНСА.">
    <link rel="canonical" id="seoCanonical" href="">
    
    <meta property="og:title" id="ogTitle" content="Вакансия на ВКАНСА">
    <meta property="og:description" id="ogDescription" content="Найдите работу своей мечты.">
    <meta property="og:url" id="ogUrl" content="">
    <meta property="og:type" content="website">
    
    <script type="application/ld+json" id="jsonLd"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>">
    
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') document.documentElement.classList.add('dark');
            else if (theme === 'light') document.documentElement.classList.remove('dark');
            else {
                if (new Date().getHours() >= 20 || new Date().getHours() < 6) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }
        })();
    </script>
    <style>
        /* все стили как в предыдущей версии vacancy.html */
    </style>
</head>
<body class="light">
<button id="backToTopBtn" title="Наверх"><i class="fas fa-arrow-up"></i></button>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <span class="logo-heart"></span>
            <span class="logo-text">Ваканса</span>
        </div>
        <h1 class="page-title" id="vacancyTitle">Загрузка вакансии...</h1>
        <p>Работа найдётся — и не одна</p>
    </div>

    <main>
        <div id="vacancyDetail"></div>
        <div id="similarContainer"></div>
        <div id="loading" style="display:none;">Загрузка...</div>
        <div id="error" style="display:none;"></div>
    </main>
</div>

<footer class="site-footer">
    <div class="footer-links">
        <a href="privacy.html">Политика конфиденциальности</a>
        <a href="terms.html">Пользовательское соглашение</a>
        <a href="contacts.html">Контакты</a>
    </div>
    <div class="footer-copy">© 2025 ВКАНСА</div>
</footer>

<button id="themeToggle" class="theme-switch">🌙</button>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-Y3LEHS2D4G"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-Y3LEHS2D4G');
</script>

<script src="common.js"></script>
<script>
    const API_URL = 'https://functions.yandexcloud.net/d4e5m82nlqkadc3ap5o5';

    function mapDirectJobToVacancy(job) {
        return {
            id: job.id,
            name: job.title,
            employer: job.company,
            salary: parseSalaryString(job.salary),
            description: job.description || 'Описание отсутствует',
            area: { name: job.city || '' },
            key_skills: [],
            published_at: job.timestamp,
            alternate_url: null,
            source: 'direct'
        };
    }

    function updateSEOTags(vacancy, isDirect) {
        const empName = getEmployerName(vacancy.employer);
        const salaryText = formatSalary(vacancy.salary);
        const cityText = vacancy.area?.name || '';
        const title = `${vacancy.name} — вакансия в компании ${empName} — ВКАНСА`;
        const description = `Вакансия: ${vacancy.name} (${empName}). ${salaryText}. ${cityText}. Подробности, зарплата, требования — на ВКАНСА.`.substring(0, 160);
        const canonicalUrl = window.location.origin + window.location.pathname + '?id=' + vacancy.id;

        document.getElementById('seoTitle').textContent = title;
        document.title = title;
        document.getElementById('seoDescription').setAttribute('content', description);
        document.getElementById('seoCanonical').setAttribute('href', canonicalUrl);
        document.getElementById('ogTitle').setAttribute('content', title);
        document.getElementById('ogDescription').setAttribute('content', description);
        document.getElementById('ogUrl').setAttribute('content', canonicalUrl);
        document.getElementById('vacancyTitle').textContent = vacancy.name;

        const jsonLd = {
            "@context": "https://schema.org",
            "@type": "JobPosting",
            "title": vacancy.name,
            "description": vacancy.description || description,
            "hiringOrganization": { "@type": "Organization", "name": empName },
            "jobLocation": { "@type": "Place", "address": { "@type": "PostalAddress", "addressLocality": cityText || 'Не указан' } },
            "datePosted": vacancy.published_at ? new Date(vacancy.published_at).toISOString().split('T')[0] : new Date().toISOString().split('T')[0]
        };
        if (vacancy.salary) {
            jsonLd.baseSalary = {
                "@type": "MonetaryAmount",
                "currency": vacancy.salary.currency === '₽' ? 'RUB' : (vacancy.salary.currency || 'RUB'),
                "value": {
                    "@type": "QuantitativeValue",
                    "minValue": vacancy.salary.from || undefined,
                    "maxValue": vacancy.salary.to || undefined,
                    "unitText": "MONTH"
                }
            };
            if (!jsonLd.baseSalary.value.minValue) delete jsonLd.baseSalary.value.minValue;
            if (!jsonLd.baseSalary.value.maxValue) delete jsonLd.baseSalary.value.maxValue;
        }
        document.getElementById('jsonLd').textContent = JSON.stringify(jsonLd);
    }

    function saveRecentVacancy(vacancy) {
        let recent = JSON.parse(localStorage.getItem('recentVacancies')) || [];
        recent = recent.filter(v => v.id !== vacancy.id);
        recent.unshift({
            id: vacancy.id,
            name: vacancy.name,
            employer: getEmployerName(vacancy.employer),
            salary: formatSalary(vacancy.salary),
            area: vacancy.area?.name || '',
            timestamp: Date.now()
        });
        if (recent.length > 200) recent = recent.slice(0, 200);
        localStorage.setItem('recentVacancies', JSON.stringify(recent));
    }

    function renderVacancy(vacancy) {
        const employerName = getEmployerName(vacancy.employer);
        const vacancyUrl = window.location.href;
        const isDirect = vacancy.source === 'direct';
        const shareText = encodeURIComponent(`Вакансия: ${vacancy.name} (${employerName}), ${formatSalary(vacancy.salary)}. Подробнее: ${vacancyUrl}`);
        const whatsappLink = `https://wa.me/?text=${shareText}`;
        const telegramLink = `https://t.me/share/url?url=${encodeURIComponent(vacancyUrl)}&text=${encodeURIComponent(`Вакансия: ${vacancy.name} (${employerName}), ${formatSalary(vacancy.salary)}`)}`;

        const reportSubject = isDirect ? 'Жалоба на прямое объявление' : `Жалоба на вакансию ID ${vacancy.id}`;
        const reportBody = isDirect
            ? `Пожалуйста, опишите проблему с вакансией "${vacancy.name}" (${employerName}).%0D%0AID: ${vacancy.id}%0D%0AСсылка: ${vacancyUrl}`
            : `Пожалуйста, опишите проблему с вакансией "${vacancy.name}" (${employerName}).%0D%0AСсылка: ${vacancyUrl}`;
        const reportMailto = `mailto:abuse@vakansa.ru?subject=${encodeURIComponent(reportSubject)}&body=${reportBody}`;

        let html = `
            <div class="vacancy-full">
                <h2>${vacancy.name || 'Без названия'}</h2>
                <p class="company">${employerName}</p>
                <p class="salary">${formatSalary(vacancy.salary)}</p>
                <div class="description">${vacancy.description || 'Описание отсутствует'}</div>
                <p class="skills"><strong>Навыки:</strong> ${(vacancy.key_skills || []).map(s => typeof s === 'object' ? s.name : s).join(', ') || 'Не указаны'}</p>
                <p class="published"><strong>Опубликовано:</strong> ${vacancy.published_at ? new Date(vacancy.published_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' }) : 'Неизвестно'}</p>
                ${vacancy.area?.name ? `<p class="address">📍 ${vacancy.area.name}</p>` : ''}
                <div class="actions">
                    <button id="favButton" class="fav-btn">★ В избранное</button>
                    ${!isDirect ? `<a href="${vacancy.alternate_url || '#'}" target="_blank" rel="noopener noreferrer" style="color: #1a73e8;">Открыть на hh.ru</a>` : '<span style="color: #94a3b8; font-size: 0.9rem;">🏠 Прямое объявление</span>'}
                    <a href="javascript:history.back()" class="back-link" style="color: #1a73e8;">← Назад</a>
                    <a href="${reportMailto}" class="btn-report" id="reportButton"><i class="fas fa-flag"></i> Пожаловаться</a>
                </div>
                <div class="share-buttons">
                    <a href="${whatsappLink}" target="_blank" rel="noopener noreferrer" class="btn-share btn-whatsapp" id="shareWhatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                    <a href="${telegramLink}" target="_blank" rel="noopener noreferrer" class="btn-share btn-telegram" id="shareTelegram"><i class="fab fa-telegram-plane"></i> Telegram</a>
                </div>
            </div>
        `;
        detailContainer.innerHTML = html;

        updateSEOTags(vacancy, isDirect);

        const favBtn = document.getElementById('favButton');
        updateFavButton(favBtn, vacancy);
        favBtn.addEventListener('click', () => {
            toggleFavorite(vacancy);
            updateFavButton(favBtn, vacancy);
            sendGAEvent('favorite', { event_category: 'engagement', event_label: vacancy.name });
        });

        // GA4 для шеринга
        document.getElementById('shareWhatsapp').addEventListener('click', () => {
            sendGAEvent('share', { method: 'WhatsApp', content_type: 'vacancy', item_id: vacancy.id });
        });
        document.getElementById('shareTelegram').addEventListener('click', () => {
            sendGAEvent('share', { method: 'Telegram', content_type: 'vacancy', item_id: vacancy.id });
        });

        // GA4 для жалобы
        document.getElementById('reportButton').addEventListener('click', () => {
            sendGAEvent('report', { event_category: 'engagement', event_label: vacancy.id });
        });

        loadSimilar(vacancy.name, vacancy.id);
        saveRecentVacancy(vacancy);
    }

    function updateFavButton(btn, vacancy) {
        const isFav = isFavorite(vacancy.id);
        btn.textContent = isFav ? '★ В избранном' : '☆ В избранное';
        btn.classList.toggle('active', isFav);
    }

    async function loadVacancy(id) {
        loadingEl.style.display = 'block';
        errorEl.style.display = 'none';
        detailContainer.innerHTML = '';

        try {
            const res = await fetch(`${API_URL}?action=vacancy&id=${encodeURIComponent(id)}`);
            if (res.ok) {
                const vacancy = await res.json();
                if (vacancy && !vacancy.errors && vacancy.id) {
                    renderVacancy(vacancy);
                    loadingEl.style.display = 'none';
                    return;
                }
            }
        } catch (e) {
            console.warn('API не ответил, ищем в localStorage');
        }

        try {
            const directJobs = JSON.parse(localStorage.getItem('direct_jobs') || '[]');
            const job = directJobs.find(j => String(j.id) === String(id));
            if (job) {
                const mapped = mapDirectJobToVacancy(job);
                renderVacancy(mapped);
                loadingEl.style.display = 'none';
                return;
            }
        } catch (e) {
            console.error('Ошибка чтения localStorage', e);
        }

        document.getElementById('vacancyTitle').textContent = 'Вакансия не найдена';
        errorEl.textContent = 'Вакансия не найдена. Возможно, она была удалена или ID указан неверно.';
        errorEl.style.display = 'block';
        loadingEl.style.display = 'none';
    }

    async function loadSimilar(title, currentId) {
        try {
            const res = await fetch(`${API_URL}?action=vacancies&text=${encodeURIComponent(title.split(' ')[0])}&per_page=5`);
            const data = await res.json();
            const items = data.items || [];
            const filtered = items.filter(v => v.id != currentId).slice(0, 4);
            if (filtered.length === 0) return;

            let html = `<div class="similar-section"><h3 class="similar-title">Похожие вакансии</h3><div class="similar-grid">`;
            filtered.forEach(v => {
                const emp = typeof v.employer === 'object' ? v.employer?.name : v.employer;
                const salary = v.salary ? formatSalary(v.salary) : '';
                const area = v.area?.name || '';
                html += `
                    <a href="vacancy.html?id=${v.id}" class="similar-card">
                        <h4>${v.name || 'Без названия'}</h4>
                        <div class="company">${emp || 'Компания не указана'}</div>
                        ${salary ? `<div class="salary">${salary}</div>` : ''}
                        ${area ? `<div class="city">${area}</div>` : ''}
                    </a>
                `;
            });
            html += `</div></div>`;
            similarContainer.innerHTML = html;
        } catch (e) {
            console.error('Ошибка загрузки похожих вакансий', e);
        }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const vacancyId = urlParams.get('id');

    const detailContainer = document.getElementById('vacancyDetail');
    const similarContainer = document.getElementById('similarContainer');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');

    if (vacancyId) {
        loadVacancy(vacancyId);
    } else {
        document.getElementById('vacancyTitle').textContent = 'Вакансия не указана';
        errorEl.textContent = 'Идентификатор вакансии не указан. Пожалуйста, выберите вакансию из списка.';
        errorEl.style.display = 'block';
    }

    setupThemeToggle('themeToggle');
    setupBackToTop('backToTopBtn');
    registerSW('/vacancy-aggregator/');
</script>
</body>
</html>
