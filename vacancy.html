<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакансия — ВКАНСА</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                const hour = new Date().getHours();
                if (hour >= 20 || hour < 6) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }
        })();
    </script>
    <style>
        .similar-section {
            margin-top: 40px;
            padding: 20px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        html.dark .similar-section {
            background: #1e293b;
            border-color: #334155;
        }
        .similar-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #0f172a;
        }
        html.dark .similar-title {
            color: #f1f5f9;
        }
        .similar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .similar-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #edf2f7;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        html.dark .similar-card {
            background: #0f172a;
            border-color: #334155;
        }
        .similar-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }
        .similar-card h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1a73e8;
        }
        .similar-card .company {
            font-size: 0.9rem;
            color: #475569;
            margin-bottom: 4px;
        }
        .similar-card .salary {
            font-weight: 700;
            color: #059669;
            font-size: 0.95rem;
        }
        .similar-card .city {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }
        html.dark .similar-card .company,
        html.dark .similar-card .city {
            color: #94a3b8;
        }
        html.dark .similar-card .salary {
            color: #34d399;
        }
        .share-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .btn-share {
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-whatsapp {
            background: #25D366;
            color: white;
        }
        .btn-whatsapp:hover {
            background: #128C7E;
        }
        .btn-telegram {
            background: #0088cc;
            color: white;
        }
        .btn-telegram:hover {
            background: #006699;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/">ВКАНСА</a></h1>
            <button id="themeToggle" aria-label="Переключить тему">
                <span class="icon">🌙</span>
            </button>
        </div>
    </header>

    <main class="container">
        <div id="vacancyDetail"></div>
        <div id="similarContainer"></div>
        <div id="loading" style="display:none;">Загрузка...</div>
        <div id="error" style="display:none;"></div>
    </main>

    <footer>
        <p>&copy; 2025 ВКАНСА</p>
    </footer>

    <script>
        const API_URL = 'https://functions.yandexcloud.net/d4e1urrsv08ehb7k6uk8';

        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        });
        function updateThemeIcon(isDark) {
            themeToggle.querySelector('.icon').textContent = isDark ? '☀️' : '🌙';
        }
        updateThemeIcon(document.documentElement.classList.contains('dark'));

        const urlParams = new URLSearchParams(window.location.search);
        const vacancyId = urlParams.get('id');

        const detailContainer = document.getElementById('vacancyDetail');
        const similarContainer = document.getElementById('similarContainer');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error');

        function getEmployerName(employer) {
            if (!employer) return 'Компания не указана';
            return typeof employer === 'object' ? employer.name : employer;
        }

        function formatSalary(salary) {
            if (!salary) return 'Зарплата не указана';
            let parts = [];
            if (salary.from) parts.push(`от ${salary.from}`);
            if (salary.to) parts.push(`до ${salary.to}`);
            if (salary.currency) parts.push(salary.currency);
            return parts.join(' ') || 'Зарплата не указана';
        }

        function saveRecentVacancy(vacancy) {
            let recent = JSON.parse(localStorage.getItem('recentVacancies')) || [];
            recent = recent.filter(v => v.id !== vacancy.id);
            recent.unshift({
                id: vacancy.id,
                name: vacancy.name,
                employer: getEmployerName(vacancy.employer),
                salary: formatSalary(vacancy.salary),
                area: vacancy.area?.name || '',
            });
            if (recent.length > 10) recent.pop();
            localStorage.setItem('recentVacancies', JSON.stringify(recent));
        }

        function renderVacancy(vacancy) {
            const employerName = getEmployerName(vacancy.employer);
            const vacancyUrl = window.location.href;
            const shareText = encodeURIComponent(`Вакансия: ${vacancy.name} (${employerName}), ${formatSalary(vacancy.salary)}. Подробнее: ${vacancyUrl}`);
            const whatsappLink = `https://wa.me/?text=${shareText}`;
            const telegramLink = `https://t.me/share/url?url=${encodeURIComponent(vacancyUrl)}&text=${encodeURIComponent(`Вакансия: ${vacancy.name} (${employerName}), ${formatSalary(vacancy.salary)}`)}`;

            let html = `
                <div class="vacancy-full" style="background: #fff; padding: 24px; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px;">
                    <h2>${vacancy.name || 'Без названия'}</h2>
                    <p class="company">${employerName}</p>
                    <p class="salary">${formatSalary(vacancy.salary)}</p>
                    <div class="description">${vacancy.description || 'Описание отсутствует'}</div>
                    <p class="skills"><strong>Навыки:</strong> ${(vacancy.key_skills || []).map(s => s.name).join(', ') || 'Не указаны'}</p>
                    <p class="published"><strong>Опубликовано:</strong> ${vacancy.published_at ? new Date(vacancy.published_at).toLocaleDateString('ru-RU') : 'Неизвестно'}</p>
                    <div class="actions" style="margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
                        <button id="favButton" class="fav-btn" style="background: #1a73e8; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer;">★ В избранное</button>
                        <a href="${vacancy.alternate_url || '#'}" target="_blank" rel="noopener" style="color: #1a73e8;">Открыть на hh.ru</a>
                        <a href="javascript:history.back()" class="back-link" style="color: #1a73e8;">← Назад</a>
                    </div>
                    <div class="share-buttons">
                        <a href="${whatsappLink}" target="_blank" class="btn-share btn-whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
                        <a href="${telegramLink}" target="_blank" class="btn-share btn-telegram"><i class="fab fa-telegram-plane"></i> Telegram</a>
                    </div>
                </div>
            `;
            detailContainer.innerHTML = html;

            const favBtn = document.getElementById('favButton');
            updateFavButton(favBtn, vacancy);
            favBtn.addEventListener('click', () => {
                toggleFavorite(vacancy);
                updateFavButton(favBtn, vacancy);
            });

            loadSimilar(vacancy.name, vacancy.id);
            saveRecentVacancy(vacancy);
        }

        function updateFavButton(btn, vacancy) {
            const isFav = isFavorite(vacancy.id);
            btn.textContent = isFav ? '★ В избранном' : '☆ В избранное';
            btn.classList.toggle('active', isFav);
        }

        function getFavorites() {
            return JSON.parse(localStorage.getItem('favorites') || '[]');
        }

        function isFavorite(id) {
            return getFavorites().some(v => v.id === id);
        }

        function toggleFavorite(vacancy) {
            let favs = getFavorites();
            const index = favs.findIndex(v => v.id === vacancy.id);
            if (index > -1) {
                favs.splice(index, 1);
            } else {
                favs.push(vacancy);
            }
            localStorage.setItem('favorites', JSON.stringify(favs));
        }

        async function loadVacancy(id) {
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            detailContainer.innerHTML = '';
            try {
                const res = await fetch(`${API_URL}?action=vacancy&id=${encodeURIComponent(id)}`);
                if (!res.ok) throw new Error(`Ошибка ${res.status}`);
                const vacancy = await res.json();
                if (vacancy.errors) throw new Error(vacancy.errors[0]?.value || 'Ошибка данных');
                renderVacancy(vacancy);
            } catch (e) {
                errorEl.textContent = 'Не удалось загрузить вакансию. ' + e.message;
                errorEl.style.display = 'block';
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        async function loadSimilar(title, currentId) {
            try {
                const res = await fetch(`${API_URL}?action=vacancies&text=${encodeURIComponent(title)}&per_page=5`);
                const data = await res.json();
                const items = data.items || [];
                const filtered = items.filter(v => v.id != currentId).slice(0, 4);
                if (filtered.length === 0) return;

                let html = `<div class="similar-section"><h3 class="similar-title">Похожие вакансии</h3><div class="similar-grid">`;
                filtered.forEach(v => {
                    const emp = typeof v.employer === 'object' ? v.employer?.name : v.employer;
                    const salary = v.salary ? formatSalary(v.salary) : '';
                    const area = v.area?.name || '';
                    html += `
                        <a href="vacancy.html?id=${v.id}" class="similar-card">
                            <h4>${v.name || 'Без названия'}</h4>
                            <div class="company">${emp || 'Компания не указана'}</div>
                            ${salary ? `<div class="salary">${salary}</div>` : ''}
                            ${area ? `<div class="city">${area}</div>` : ''}
                        </a>
                    `;
                });
                html += `</div></div>`;
                similarContainer.innerHTML = html;
            } catch (e) {
                console.error('Ошибка загрузки похожих вакансий', e);
            }
        }

        if (vacancyId) {
            loadVacancy(vacancyId);
        } else {
            errorEl.textContent = 'Идентификатор вакансии не указан.';
            errorEl.style.display = 'block';
        }
    </script>
</body>
</html>
